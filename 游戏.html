
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游戏引擎 5.0</title>
<style>
/* ===== 根变量与重置 ===== */
:root {
  --bg: #000000;
  --fg: #FFFFFF;
  --dim: #666666;
  --mid: #555555;
  --light: #AAAAAA;
  --panel-bg: #111111;
  --fs: 14px;
/* 第18行 */
  --lh: 1.7;
  --font: 'Courier New', 'SimHei', monospace;
}

}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { 
  width: 100%; height: 100%; 
  background: var(--bg); color: var(--fg); 
  font-family: var(--font); font-size: var(--fs); line-height: var(--lh);
  overflow: hidden;
}
body { display: flex; justify-content: center; align-items: center; }
button { font-family: inherit; cursor: pointer; border: 1px solid var(--mid); background: var(--bg); color: var(--fg); }
button:hover { border-color: var(--fg); }
button:active { background: var(--panel-bg); }
button:disabled { opacity: 0.4; cursor: not-allowed; }
input, textarea { font-family: inherit; background: var(--bg); color: var(--fg); border: 1px solid var(--mid); outline: none; }
input:focus, textarea:focus { border-color: var(--fg); }

/* ===== 布局 ===== */
#app {
  width: 900px; max-width: 100%; height: 100vh;
  display: flex; flex-direction: column;
  border-left: 1px solid var(--mid); border-right: 1px solid var(--mid);
  position: relative; overflow: hidden;
}

#topbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 12px; height: 28px; min-height: 28px;
  border-bottom: 1px solid var(--mid);
  font-size: 11px; color: var(--light);
}
#topbar .title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#topbar .actions { display: flex; gap: 4px; flex-shrink: 0; }
#topbar .actions button { font-size: 10px; padding: 1px 8px; }

#narrative {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 12px 16px;
  word-break: break-word;
  scroll-behavior: smooth;
}
#narrative .entry { margin-bottom: 8px; }
#narrative .entry.system { font-style: italic; color: var(--dim); font-size: 12px; }
#narrative .entry.npc-dialogue { padding-left: 2em; color: var(--light); }
#narrative .entry.sub-progress { color: var(--dim); font-size: 12px; }

#options-area {
  padding: 6px 12px; display: flex; flex-wrap: wrap; gap: 6px;
  border-top: 1px solid var(--dim);
}
#options-area button {
  flex: 1 1 calc(50% - 6px); min-width: 120px;
  padding: 8px 12px; font-size: 13px; text-align: left;
}

#input-row {
  display: flex; padding: 6px 12px; gap: 6px;
  border-top: 1px solid var(--mid);
}
#player-input { flex: 1; padding: 6px 10px; font-size: 13px; }
#send-btn { padding: 6px 16px; font-size: 13px; white-space: nowrap; }

#statusbar {
  padding: 3px 12px; font-size: 11px; height: 22px; min-height: 22px;
  border-top: 1px solid var(--mid);
  display: flex; align-items: center; gap: 8px;
}
#statusbar .bars { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
#statusbar .bar-label { font-size: 10px; width: 24px; }
#statusbar .bar-track { width: 80px; height: 8px; background: var(--panel-bg); border: 1px solid var(--mid); display: inline-block; }
#statusbar .bar-fill { height: 100%; background: var(--fg); transition: width 0.3s; }
#statusbar .bar-fill.hp {  }
#statusbar .bar-fill.san {  }
#status-info { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--light); }
#statusbar .shortcuts { flex-shrink: 0; color: var(--dim); font-size: 10px; }

/* ===== 加载指示器 ===== */
#loading-overlay {
  position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
  padding: 4px 16px; font-size: 12px; color: var(--light);
  pointer-events: none; z-index: 100; display: none;
  background: var(--bg); border: 1px solid var(--mid);
}
#loading-overlay.visible { display: block; }
#loading-overlay .dots::after { content: ''; animation: dots 1.5s steps(4,end) infinite; }
@keyframes dots {
  0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } 100% { content: ''; }
}

/* ===== 面板系统 ===== */
#panel-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85); z-index: 200; display: none;
  justify-content: center; align-items: center;
}
#panel-overlay.visible { display: flex; }
#panel-box {
  width: 700px; max-width: 94%; max-height: 85vh;
  background: var(--bg); border: 1px solid var(--fg);
  display: flex; flex-direction: column;
}
#panel-nav {
  display: flex; flex-wrap: wrap; gap: 2px;
  padding: 6px; border-bottom: 1px solid var(--mid);
}
#panel-nav button {
  padding: 3px 10px; font-size: 11px; border: 1px solid var(--mid);
}
#panel-nav button.active { border-color: var(--fg); background: var(--panel-bg); }
#panel-content {
  flex: 1; overflow-y: auto; padding: 12px 16px; font-size: 12px;
  white-space: pre-wrap; word-break: break-word;
}

/* ===== 调试面板 ===== */
#debug-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.9); z-index: 250; display: none;
  flex-direction: column;
}
#debug-overlay.visible { display: flex; }
#debug-header {
  padding: 6px 16px; border-bottom: 1px solid var(--mid);
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px; position: sticky; top: 0; background: var(--bg);
}
#debug-content {
  flex: 1; overflow-y: auto; padding: 12px 16px; font-size: 11px;
}
#debug-content .entry { margin-bottom: 4px; border-left: 3px solid var(--mid); padding: 2px 8px; }
#debug-content .entry.err { border-left-color: #F66; }
#debug-content .entry.warn { border-left-color: #FF0; }
#debug-content .ts { color: var(--dim); margin-right: 8px; }
#debug-content .label { font-weight: bold; }
#debug-content .detail { color: var(--light); max-height: 120px; overflow-y: auto; font-size: 10px; }

/* ===== 设置弹窗 ===== */
#settings-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85); z-index: 300; display: none;
  justify-content: center; align-items: center;
}
#settings-overlay.visible { display: flex; }
#settings-box {
  width: 460px; max-width: 94%; max-height: 85vh; overflow-y: auto;
  background: var(--bg); border: 1px solid var(--fg); padding: 20px;
}
#settings-box h3 { font-size: 14px; margin-bottom: 12px; text-align: center; }
#settings-box .row { margin-bottom: 10px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
#settings-box .row label { font-size: 12px; min-width: 72px; }
#settings-box .row input[type="text"],
#settings-box .row input[type="number"],
#settings-box .row input[type="password"] { flex: 1; padding: 4px 8px; font-size: 12px; min-width: 100px; }
#settings-box .row input[type="range"] { flex: 1; min-width: 80px; }
#settings-box .row input[type="checkbox"] { margin-right: 4px; }
#settings-box .row .val { font-size: 11px; color: var(--dim); min-width: 36px; text-align: right; }
#settings-box button { padding: 4px 12px; font-size: 12px; }
#settings-box .actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 12px; }

/* ===== 预览弹窗 ===== */
#preview-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85); z-index: 400; display: none;
  justify-content: center; align-items: center;
}
#preview-overlay.visible { display: flex; }
#preview-box {
  width: 500px; max-width: 94%; max-height: 80vh; overflow-y: auto;
  background: var(--bg); border: 1px solid var(--fg); padding: 16px;
}
#preview-box h3 { font-size: 14px; margin-bottom: 8px; }
#preview-box .meta { font-size: 12px; color: var(--light); margin-bottom: 12px; }
#preview-box .errors { color: #F66; font-size: 12px; margin-bottom: 8px; }
#preview-box button { padding: 4px 12px; font-size: 12px; margin-right: 6px; }

/* ===== 超时弹窗 ===== */
#timeout-dialog {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.9); z-index: 500; display: none;
  justify-content: center; align-items: center;
}
#timeout-dialog.visible { display: flex; }
#timeout-box {
  width: 420px; max-width: 92%; background: var(--bg); border: 1px solid var(--fg); padding: 20px;
  text-align: center;
}
#timeout-box p { font-size: 13px; margin-bottom: 12px; }
#timeout-box .hint { font-size: 12px; color: var(--light); margin-bottom: 12px; }
#timeout-box button { padding: 6px 20px; font-size: 13px; margin: 0 6px; }

/* ===== 打字效果 ===== */
.typewriter-cursor::after {
  content: '\2588'; animation: blink 0.8s step-end infinite;
}
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

/* ===== 滚动条 ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--mid); }
::-webkit-scrollbar-thumb:hover { background: var(--light); }

/* ===== 工具类 ===== */
.hidden { display: none !important; }

/* ===== 移动端适配 ===== */
@media(max-width:600px) {
  :root { --fs: 13px; --lh: 1.6; }
  #app { border: none; }
  #options-area button { flex: 1 1 100%; font-size: 12px; }
  #settings-box { max-width: 96%; padding: 12px; }
  #topbar { font-size: 11px; }
  #topbar .actions button { font-size: 10px; padding: 1px 6px; }
  #statusbar { font-size: 10px; }
  #statusbar .shortcuts { display: none; }
}
</style>
</head>
<body>

<div id="app">
  <div id="topbar">
    <span class="title" id="topbar-title">游戏引擎 5.0</span>
        <span class="actions">
      <button id="btn-panel">面板</button>
      <button id="btn-newgame">新游戏</button>
      <button id="btn-settings">设置</button>
      <button id="btn-debug" style="font-size:10px;padding:1px 6px;">调试</button>
    </span>

  </div>
  <div id="narrative"></div>
  <div id="options-area"></div>
  <div id="input-row">
    <input type="text" id="player-input" placeholder="输入行动..." autocomplete="off" spellcheck="false">
    <button id="send-btn">发送</button>
  </div>
  <div id="statusbar">
    <span class="bars">
      <span class="bar-label">HP</span>
      <span class="bar-track"><span class="bar-fill hp" id="hp-bar" style="width:100%"></span></span>
      <span class="bar-label">SAN</span>
      <span class="bar-track"><span class="bar-fill san" id="san-bar" style="width:100%"></span></span>
    </span>
    <span id="status-info">未知 · 铜币×0</span>
    <span class="shortcuts">[1-4] [Enter] [Esc] [F1调试] [Ctrl+S]</span>

  </div>
  <div id="loading-overlay">思考中<span class="dots"></span></div>
</div>

<!-- 面板 -->
<div id="panel-overlay">
  <div id="panel-box">
    <div id="panel-nav"></div>
    <div id="panel-content"></div>
  </div>
</div>

<!-- 调试面板 -->
<div id="debug-overlay">
  <div id="debug-header">
    <span>调试日志 (F1)</span>
    <button id="debug-close">关闭</button>
  </div>
  <div id="debug-content"></div>
</div>

<!-- 设置弹窗 -->
<div id="settings-overlay">
  <div id="settings-box">
    <h3>设置</h3>
    <div class="row">
      <label for="set-api-key">API Key</label>
      <input type="password" id="set-api-key" placeholder="sk-...">
    </div>
    <div class="row">
      <button id="set-test-key">测试连接</button>
      <button id="set-clear-key">清除Key</button>
      <span id="set-test-result" style="font-size:11px;"></span>
    </div>
    <div class="row">
      <label for="set-font-size">字体大小</label>
      <input type="range" id="set-font-size" min="10" max="22" value="14">
      <span class="val" id="set-font-size-val">14px</span>
    </div>
    <div class="row">
      <label for="set-type-speed">打字速度</label>
      <input type="range" id="set-type-speed" min="10" max="100" value="30">
      <span class="val" id="set-type-speed-val">30ms</span>
    </div>
    <div class="row">
      <label for="set-time-ratio">时间倍率</label>
      <input type="range" id="set-time-ratio" min="1" max="600" value="60">
      <span class="val" id="set-time-ratio-val">60×</span>
    </div>
    <div class="row">
      <label><input type="checkbox" id="set-auto-continue"> 自动继续（空输入选第一选项）</label>
    </div>
    <div class="actions">
      <button id="set-close">关闭</button>
    </div>
  </div>
</div>

<!-- 导入预览弹窗 -->
<div id="preview-overlay">
  <div id="preview-box">
    <h3>存档导入预览</h3>
    <div class="meta" id="preview-meta"></div>
    <div class="errors" id="preview-errors"></div>
    <div style="text-align:right;">
      <button id="preview-cancel">取消</button>
      <button id="preview-confirm" style="display:none;">确认导入</button>
    </div>
  </div>
</div>

<!-- 超时弹窗 -->
<div id="timeout-dialog">
  <div id="timeout-box">
    <p id="timeout-msg"></p>
    <p class="hint" id="timeout-hint"></p>
    <button id="timeout-continue">继续等待</button>
    <button id="timeout-abort">放弃</button>
  </div>
</div>

<!-- 隐藏的文件导入 -->
<input type="file" id="import-file-input" accept=".json" class="hidden">

<script>
/* ================================================================
   0. 常量与配置
   ================================================================ */
var MODEL = 'deepseek-v4-flash';
var API_URL = 'https://api.deepseek.com/chat/completions';
var STORAGE_PREFIX = 'ge3_';

var TIMEOUT_BASE = {
  L0: 120,
  creation: 180,
  combat: 90,
  data: 30,
  normal: 60
};
var TIMEOUT_MAX = {
  L0: 300,
  creation: 300,
  combat: 180,
  data: 60,
  normal: 180
};

var AG_CREATION = ['L1-08', 'L2-15', 'L2-16', 'L2-17', 'L2-18'];
var AG_COMBAT = ['L1-02', 'L2-03', 'L3-05', 'L3-06', 'L3-07', 'L3-08', 'L3-09', 'L3-10', 'L3-11', 'L3-43', 'L3-44', 'L3-45', 'L3-46', 'L3-47', 'L3-48'];
var AG_DATA = ['L4-01', 'L4-02', 'L4-03', 'L4-04', 'L4-05', 'L4-06', 'L4-07', 'L4-08', 'L4-09', 'L4-10', 'L4-11', 'L4-12', 'L5-01', 'L5-02', 'L5-03', 'L5-04', 'L5-05'];

var LIMITS = { MAX_QUERY: 5, MAX_DISPATCH: 2, MAX_REVISE: 1, MAX_LOOPS: 3 };
var JSON_OUTPUT_PREAMBLE = '输出格式要求(最高优先级):你的输出必须仅包含一个合法JSON对象。\n绝对不要输出任何非JSON文本、解释、markdown标记或自然语言。你的整个响应必须是纯JSON。';
var LANG_INSTRUCTION = '【语言要求】你必须始终使用简体中文输出。所有字段的值必须是中文。';

/* ================================================================
   1. 工具函数
   ================================================================ */
function escapeHtml(str) {
  if (typeof str !== 'string') return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function extractSummary(output) {
  if (!output || typeof output !== 'object') return '(空)';
  var keys = [];
  for (var k in output) {
    if (output.hasOwnProperty(k)) keys.push(k);
  }
  var prefix = '[' + keys.join(',') + ']';
  var firstVal = '';
  for (var k2 in output) {
    if (output.hasOwnProperty(k2)) {
      var v = output[k2];
      if (typeof v === 'string') { firstVal = v; break; }
      if (typeof v === 'number') { firstVal = String(v); break; }
    }
  }
  if (firstVal.length > 60) firstVal = firstVal.substring(0, 60) + '...';
  return prefix + ' | ' + (firstVal || '(无文本)');
}

function generateChecksum(str) {
  var hash = 0;
  for (var i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash) + str.charCodeAt(i);
    hash |= 0;
  }
  var hex = (hash >>> 0).toString(16);
  while (hex.length < 8) hex = '0' + hex;
  return hex.substring(0, 8);
}

function outputSummary(dispatchResults) {
  var summary = {};
  for (var id in dispatchResults) {
    if (dispatchResults.hasOwnProperty(id)) {
      summary[id] = extractSummary(dispatchResults[id]);
    }
  }
  return summary;
}

function normalizeTransition(raw) {
  if (raw === null || raw === undefined) return '';
  if (typeof raw === 'string') return raw.trim();
  if (Array.isArray(raw)) {
    var arr = [];
    for (var i = 0; i < raw.length; i++) {
      if (raw[i]) arr.push(raw[i]);
    }
    return arr.join(';');
  }
  if (typeof raw === 'object') {
    var parts = [];
    for (var k in raw) {
      if (raw.hasOwnProperty(k)) parts.push(k + '=' + raw[k]);
    }
    return parts.join(';');
  }
  return '';
}

function safeOptionToString(raw) {
  if (raw === null || raw === undefined) return '';
  if (typeof raw === 'string') return raw;
  if (typeof raw === 'object') {
    return raw.text || raw.label || raw.name || raw.title || JSON.stringify(raw);
  }
  return String(raw);
}

function formatGameTime(minutes) {
  var totalMin = minutes || 0;
  var days = Math.floor(totalMin / 1440);
  var remain = totalMin % 1440;
  var hours = Math.floor(remain / 60);
  var mins = remain % 60;
  var result = '';
  if (days > 0) result += '第' + days + '天 ';
  result += (hours < 10 ? '0' : '') + hours + ':' + (mins < 10 ? '0' : '') + mins;
  return result;
}

function timestamp() {
  var d = new Date();
  var h = d.getHours(); var m = d.getMinutes(); var s = d.getSeconds(); var ms = d.getMilliseconds();
  return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s + '.' + (ms < 100 ? (ms < 10 ? '00' : '0') : '') + ms;
}

function clamp(val, min, max) {
  if (val < min) return min;
  if (val > max) return max;
  return val;
}

/* ================================================================
   2. AgentRegistry — 全部108个Agent
   ================================================================ */
var AgentRegistry = {
  agents: {},
  _reg: function(id, name, temp, maxTokens, sysPrompt, armorBreak) {
    this.agents[id] = {
      id: id,
      name: name,
      temperature: temp,
      max_tokens: maxTokens,
      reasoning_effort: 'high',
      system_prompt: JSON_OUTPUT_PREAMBLE + '\n' + LANG_INSTRUCTION + '\n' + sysPrompt,
      armor_break: armorBreak
    };
  },
  isValidId: function(id) {
    return this.agents.hasOwnProperty(id);
  },
  _list: function() {
    var ids = [];
    for (var id in this.agents) {
      if (this.agents.hasOwnProperty(id)) ids.push(id);
    }
    ids.sort();
    return ids;
  }
};

(function registerAll() {
  var R = AgentRegistry;
  var Y = 'yes';
  var N = 'no';

  /* ===== L0 主Agent ===== */
  R._reg('L0', '主Agent', 0.7, 8192,
    '你是游戏引擎的主控Agent（L0）。你是唯一的神级决策者。\n' +
    '\n' +
    '## 核心铁律\n' +
    '1. 你必须始终使用简体中文输出所有字段。所有叙述、描述、选项必须是中文。\n' +
    '2. 你接收全量世界状态+玩家输入+记忆，分析后发出命令JSON。\n' +
    '3. 你绝不自行撰写narrative。narrative由子Agent生成，你整合签发。\n' +
    '4. 节奏控制：快餐60%用RESPOND，标准30%用DISPATCH+FINALIZE，深度10%用DISPATCH L1+FINALIZE。\n' +
    '   避免连续3轮深度或连续5轮快餐。\n' +
    '\n' +
    '## 命令协议\n' +
    '- QUERY: 查询世界状态。字段：query_type, key\n' +
    '  示例：{"command":"QUERY","key":"player.location"}\n' +
    '- RESPOND: 快餐回合直接响应。字段：narrative, transition, options\n' +
    '  narrative是2-5句中文叙事。\n' +
    '  options是纯字符串数组如["继续前进","查看周围"]，每个元素是简单中文文本。\n' +
    '  transition是分号分隔字符串如"hp=-5;player.location=酒馆"。\n' +
    '  绝不要输出对象格式的options如{"text":"xx"}！\n' +
    '- DISPATCH: 调度子Agent。字段：agent_id（必须精确匹配下面列表中的ID）, instruction\n' +
    '  instruction是给子Agent的详细中文说明，应包含子Agent需要的全部上下文。\n' +
    '- REVISE: 修改子Agent输出。字段：target_agent_id, revision_note, revised_output\n' +
    '- FINALIZE: 签发最终输出。字段：narrative, transition, options\n' +
    '  与RESPOND格式相同，但表示整合了子Agent结果的完整输出。\n' +
    '  options必须是纯字符串数组！\n' +
    '- SYSTEM: 系统操作。字段：action\n' +

function getArmorBreakPolicy() {
  var policy = {
    L0: { always: true },
    L1: { default: true, except: ['L1-07'] },
    L2: { default: false, include: [] },
    L3: { default: false, include: [] },
    L4: { always: false },
    L5: { always: false }
  };
  var agents = AgentRegistry.agents;
  for (var id in agents) {
    if (!agents.hasOwnProperty(id)) continue;
    if (agents[id].armor_break === 'yes') {
      if (id.indexOf('L2-') === 0) policy.L2.include.push(id);
      if (id.indexOf('L3-') === 0) policy.L3.include.push(id);
    }
  }
  return policy;
}

function shouldInjectArmorBreak(agentId) {
  var policy = getArmorBreakPolicy();
  if (agentId === 'L0') return policy.L0.always;
  if (agentId.indexOf('L1-') === 0) {
    for (var i = 0; i < policy.L1.except.length; i++) {
      if (agentId === policy.L1.except[i]) return false;
    }
    return policy.L1.default;
  }
  if (agentId.indexOf('L2-') === 0) {
    for (var j = 0; j < policy.L2.include.length; j++) {
      if (agentId === policy.L2.include[j]) return true;
    }
    return policy.L2.default;
  }
  if (agentId.indexOf('L3-') === 0) {
    for (var k = 0; k < policy.L3.include.length; k++) {
      if (agentId === policy.L3.include[k]) return true;
    }
    return policy.L3.default;
  }
  if (agentId.indexOf('L4-') === 0) return policy.L4.always;
  if (agentId.indexOf('L5-') === 0) return policy.L5.always;
  return false;
}

var DebugLogger = {
  entries: [],
  MAX_ENTRIES: 200,

  init: function() {
    this._domReady = true;
    this.info('Init', '========== 游戏引擎 5.0 启动 ==========');

    }
  },
  log: function(label, detail, level) {
    var entry = { ts: timestamp(), label: label, detail: detail, level: level || 'info' };
    this.entries.push(entry);
    while (this.entries.length > this.MAX_ENTRIES) this.entries.shift();
    var icon = level === 'error' ? '❌' : (level === 'warn' ? '⚠️' : '📋');
    if (typeof console !== 'undefined') {
      if (level === 'error') console.error('[' + entry.ts + '] ' + icon + ' ' + label, detail);
      else if (level === 'warn') console.warn('[' + entry.ts + '] ' + icon + ' ' + label, detail);
      else console.log('[' + entry.ts + '] ' + icon + ' ' + label, detail);
    }
    this._render();
  },
  info: function(label, detail) { this.log(label, detail, 'info'); },
  warn: function(label, detail) { this.log(label, detail, 'warn'); },
  error: function(label, detail) { this.log(label, detail, 'error'); },
  show: function() {
    this._panelVisible = true;
    var overlay = document.getElementById('debug-overlay');
    if (overlay) overlay.classList.add('visible');
    this._render();
  },
  hide: function() {
    this._panelVisible = false;
    var overlay = document.getElementById('debug-overlay');
    if (overlay) overlay.classList.remove('visible');
  },
  toggle: function() {
    if (this._panelVisible) this.hide(); else this.show();
  },
  _render: function() {
    if (!this._domReady || !this._panelVisible) return;
    var content = document.getElementById('debug-content');
    if (!content) return;
    var html = '';
    for (var i = this.entries.length - 1; i >= 0; i--) {
      var e = this.entries[i];
      var cls = e.level === 'error' ? 'err' : (e.level === 'warn' ? 'warn' : '');
      html += '<div class="entry ' + cls + '"><span class="ts">[' + e.ts + ']</span><span class="label">' + escapeHtml(e.label) + '</span> ';
      if (e.detail !== undefined && e.detail !== null) {
        if (typeof e.detail === 'object') {
          html += '<div class="detail">' + escapeHtml(JSON.stringify(e.detail, null, 2)) + '</div>';
        } else {
          html += '<span class="detail">' + escapeHtml(String(e.detail)) + '</span>';
        }
      }
      html += '</div>';
    }
    content.innerHTML = html;
  }
};

  applyTransition: function(rawTransition) {
    var transStr = normalizeTransition(rawTransition);
    if (!transStr) return;
    var entries = transStr.split(';');
    for (var i = 0; i < entries.length; i++) {
      var entry = entries[i].trim();
      if (!entry) continue;
      var eqIdx = entry.indexOf('=');
      if (eqIdx < 0) continue;
      var key = entry.substring(0, eqIdx).trim();
      var value = entry.substring(eqIdx + 1).trim();
      this._applyTransitionEntry(key, value);
    }
  },
  _applyTransitionEntry: function(key, value) {
    if (!key) return;
    if (key === 'player.hp' || key === 'hp') {
      var hpVal = parseInt(value, 10);
      if (!isNaN(hpVal)) this.state.player.hp = clamp(this.state.player.hp + hpVal, 0, this.state.player.max_hp);
    } else if (key === 'player.sanity' || key === 'sanity') {
      var sanVal = parseInt(value, 10);
      if (!isNaN(sanVal)) this.state.player.sanity = clamp(this.state.player.sanity + sanVal, 0, this.state.player.max_sanity);
    } else if (key === 'player.gold' || key === 'gold') {
      var goldVal = parseInt(value, 10);
      if (!isNaN(goldVal)) this.state.player.gold = Math.max(0, this.state.player.gold + goldVal);
    } else if (key === 'player.location') {
      this.state.player.location = value;
    } else if (key === 'player.inventory.add') {
      if (this.state.player.inventory.indexOf(value) < 0) this.state.player.inventory.push(value);
    } else if (key === 'player.inventory.remove') {
      var idx = this.state.player.inventory.indexOf(value);
      if (idx >= 0) this.state.player.inventory.splice(idx, 1);
    } else if (key.indexOf('flag.') === 0 || key.indexOf('flags.') === 0) {
      var flagKey = key.replace(/^flags?\./, '');
      if (value === 'true') this.state.flags[flagKey] = true;
      else if (value === 'false') this.state.flags[flagKey] = false;
      else if (!isNaN(parseFloat(value))) this.state.flags[flagKey] = parseFloat(value);
      else this.state.flags[flagKey] = value;
    } else if (key.indexOf('npc.') === 0) {
      var parts = key.split('.');
      if (parts.length >= 3) {
        var npcName = parts[1];
        var npcField = parts.slice(2).join('.');
        if (!this.state.npcs[npcName]) this.state.npcs[npcName] = {};
        if (!isNaN(parseFloat(value))) this.state.npcs[npcName][npcField] = parseFloat(value);
        else if (value === 'true') this.state.npcs[npcName][npcField] = true;
        else if (value === 'false') this.state.npcs[npcName][npcField] = false;
        else this.state.npcs[npcName][npcField] = value;
      }
    } else if (key.indexOf('faction.') === 0) {
      var fparts = key.split('.');
      if (fparts.length >= 3) {
        var facName = fparts[1];
        var facField = fparts.slice(2).join('.');
        if (!this.state.faction_relations[facName]) this.state.faction_relations[facName] = {};
        if (!isNaN(parseFloat(value))) this.state.faction_relations[facName][facField] = parseFloat(value);
        else this.state.faction_relations[facName][facField] = value;
      }
        } else if (key === 'spawn.npc') {
      if (!this.state.npcs[value]) this.state.npcs[value] = { name: value, alive: true };
    } else if (key === 'destroy.npc') {
      if (this.state.npcs[value]) this.state.npcs[value].alive = false;
    } else if (key === 'player.equipment' || key.indexOf('player.equipment.') === 0) {
      var eqKey = key.replace(/^player\.equipment\.?/, '');
      if (eqKey) {
        if (value === '__remove__') {
          delete this.state.player.equipment[eqKey];
        } else {
          this.state.player.equipment[eqKey] = value;
        }
      }
    } else if (key === 'narrative_lines.add' || key === 'player.narrative_lines.add') {
      if (this.state.narrative_lines.indexOf(value) < 0) this.state.narrative_lines.push(value);

      var nlIdx = this.state.narrative_lines.indexOf(value);

    } else if (key === 'weather') {
      this.state.weather = value;
    } else if (key === 'player.name') {
      this.state.player.name = value;
    } else if (key.indexOf('economy.prices.') === 0) {
      var priceItem = key.replace('economy.prices.', '');

function askTimeoutContinue(agentId, elapsedSec) {
  return new Promise(function(resolve, reject) {
    var dialog = document.getElementById('timeout-dialog');
    var msgEl = document.getElementById('timeout-msg');
    var hintEl = document.getElementById('timeout-hint');
    var continueBtn = document.getElementById('timeout-continue');
    var abortBtn = document.getElementById('timeout-abort');

    var agent = AgentRegistry.agents[agentId];
    var agentName = agent ? agent.name : agentId;
    msgEl.textContent = agentName + ' (' + agentId + ') 已等待 ' + elapsedSec + ' 秒。';

    var isCreation = false;
    for (var i = 0; i < AG_CREATION.length; i++) { if (AG_CREATION[i] === agentId) { isCreation = true; break; } }
    var isCombat = false;
    for (var j = 0; j < AG_COMBAT.length; j++) { if (AG_COMBAT[j] === agentId) { isCombat = true; break; } }

    if (isCreation) hintEl.textContent = '创世需要构思整个世界框架，请给它更多时间。';
    else if (isCombat) hintEl.textContent = '战斗关键时刻，中断会破坏沉浸感。';
    else hintEl.textContent = '是否继续等待？';

    dialog.classList.add('visible');

    function cleanup() {
      dialog.classList.remove('visible');
      document.removeEventListener('keydown', onKey);
      continueBtn.removeEventListener('click', onContinue);
      abortBtn.removeEventListener('click', onAbort);
    }

    function onContinue() { cleanup(); resolve(true); }
    function onAbort() { cleanup(); resolve(false); }
    function onKey(e) {
      if (e.key === 'Escape') { e.preventDefault(); cleanup(); resolve(false); }
    }

    document.addEventListener('keydown', onKey);
    continueBtn.addEventListener('click', onContinue);
    abortBtn.addEventListener('click', onAbort);
  });
}

function getTimeoutConfig(agentId) {
  if (agentId === 'L0') return { base: TIMEOUT_BASE.L0, max: TIMEOUT_MAX.L0 };
  for (var i = 0; i < AG_CREATION.length; i++) { if (AG_CREATION[i] === agentId) return { base: TIMEOUT_BASE.creation, max: TIMEOUT_MAX.creation }; }
  for (var j = 0; j < AG_COMBAT.length; j++) { if (AG_COMBAT[j] === agentId) return { base: TIMEOUT_BASE.combat, max: TIMEOUT_MAX.combat }; }
  for (var k = 0; k < AG_DATA.length; k++) { if (AG_DATA[k] === agentId) return { base: TIMEOUT_BASE.data, max: TIMEOUT_MAX.data }; }
  return { base: TIMEOUT_BASE.normal, max: TIMEOUT_MAX.normal };
}

   ================================================================ */
function callAgent(agentId, userMessage, options) {
  return new Promise(function(resolve, reject) {
    var agent = AgentRegistry.agents[agentId];
    if (!agent) {
      DebugLogger.error('callAgent', '无效Agent ID: ' + agentId);
      reject(new Error('无效Agent ID: ' + agentId));
      return;
    }

    var systemPrompt = agent.system_prompt;
    if (shouldInjectArmorBreak(agentId)) {
      systemPrompt = ARMOR_BREAK_MODULE + '\n\n---\n\n' + systemPrompt;
    }

    var messages = [{ role: 'system', content: systemPrompt }];
    if (agentId !== 'L0') {
      var ctxMsgs = SessionStore.getContextMessages(agentId);
      for (var cm = 0; cm < ctxMsgs.length; cm++) {
        messages.push(ctxMsgs[cm]);
      }
    }
    messages.push({ role: 'user', content: userMessage });

    var temperature = (options && options.temperature !== undefined) ? options.temperature : agent.temperature;
    var maxTokens = (options && options.max_tokens !== undefined) ? options.max_tokens : agent.max_tokens;
    var reasoningEffort = (options && options.reasoning_effort !== undefined) ? options.reasoning_effort : agent.reasoning_effort;

    var tConfig = getTimeoutConfig(agentId);
    var currentTimeout = tConfig.base;
    var timeoutMultiplier = 1.0;
    var maxAttempts = 2;
    var attempt = 0;

    function doAttempt() {
      attempt++;
      if (attempt > maxAttempts) {
        DebugLogger.error('callAgent', agentId + ' 达到最大尝试次数');
        resolve({
          error: true,
          message: 'API调用失败，已达到最大重试次数。',
          fallback_narrative: '你愣在原地，不知所措。',
          fallback_options: ['继续等待', '尝试其他行动', '查看周围', '休息片刻']
        });
        return;
      }

      var controller = new AbortController();
      var timeoutMs = Math.min(currentTimeout * timeoutMultiplier * 1000, tConfig.max * 1000);
      var timeoutId = setTimeout(function() { controller.abort(); }, timeoutMs);

      var body = {
        model: MODEL,
        messages: messages,
        temperature: temperature,
        max_tokens: maxTokens,
        response_format: { type: 'json_object' },
        reasoning_effort: reasoningEffort
      };

      DebugLogger.info('callAgent', agentId + ' 尝试 ' + attempt + '/' + maxAttempts + ' timeout=' + Math.round(timeoutMs/1000) + 's');

      fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + CONFIG.apiKey
        },
        body: JSON.stringify(body),
        signal: controller.signal
      }).then(function(response) {
        clearTimeout(timeoutId);

        if (response.status === 401) {
          DebugLogger.error('callAgent', agentId + ' HTTP 401 Key无效');
          reject(new Error('API Key无效，请检查设置。'));
          return;
        }
        if (response.status === 402) {
          DebugLogger.error('callAgent', agentId + ' HTTP 402 余额不足');
          reject(new Error('API余额不足，请充值后重试。'));
          return;
        }
        if (response.status === 429) {
          DebugLogger.warn('callAgent', agentId + ' HTTP 429 限流');
          var retryAfter = response.headers.get('Retry-After');
          var waitMs = retryAfter ? parseInt(retryAfter, 10) * 1000 : 3000;
          setTimeout(function() { doAttempt(); }, waitMs);
          return;
        }
        if (response.status === 500 || response.status === 503) {
          var waitS = response.status === 500 ? 2000 : 5000;
          DebugLogger.warn('callAgent', agentId + ' HTTP ' + response.status + ' ' + waitS/1000 + 's后重试');
          setTimeout(function() { doAttempt(); }, waitS);
          return;
        }
        if (!response.ok) {
          DebugLogger.error('callAgent', agentId + ' HTTP ' + response.status);
          reject(new Error('API请求失败: HTTP ' + response.status));
          return;
        }
        return response.json();
// 第1795行
      }).then(function(json) {
        if (!json) {
          DebugLogger.error('callAgent', agentId + ' API返回空响应');
          reject(new Error('API返回空响应'));
          return;
        }
        var content = '';
        if (json.choices && json.choices[0] && json.choices[0].message && json.choices[0].message.content) {
          content = json.choices[0].message.content;
        }

        var emptyRetries = 0;
        function handleEmptyContent() {
          if (!content || content.trim() === '') {
            if (emptyRetries < 3) {
              emptyRetries++;
              var waitMs = emptyRetries === 1 ? 1500 : (emptyRetries === 2 ? 3000 : 4500);
              DebugLogger.warn('callAgent', agentId + ' 空content，第' + emptyRetries + '次重试 ' + waitMs + 'ms（不消耗attempt）');
              var retryTimeout = Math.min(currentTimeout * timeoutMultiplier * 1000, tConfig.max * 1000);
              var retryController = new AbortController();
              var retryTimeoutId = setTimeout(function() { retryController.abort(); }, retryTimeout);
              fetch(API_URL, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': 'Bearer ' + CONFIG.apiKey
                },
                body: JSON.stringify(body),
                signal: retryController.signal
              }).then(function(retryResponse) {
                clearTimeout(retryTimeoutId);
                if (!retryResponse.ok) {
                  DebugLogger.warn('callAgent', agentId + ' 空content重试HTTP ' + retryResponse.status);
                  handleEmptyContent();
                  return;
                }
                return retryResponse.json();
              }).then(function(retryJson) {
                if (!retryJson) { handleEmptyContent(); return; }
                var newContent = '';
                if (retryJson.choices && retryJson.choices[0] && retryJson.choices[0].message && retryJson.choices[0].message.content) {
                  newContent = retryJson.choices[0].message.content;
                }
                if (!newContent || newContent.trim() === '') {
                  handleEmptyContent();
                  return;
                }
                content = newContent;
                processContent(content);
              }).catch(function(retryErr) {
                clearTimeout(retryTimeoutId);
                if (retryErr.name === 'AbortError') {
                  DebugLogger.warn('callAgent', agentId + ' 空content重试超时');
                }
                handleEmptyContent();
              });
              return 'retrying';
            }
          }
          return false;
        }

        var retryResult = handleEmptyContent();
        if (retryResult === 'retrying') return;

        processContent(content);

        function processContent(contentStr) {
          var parsed = null;
          try {
            parsed = JSON.parse(contentStr);
          } catch(e1) {
            var cleaned = contentStr.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
            var firstBrace = cleaned.indexOf('{');
            var lastBrace = cleaned.lastIndexOf('}');
            if (firstBrace >= 0 && lastBrace > firstBrace) {
              cleaned = cleaned.substring(firstBrace, lastBrace + 1);
            }
            try {
              parsed = JSON.parse(cleaned);
            } catch(e2) {
              DebugLogger.error('callAgent', agentId + ' JSON解析失败: ' + e2.message);
              reject(new Error('Agent输出JSON解析失败'));
              return;
            }
          }

          if (agentId !== 'L0') {
            SessionStore.update(agentId, userMessage, parsed);
          }
          resolve(parsed);
        }
      }).catch(function(err) {

        clearTimeout(timeoutId);
        if (err.name === 'AbortError') {
          DebugLogger.warn('callAgent', agentId + ' 超时 ' + Math.round(timeoutMs/1000) + 's');
          askTimeoutContinue(agentId, Math.round(timeoutMs / 1000)).then(function(shouldContinue) {
            if (shouldContinue) {
              timeoutMultiplier *= 1.6;
              DebugLogger.info('callAgent', agentId + ' 用户选择继续等待，倍数=' + timeoutMultiplier.toFixed(1));
              doAttempt();
            } else {
              DebugLogger.info('callAgent', agentId + ' 用户放弃等待');
              reject(new Error('用户取消等待'));
            }
          }).catch(function() { reject(new Error('超时弹窗异常')); });
          return;
        }
        if (err.message && (err.message.indexOf('API Key') >= 0 || err.message.indexOf('余额') >= 0)) {
          reject(err);
          return;
        }
        reject(err);
      });
    }

    doAttempt();
  });
}

var ProgramHub = {
  _pending: false,
  _currentOptions: [],
  _dispatchResults: {},
  isPending: function() { return this._pending; },
  setPending: function(val) {
    this._pending = val;
    UI.setPending(val);
  },
  setCurrentOptions: function(opts) { this._currentOptions = opts; },
  getCurrentOptions: function() { return this._currentOptions; },
  isCreatingMode: function() { return StateManager.state.world_mode === 'creating'; },
  executeQuery: function(key) {
    if (!key) return '(空查询)';
    var parts = key.split('.');
    var obj = StateManager.state;
    for (var i = 0; i < parts.length; i++) {
      if (obj === null || obj === undefined) return '(路径不存在: ' + key + ')';
      if (typeof obj !== 'object') return '(非对象路径: ' + key + ')';
      if (!obj.hasOwnProperty(parts[i])) return '(字段不存在: ' + key + ')';
      obj = obj[parts[i]];
    }
    if (obj === null || obj === undefined) return '(空值)';
    if (typeof obj === 'object') return JSON.stringify(obj);
    return String(obj);
  },
  handleSystemCommand: function(action) {
    switch(action) {
      case 'EXPORT': SaveManager.exportSave(); break;
      case 'IMPORT': document.getElementById('import-file-input').click(); break;
      case 'CLEAR':
        if (confirm('确定要清除所有数据并开始新游戏吗？此操作不可撤销。')) {
          StateManager.state = JSON.parse(JSON.stringify(DEFAULT_STATE));
          StateManager.persist();
          MemoryManager._shortTerm = []; MemoryManager._longTerm = []; MemoryManager._lastTurn = null;
          MemoryManager._save();
          SessionStore.clearAll();
          UI.clearNarrative();
          UI.renderOptions([]);
          UI.showWelcome();
          UI.updateStatusBar();
        }
        break;
      case 'SETTINGS': UI.showSettings(); break;
      case 'NEW_GAME':
        if (confirm('确定要开始新游戏吗？当前进度将丢失。')) {
          StateManager.state = JSON.parse(JSON.stringify(DEFAULT_STATE));
          StateManager.persist();
          MemoryManager._shortTerm = []; MemoryManager._longTerm = []; MemoryManager._lastTurn = null;
          MemoryManager._save();
          SessionStore.clearAll();
          UI.clearNarrative();
          UI.renderOptions([]);
          UI.showWelcome();
          UI.updateStatusBar();
        }
        break;
      default:
        DebugLogger.warn('SystemCmd', '未知SYSTEM action: ' + action);
    }
  },
  applyWorldCreationData: function(subAgentOutput) {
    if (!subAgentOutput || typeof subAgentOutput !== 'object') return;
    var state = StateManager.state;
    for (var key in subAgentOutput) {
      if (!subAgentOutput.hasOwnProperty(key)) continue;
      var val = subAgentOutput[key];
      if (key === 'world_name') state.flags.world_name = val;
      else if (key === 'world_type') state.flags.world_type = val;
      else if (key === 'geography') state.flags.geography = val;
      else if (key === 'factions' && Array.isArray(val)) {
        for (var i = 0; i < val.length; i++) {
          var fac = val[i];
          if (fac && fac.name) {
            state.factions[fac.name] = fac;
            if (!state.faction_relations.hasOwnProperty(fac.name)) {
              state.faction_relations[fac.name] = { player_standing: 0 };
            }
          }
        }
      } else if (key === 'key_npcs' && Array.isArray(val)) {
        for (var j = 0; j < val.length; j++) {
          var npc = val[j];
          if (npc && npc.name) {
            state.npcs[npc.name] = npc;
            state.npcs[npc.name].alive = true;
          }
        }
      } else if (key === 'central_conflict') state.flags.central_conflict = val;
      else if (key === 'atmosphere') state.flags.atmosphere = val;
      else if (key === 'starting_location') {
        state.flags.starting_location = val;
        if (val && val.name) {
          state.player.location = val.name;
        }
      }
    }
    state.flags.creation_stage = 'framework_presented';
    StateManager.persist();
    DebugLogger.info('ProgramHub', '世界创建数据已应用，进入框架展示阶段');
  },
  hasCreationData: function(dispatchResults) {

    for (var id in dispatchResults) {
      if (dispatchResults.hasOwnProperty(id) && id === 'L1-08') return true;
    }
    return false;
  },
  checkCreationCompliance: function(l0Output, dispatchResults) {
    if (!this.isCreatingMode()) return null;
    var stage = StateManager.state.flags.creation_stage || 'seed';

    if (l0Output.command === 'QUERY' || l0Output.command === 'SYSTEM') return null;

    if (stage === 'seed') {
      if (l0Output.command === 'RESPOND') {
        StateManager.state.flags.creation_stage = 'refine';
        StateManager.persist();
        return null;
      }
      if (l0Output.command === 'DISPATCH' && l0Output.agent_id === 'L1-08') return null;
      return null;
    }

// 第2039行 修改后
    if (stage === 'refine') {
      if (l0Output.command === 'RESPOND') return null;
      if (l0Output.command === 'DISPATCH' && l0Output.agent_id === 'L1-08') return null;
      if (l0Output.command === 'FINALIZE' && !this.hasCreationData(dispatchResults)) {
        return JSON.stringify({
          system_override: '当前处于细化阶段。请先DISPATCH L1-08生成世界，或RESPOND继续确认需求。',
          previous_commands: l0Output
        });
      }
      // L0发出了非预期的命令（如QUERY/REVISE/DISPATCH非L1-08），强制兜底
      if (l0Output.command !== 'RESPOND' && !(l0Output.command === 'DISPATCH' && l0Output.agent_id === 'L1-08')) {
        return '__FORCE_CREATION__';
      }
      return null;
    }


    if (stage === 'framework_presented') {
      if (l0Output.command === 'RESPOND') return null;
      if (l0Output.command === 'FINALIZE') {
        StateManager.state.flags.creation_stage = 'confirmed';
        StateManager.persist();
        return null;
      }
      return JSON.stringify({
        system_override: '当前请展示世界框架给用户确认(RESPOND)，或用户确认后FINALIZE。',
        previous_commands: l0Output
      });
    }

    if (stage === 'confirmed') {
      if (l0Output.command === 'FINALIZE') return null;
      return JSON.stringify({
        system_override: '用户已确认世界框架，请立即FINALIZE生成开场场景。',
        previous_commands: l0Output
      });
    }

    return null;
  },
// 第2074行
  applyFinalOutput: function(output) {
    if (!output) return;
    var narrative = output.narrative || '';
    if (typeof narrative === 'string' && narrative.length > 0) {
      narrative = narrative.substring(0, 300);
      UI.startTypewriter(narrative);   // ← 修改：直接传原始文本，textContent 自身是安全的
    }


    if (output.transition !== undefined) {
      StateManager.applyTransition(output.transition);
    }

    var options = output.options;
    var safeOptions = [];
    if (Array.isArray(options)) {
      for (var i = 0; i < Math.min(options.length, 4); i++) {
        var optStr = safeOptionToString(options[i]);
        // optStr 直接使用，textContent 显示时不需要 HTML 转义
        optStr = optStr.substring(0, 80);
        safeOptions.push(optStr);
      }
    }

    ProgramHub.setCurrentOptions(safeOptions);
    UI.renderOptions(safeOptions);

    if (StateManager.state.world_mode === 'creating' && output.command === 'FINALIZE') {
      StateManager.state.flags.creation_complete = true;
      StateManager.state.world_mode = 'playing';
    }

    
    UI.updateStatusBar();
    UI.updateTopBar();
    // 如果面板当前可见，刷新面板内容
    if (UI._els['panel-overlay'].classList.contains('visible')) {
      var activeTab = UI._els['panel-nav'].querySelector('.active');
      if (activeTab) {
        var tabIndex = parseInt(activeTab.getAttribute('data-tab-index'));
        if (!isNaN(tabIndex)) UI._renderPanelContent(tabIndex);
      }
    }
  },
  

  
  mainLoop: async function(playerInput) {
    var self = this;
    self.setPending(true);
    UI.showLoading();

    try {
      var now = Date.now();
      var elapsedReal = now - StateManager.state.header.last_input_timestamp;
      var elapsedMinutes = clamp(Math.round((elapsedReal / 60000) * SettingsManager.get().timeRatio), 0, 1440);
      StateManager.state.header.last_input_timestamp = now;
      StateManager.state.header.game_time_minutes = (StateManager.state.header.game_time_minutes || 480) + elapsedMinutes;

      var stm = MemoryManager.getShortTerm();
      var ltm = MemoryManager.getLongTerm(StateManager.state.player.location);
      var lastTurn = MemoryManager.getLastTurn();
      var rhythmAlert = RhythmMonitor.get();
      var cp = StateManager.toContextPackage(playerInput, stm, ltm, lastTurn, rhythmAlert, elapsedMinutes);

      var contextMessage = JSON.stringify(cp);

      DebugLogger.info('mainLoop', '回合开始: ' + playerInput + ' | 阶段: ' + cp.creation_stage);

      var currentMessage = contextMessage;
      var finalOutput = null;
      var loopCount = 0;
      var queryCount = 0;
      var dispatchCount = 0;
      var reviseCount = 0;
      self._dispatchResults = {};

      while (loopCount < LIMITS.MAX_LOOPS && !finalOutput) {
        loopCount++;
        DebugLogger.info('mainLoop', '循环 ' + loopCount + '/' + LIMITS.MAX_LOOPS);

        var l0Output = await callAgent('L0', currentMessage);
        DebugLogger.info('mainLoop', 'L0命令: ' + l0Output.command + (l0Output.agent_id ? ' → ' + l0Output.agent_id : ''));

        var compliance = self.checkCreationCompliance(l0Output, self._dispatchResults);
        if (compliance === '__FORCE_CREATION__') {
          DebugLogger.warn('mainLoop', '程序兜底创建世界');
          l0Output = { command: 'DISPATCH', agent_id: 'L1-08', instruction: '根据玩家之前的输入构建世界框架。' };
        } else if (compliance !== null && typeof compliance === 'string') {
          currentMessage = compliance;
          DebugLogger.warn('CreationCheck', '阶段:' + StateManager.state.flags.creation_stage + ' 命令:' + l0Output.command + ' (纠正)');
          continue;
        }

        switch(l0Output.command) {
          case 'QUERY':
            queryCount++;
            if (queryCount > LIMITS.MAX_QUERY) {
              currentMessage = JSON.stringify({ system_override: 'QUERY次数超限(' + LIMITS.MAX_QUERY + ')，请立即FINALIZE。', previous_output: l0Output });
              DebugLogger.warn('mainLoop', 'QUERY超限');
            } else {
              var queryResult = self.executeQuery(l0Output.key);
              currentMessage = JSON.stringify({
                query_result: { key: l0Output.key, value: queryResult },
                previous_output: l0Output,
                dispatch_results_so_far: self._dispatchResults
              });
            }
            continue;

          case 'RESPOND':
            finalOutput = l0Output;
            break;

          case 'DISPATCH':
            dispatchCount++;
            if (dispatchCount > LIMITS.MAX_DISPATCH) {
              currentMessage = JSON.stringify({ system_override: 'DISPATCH次数超限(' + LIMITS.MAX_DISPATCH + ')，请立即FINALIZE。', previous_output: l0Output, dispatch_results_so_far: self._dispatchResults });
              DebugLogger.warn('mainLoop', 'DISPATCH超限');
              continue;
            }
            if (!AgentRegistry.isValidId(l0Output.agent_id)) {
              currentMessage = JSON.stringify({ system_override: '无效Agent ID: ' + l0Output.agent_id + '。请使用列表中的有效ID。', previous_output: l0Output });
              dispatchCount--;
              DebugLogger.warn('mainLoop', '非法Agent ID: ' + l0Output.agent_id);
              continue;
            }
            UI.showSubAgentProgress(l0Output.agent_id);
            try {
              var subResult = await callAgent(l0Output.agent_id, l0Output.instruction || '');
              self._dispatchResults[l0Output.agent_id] = subResult;
              if (l0Output.agent_id === 'L1-08') {
                self.applyWorldCreationData(subResult);
              }
              var dispSummary = outputSummary(self._dispatchResults);
              currentMessage = JSON.stringify({
                sub_agent_result: {
                  agent_id: l0Output.agent_id,
                  agent_name: AgentRegistry.agents[l0Output.agent_id] ? AgentRegistry.agents[l0Output.agent_id].name : l0Output.agent_id,
                  output: subResult,
                  output_summary: extractSummary(subResult)
                },
                dispatch_results_so_far_summary: dispSummary,
                note_to_L0: '以上 sub_agent_result.output 是子Agent的输出，不是你(L0)的输出。请基于此整合FINALIZE。'
              });
              DebugLogger.info('mainLoop', 'DISPATCH ' + l0Output.agent_id + ' 完成');
            } catch(subErr) {
              DebugLogger.error('mainLoop', '子Agent ' + l0Output.agent_id + ' 异常: ' + subErr.message);
              currentMessage = JSON.stringify({
                sub_agent_error: { agent_id: l0Output.agent_id, error: subErr.message },
                note_to_L0: '子Agent调用失败，请考虑RESPOND或使用其他可用数据FINALIZE。'
              });
            }
            UI.hideSubAgentProgress();
            continue;

          case 'REVISE':
            reviseCount++;
            if (reviseCount > LIMITS.MAX_REVISE) {
              currentMessage = JSON.stringify({ system_override: 'REVISE次数超限(' + LIMITS.MAX_REVISE + ')，请立即FINALIZE。', previous_output: l0Output });
              DebugLogger.warn('mainLoop', 'REVISE超限');
              continue;
            }
            if (l0Output.target_agent_id && self._dispatchResults.hasOwnProperty(l0Output.target_agent_id)) {
              self._dispatchResults[l0Output.target_agent_id] = l0Output.revised_output || l0Output;
            }
            currentMessage = JSON.stringify({
              revised: true,
              dispatch_results_so_far: self._dispatchResults,
              note_to_L0: '已更新 ' + (l0Output.target_agent_id || 'unknown') + ' 的输出。请基于修订后的数据FINALIZE。'
            });
            continue;

          case 'FINALIZE':
            finalOutput = l0Output;
            break;

          case 'SYSTEM':
            self.handleSystemCommand(l0Output.action);
            finalOutput = { command: 'SYSTEM_DONE' };
            break;

          default:
            currentMessage = JSON.stringify({ system_override: '非法命令: ' + l0Output.command + '。请使用QUERY/RESPOND/DISPATCH/REVISE/FINALIZE/SYSTEM之一。', previous_output: l0Output });
            DebugLogger.warn('mainLoop', '非法命令: ' + l0Output.command);
            continue;
        }
      }

      if (!finalOutput) {
        var fallback = {
          command: 'RESPOND',
          narrative: '世界暂时无法回应你的行动。请稍后再试。',
          transition: '',
          options: ['继续尝试', '查看周围', '休息片刻', '检查状态']
        };
        finalOutput = fallback;
        DebugLogger.warn('mainLoop', '循环结束无输出，使用回退');
      }

      if (finalOutput.command !== 'SYSTEM_DONE') {
        self.applyFinalOutput(finalOutput);
      }

      StateManager.state.header.turn = (StateManager.state.header.turn || 0) + 1;
      var turnNum = StateManager.state.header.turn;
      MemoryManager.addShortTerm({
        turn: turnNum,
        summary: finalOutput.narrative ? finalOutput.narrative.substring(0, 100) : '(无叙事)',
        location: StateManager.state.player.location
      });
      MemoryManager.setLastTurn(finalOutput);
      if (turnNum % 20 === 0) {
        MemoryManager.compress();
      }
      RhythmMonitor.record(loopCount, finalOutput.command);
      StateManager.persist();

      if (turnNum > 0 && turnNum % 15 === 0) {
        UI.appendSystem('存档已进行' + turnNum + '回合，Ctrl+S导出存档');
      }

      UI.updateTopBar();

    } catch(err) {
      DebugLogger.error('mainLoop.catch', err.message);
      var errMsg = err.message || '未知错误';
      if (errMsg.indexOf('API Key') >= 0 || errMsg.indexOf('401') >= 0) {
        UI.appendSystem('[错误] API Key无效。请按设置按钮配置有效的API Key。');
        UI.showSettings('api-key');
      } else if (errMsg.indexOf('余额') >= 0 || errMsg.indexOf('402') >= 0) {
        UI.appendSystem('[错误] API余额不足，请充值后重试。');
      } else {
// 第2305行
        UI.appendSystem('[错误] ' + errMsg);   // ← 修改：直接拼接原始文本
      }
      var fallbackOpts = ['继续尝试', '查看周围', '休息片刻', '检查状态'];
      ProgramHub.setCurrentOptions(fallbackOpts);
      UI.renderOptions(fallbackOpts);
      self.setPending(false);
      UI.hideLoading();
      UI.focusInput();
      return;
    }

    self.setPending(false);
    UI.hideLoading();
    UI.scrollToBottom();
    UI.focusInput();
  }
};

var SaveManager = {
  _pendingImportData: null,
  exportSave: function() {
    var worldState = JSON.parse(JSON.stringify(StateManager.state));
    var checksum = generateChecksum(JSON.stringify(worldState));
    var saveData = {
      meta: {
        format_version: '5.0',
        checksum: checksum,
        created_at: new Date().toISOString(),
        world_name: worldState.flags.world_name || '未命名世界',
        turn: worldState.header.turn || 0,
        player_name: worldState.player.name || '无名旅者'
      },
      world_state: worldState,
      short_term_memory: MemoryManager._shortTerm.slice(),
      long_term_memory: MemoryManager._longTerm.slice(),
      last_turn: MemoryManager.getLastTurn(),
      sessions: JSON.parse(JSON.stringify(SessionStore.sessions))
    };
    var blob = new Blob([JSON.stringify(saveData, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'ge5_save_' + saveData.meta.world_name + '_' + saveData.meta.turn + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    UI.appendSystem('存档已导出。');
    DebugLogger.info('SaveManager', '存档导出: ' + saveData.meta.world_name + ' 回合' + saveData.meta.turn);
  },
  importSave: function(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var saveData = JSON.parse(e.target.result);
        var errors = [];

        if (!saveData.meta || !saveData.meta.format_version) {
          errors.push('缺少meta.format_version字段');
        } else {
          var v = parseFloat(saveData.meta.format_version);
          if (v < 3.0 || v > 5.0) {
            errors.push('不支持的存档版本: ' + saveData.meta.format_version + ' (支持3.0-5.0)');
          }
        }

        if (!saveData.world_state) {
          errors.push('缺少world_state');
        } else {
          if (!saveData.world_state.player) errors.push('world_state.player不存在');
          if (!saveData.world_state.header) errors.push('world_state.header不存在');
        }

        if (saveData.meta && saveData.meta.checksum && saveData.world_state) {
          var computedChecksum = generateChecksum(JSON.stringify(saveData.world_state));
          if (computedChecksum !== saveData.meta.checksum) {
            errors.push('checksum不匹配: 期望=' + saveData.meta.checksum + ' 实际=' + computedChecksum);
          }
        }

        if (errors.length > 0) {
          UI.showPreview(null, errors);
          DebugLogger.warn('SaveManager', '导入校验失败: ' + errors.join('; '));
        } else {
          UI.showPreview(saveData, []);
          DebugLogger.info('SaveManager', '导入校验通过: ' + (saveData.meta.world_name || '未知'));
        }
      } catch(parseErr) {
        UI.showPreview(null, ['JSON解析失败: ' + parseErr.message]);
        DebugLogger.error('SaveManager', '导入JSON解析失败: ' + parseErr.message);
      }
    };
    reader.readAsText(file);
  },
  confirmImport: function(saveData) {
    if (!saveData) return;
    StateManager.state = JSON.parse(JSON.stringify(saveData.world_state));
    StateManager.persist();
    MemoryManager._shortTerm = Array.isArray(saveData.short_term_memory) ? saveData.short_term_memory.slice() : [];
    MemoryManager._longTerm = Array.isArray(saveData.long_term_memory) ? saveData.long_term_memory.slice() : [];
    MemoryManager._lastTurn = saveData.last_turn || null;
    MemoryManager._save();
    if (saveData.sessions) {
      SessionStore.sessions = JSON.parse(JSON.stringify(saveData.sessions));
      SessionStore._save();
    }
    StateManager.state.header.last_input_timestamp = Date.now();
    UI.clearNarrative();
    UI.appendSystem('存档已恢复。欢迎回到' + (saveData.meta.world_name || '世界') + '。');
    var importOpts = ['继续冒险', '查看周围', '检查状态', '休息片刻'];
    ProgramHub.setCurrentOptions(importOpts);
    UI.renderOptions(importOpts);
    UI.updateStatusBar();
    UI.updateTopBar();
    ProgramHub.setPending(false);
    UI.hideLoading();
    UI.focusInput();
    DebugLogger.info('SaveManager', '存档导入确认完成');

  startTypewriter: function(text) {
    var self = this;
    if (self._typewriterTimer) {
      clearTimeout(self._typewriterTimer);
      self._typewriterTimer = null;
    }
    self._typewriterActive = true;

    var div = document.createElement('div');
    div.className = 'entry typewriter-cursor';
    self._els['narrative'].appendChild(div);

    var idx = 0;
    var speed = SettingsManager.get().typeSpeed || 30;
     var punctuationChars = "，。！？；：、\"\"''（）【】《》…—·";

    function nextChar() {
      if (!self._typewriterActive) {
        div.classList.remove('typewriter-cursor');
        self._typewriterTimer = null;
        return;
      }
      if (idx >= text.length) {
        div.classList.remove('typewriter-cursor');
        self._typewriterTimer = null;
        self._typewriterActive = false;
        self.scrollToBottom();
        return;
      }
      div.textContent += text.charAt(idx);
      idx++;
      self.scrollToBottom();
      var delay = speed;
      if (idx > 0 && punctuationChars.indexOf(text.charAt(idx - 1)) >= 0) {
        delay = speed + 120;
      }
      self._typewriterTimer = setTimeout(nextChar, delay);
    }

    self._typewriterTimer = setTimeout(nextChar, speed);
  },

  skipTypewriter: function() {
    if (!this._typewriterActive) return;
    this._typewriterActive = false;
    if (this._typewriterTimer) {
      clearTimeout(this._typewriterTimer);
      this._typewriterTimer = null;
    }
    var entries = this._els['narrative'].querySelectorAll('.typewriter-cursor');
    for (var i = 0; i < entries.length; i++) {

/* ================================================================
   15. InputHandler
   ================================================================ */
var InputHandler = {
  _history: [],
  _historyIdx: -1,

  init: function() {
    var self = this;
    var input = UI._els['player-input'];

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        var val = input.value.trim();
        if (!val && SettingsManager.get().autoContinue) {
          var opts = ProgramHub.getCurrentOptions();
          if (opts && opts.length > 0) {
            self.handleOptionClick(0);
            return;
          }
        }
        if (!val) return;
        self.handleSubmit(val);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (self._history.length === 0) return;
        if (self._historyIdx === -1) self._historyIdx = self._history.length - 1;
        else if (self._historyIdx > 0) self._historyIdx--;
        input.value = self._history[self._historyIdx];
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (self._historyIdx === -1) return;
        if (self._historyIdx < self._history.length - 1) {
          self._historyIdx++;
          input.value = self._history[self._historyIdx];
        } else {
          self._historyIdx = -1;
          input.value = '';
        }
      }
    });

    UI._els['send-btn'].addEventListener('click', function() {
      var val = input.value.trim();
      if (!val && SettingsManager.get().autoContinue) {
        var opts = ProgramHub.getCurrentOptions();
        if (opts && opts.length > 0) {
          self.handleOptionClick(0);
          return;
        }
      }
      if (!val) return;
      self.handleSubmit(val);
    });

    document.addEventListener('keydown', function(e) {
      if (ProgramHub.isPending()) {
        if (e.key === 'Escape') {
          var timeoutDialog = document.getElementById('timeout-dialog');
          if (timeoutDialog.classList.contains('visible')) {
            e.preventDefault();
          }
        }
        return;
      }

      if (e.key === 'Escape') {
        e.preventDefault();
        var td = document.getElementById('timeout-dialog');
        if (td.classList.contains('visible')) return;
        if (UI._els['panel-overlay'].classList.contains('visible')) { UI.closePanel(); return; }
        if (UI._els['settings-overlay'].classList.contains('visible')) { UI.hideSettings(); return; }
        if (UI._els['preview-overlay'].classList.contains('visible')) { UI.closePreview(); return; }
        if (UI._els['debug-overlay'].classList.contains('visible')) { DebugLogger.hide(); return; }
        UI.openPanel(0);
        return;
      }

      if (e.key === 'F1') {
        e.preventDefault();
        DebugLogger.toggle();
        return;
      }

      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        SaveManager.exportSave();
        return;
      }

      if (e.key === ' ' && document.activeElement !== input) {
        e.preventDefault();
        UI.skipTypewriter();
        return;
      }

      if (['1', '2', '3', '4'].indexOf(e.key) >= 0 && document.activeElement !== input) {
        e.preventDefault();
        var opts = ProgramHub.getCurrentOptions();
        var idx = parseInt(e.key, 10) - 1;
        if (opts && idx < opts.length) {
          self.handleOptionClick(idx);
        }
      }
    });
  },

  handleSubmit: function(text) {
    this._history.push(text);
    this._historyIdx = -1;
    UI._els['player-input'].value = '';
    UI.renderOptions([]);
    UI.appendNarrative('> ' + text);
    ProgramHub.mainLoop(text);
  },

  handleOptionClick: function(index) {
    var opts = ProgramHub.getCurrentOptions();
    if (!opts || index >= opts.length) return;
    var optText = opts[index];
    this._history.push(optText);
    this._historyIdx = -1;
    UI._els['player-input'].value = '';
    UI.renderOptions([]);
    UI.appendNarrative('> ' + optText);
    ProgramHub.mainLoop(optText);
  }
};

/* ================================================================
   16. 初始化 — 严格顺序
   ================================================================ */
window.onerror = function(msg, source, lineno, colno, error) {
  var errMsg = msg;
  if (error && error.stack) errMsg += '\n' + error.stack;
  DebugLogger.error('GlobalError', '行' + lineno + ': ' + errMsg);
  return false;
};

document.addEventListener('DOMContentLoaded', function() {
  /* 步骤1: DebugLogger.init() */
  DebugLogger.init();

  /* 步骤2: 应用设置CSS变量 */
  SettingsManager._apply(SettingsManager.get());

  /* 步骤3: UI.init() — 缓存所有DOM引用 */
  UI.init();

  /* 步骤4: InputHandler.init() — 绑定键盘/点击事件 */
  InputHandler.init();

  /* 步骤5: StateManager.init() — 从localStorage恢复或创建默认 */
  StateManager.init();

  /* 步骤6: MemoryManager.init() — 恢复短期/长期记忆 */
  MemoryManager.init();

  /* 步骤7: SessionStore.init() — 恢复Agent会话 */
  SessionStore.init();

    /* 恢复API Key — 使用setter确保localStorage一致性 */
  try {
    var savedKey = localStorage.getItem(STORAGE_PREFIX + 'api_key');
    if (savedKey) {
      CONFIG.apiKey = savedKey;
    }
  } catch(e) {}

  /* 步骤8: 事件绑定 */
  UI._els['btn-panel'].addEventListener('click', function() { UI.openPanel(0); });
  UI._els['btn-newgame'].addEventListener('click', function() {
    if (confirm('确定要开始新游戏吗？当前进度将丢失。')) {
      StateManager.state = JSON.parse(JSON.stringify(DEFAULT_STATE));
      StateManager.persist();
      MemoryManager._shortTerm = []; MemoryManager._longTerm = []; MemoryManager._lastTurn = null;
      MemoryManager._save();
      SessionStore.clearAll();
      UI.clearNarrative();
      UI.renderOptions([]);
      UI.showWelcome();
      UI.updateStatusBar();
    }
  });
  UI._els['btn-settings'].addEventListener('click', function() { UI.showSettings(); });

  UI._els['import-file-input'].addEventListener('change', function(e) {
    if (e.target.files && e.target.files[0]) {
      SaveManager.importSave(e.target.files[0]);
      e.target.value = '';
    }
  });

  UI._els['panel-overlay'].addEventListener('click', function(e) {
    if (e.target === UI._els['panel-overlay']) UI.closePanel();
  });
  UI._els['preview-overlay'].addEventListener('click', function(e) {
    if (e.target === UI._els['preview-overlay']) UI.closePreview();
  });
  UI._els['settings-overlay'].addEventListener('click', function(e) {
    if (e.target === UI._els['settings-overlay']) UI.hideSettings();
  });

  UI._els['debug-close'].addEventListener('click', function() { DebugLogger.hide(); });
  UI._els['btn-debug'].addEventListener('click', function() { DebugLogger.toggle(); });


  /* 步骤9: 检查CONFIG.apiKey */
  if (!CONFIG.apiKey) {
    UI.showSettings('api-key');
  }

  /* 步骤10: 检查世界状态 */
  var hasState = false;
  try {
    var rawState = localStorage.getItem(STORAGE_PREFIX + 'world_state');
    if (rawState) {
      var parsed = JSON.parse(rawState);
      if (parsed && parsed.player && parsed.header) hasState = true;
    }
  } catch(e) {}

  if (hasState && StateManager.state.header.turn > 0) {
    UI.appendSystem('检测到已保存的游戏进度。输入任意内容继续冒险，或点击"新游戏"重新开始。');
    var resumeOpts = ['继续冒险', '查看周围', '检查状态', '休息片刻'];
    ProgramHub.setCurrentOptions(resumeOpts);
    UI.renderOptions(resumeOpts);
    UI.updateStatusBar();
    UI.updateTopBar();
  } else if (!hasState || StateManager.state.header.turn === 0) {
    UI.showWelcome();
  }

  /* 步骤11: UI.focusInput() */
  UI.focusInput();

  /* 运行时自检 */
  var agentCount = 0;
  for (var id in AgentRegistry.agents) {
    if (AgentRegistry.agents.hasOwnProperty(id)) agentCount++;
  }
  var abCount = 0;
  for (var id2 in AgentRegistry.agents) {
    if (AgentRegistry.agents.hasOwnProperty(id2) && shouldInjectArmorBreak(id2)) abCount++;
  }
  console.log('Agent数量:', agentCount);
  console.log('破甲数量:', abCount);
  if (AgentRegistry.agents['L0']) {
    console.log('L0 max_tokens:', AgentRegistry.agents['L0'].max_tokens);
  }

  DebugLogger.info('Init', '初始化完成 ✅ Agent:' + agentCount + ' 破甲:' + abCount);
});
</script>
