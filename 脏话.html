<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>脏话生成 v6.0</title>
<style>
  :root {
    --bg: #1a1a1a; --surface: #2a2a2a; --border: #444; --text: #e0e0e0;
    --text-muted: #999; --accent: #ff4d4d; --accent-hover: #ff6666;
    --danger: #ff3333; --input-bg: #0f0f0f; --overlay: rgba(0,0,0,0.8);
    --good: #4caf50; --warn: #ff9800; --info: #4da6ff; --debug-bg: #0d1117;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI','Microsoft YaHei',sans-serif; line-height: 1.5; padding: 0 10px 30px; max-width: 800px; margin: 0 auto; }
  h1 { text-align: center; font-size: 2rem; margin: 20px 0 25px; color: var(--danger); letter-spacing: 2px; }
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 20px; }
  label { display: block; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 5px; font-weight: bold; }
  input,textarea,select { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 10px; font-size: 1rem; margin-bottom: 8px; resize: vertical; font-family: inherit; }
  textarea { min-height: 80px; } select { cursor: pointer; }
  .btn { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 12px 20px; font-size: 1rem; cursor: pointer; font-weight: bold; letter-spacing: 1px; width: 100%; margin-top: 5px; transition: background 0.2s; }
  .btn:hover { background: var(--accent-hover); } .btn:disabled { opacity: 0.7; cursor: not-allowed; }
  .btn.secondary { background: #555; margin-top: 8px; } .btn.secondary:hover { background: #666; }
  .btn.copy-btn { background: #333; width: auto; padding: 4px 12px; font-size: 0.75rem; margin: 0; float: right; } .btn.copy-btn:hover { background: #444; }
  .flex-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; } .flex-row .btn { width: auto; flex: 1; }
  details>summary { cursor: pointer; padding: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--accent); font-weight: bold; text-align: center; margin-bottom: 10px; user-select: none; }
  details[open]>summary { border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
  .quotes-list { max-height: 350px; overflow-y: auto; background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px; margin: 10px 0; font-size: 0.85rem; color: #bbb; }
  .quote-item { padding: 4px 0; border-bottom: 1px solid #222; position: relative; } .quote-item:last-child { border-bottom: none; }
  .quote-item .del-quote { position: absolute; right: 0; top: 50%; transform: translateY(-50%); color: var(--danger); cursor: pointer; font-size: 0.9rem; padding: 0 6px; display: none; }
  .quote-item:hover .del-quote { display: block; } .quote-item:hover { padding-right: 30px; }
  .history-item { background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px; margin-bottom: 8px; font-size: 0.9rem; position: relative; }
  .history-item small { color: var(--text-muted); display: block; margin-bottom: 4px; } .history-text { white-space: pre-wrap; color: #ddd; }
  .latest-result { background: var(--input-bg); border: 1px solid var(--accent); border-radius: 8px; padding: 15px; margin-bottom: 15px; font-size: 0.95rem; position: relative; }
  .latest-result small { color: var(--text-muted); display: block; margin-bottom: 8px; }
  .clear-btn { background: #333; color: #ccc; border: 1px solid #555; border-radius: 4px; padding: 6px 14px; font-size: 0.8rem; cursor: pointer; margin-top: 10px; float: right; } .clear-btn:hover { background: #444; }
  .slider-container { display: flex; align-items: center; gap: 10px; margin: 10px 0; } .slider-container input[type=range] { flex: 1; }
  .strength-label { min-width: 100px; font-size: 0.9rem; color: var(--danger); white-space: nowrap; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; display: none; } .progress-bar.active { display: block; }
  .progress-inner { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s ease; border-radius: 2px; }
  .timer-text { text-align: center; font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; display: none; } .timer-text.active { display: block; }
  details.scene-details>summary { background: var(--surface); color: var(--warn); font-size: 0.85rem; }
  .species-tags { display: inline-block; background: #3a1a1a; border: 1px solid #ff4d4d55; border-radius: 4px; padding: 1px 8px; font-size: 0.7rem; margin-right: 4px; color: var(--accent); }
  .debug-panel { background: var(--debug-bg); border: 1px solid #333; border-radius: 6px; font-family: 'Consolas','Courier New',monospace; font-size: 0.75rem; }
  .debug-panel summary { color: var(--info); padding: 8px 12px; cursor: pointer; background: #111; border-radius: 6px; }
  .debug-panel[open] summary { border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
  .debug-log { max-height: 300px; overflow-y: auto; padding: 8px 12px; color: #aaa; line-height: 1.6; }
  .debug-log .log-line { padding: 2px 0; border-bottom: 1px solid #111; } .debug-log .log-time { color: #555; margin-right: 8px; }
  .debug-log .log-step { color: var(--info); font-weight: bold; } .debug-log .log-ok { color: var(--good); }
  .debug-log .log-warn { color: var(--warn); } .debug-log .log-err { color: var(--danger); } .debug-log .log-detail { color: #777; margin-left: 8px; }
  .phase-indicator { display: flex; gap: 4px; justify-content: center; margin: 6px 0; font-size: 0.7rem; color: var(--text-muted); }
  .phase-indicator .phase { padding: 2px 8px; border-radius: 3px; background: #222; }
  .phase-indicator .phase.active { background: var(--accent); color: #fff; } .phase-indicator .phase.done { background: #2a5a2a; color: var(--good); }
  .ai-badge { display: inline-block; background: #1a3a5a; border: 1px solid #4da6ff55; border-radius: 3px; padding: 1px 6px; font-size: 0.65rem; color: var(--info); margin-left: 4px; vertical-align: middle; }
  @media (max-width:500px) { .flex-row { flex-direction: column; } .btn { padding: 10px; } }
</style>

<details id="quotesDetails" style="margin-bottom:20px;"><summary>语录库 (<span id="quoteCount">0</span> 条)</summary><div class="section" style="border:none;background:transparent;padding:0;">

  <input type="file" id="importFileInput" accept=".json" style="display:none;">
</div></details>
<details class="debug-panel" id="debugPanel" style="margin-bottom:20px;"><summary>调试日志 (0条)</summary><div class="debug-log" id="debugLog"></div></details>

const debugEntries = [];
function debugLog(step, status, detail) {
  const t = new Date().toLocaleTimeString('zh-CN', { hour12: false });
  debugEntries.push({ time: t, step, status, detail });
  const logEl = document.getElementById('debugLog');
  const cls = status === 'OK' ? 'log-ok' : status === 'WARN' ? 'log-warn' : status === 'ERR' ? 'log-err' : '';
  logEl.innerHTML += '<div class="log-line"><span class="log-time">' + t + '</span><span class="log-step">[' + step + ']</span> <span class="' + cls + '">' + status + '</span><span class="log-detail">' + (detail||'') + '</span></div>';
  logEl.scrollTop = logEl.scrollHeight;
  document.getElementById('debugPanel').querySelector('summary').textContent = '调试日志 (' + debugEntries.length + '条)';
}

// ==================== localStorage读写 ====================
function loadQuotes() {
  var stored = localStorage.getItem('spray_quotes_v3');
  if (stored) {
    try {
      var arr = JSON.parse(stored);
      if (Array.isArray(arr) && arr.length > 0) {
        debugLog('初始化', 'OK', '从localStorage加载 ' + arr.length + '条');
        return arr;
      }
    } catch(e) {
      debugLog('初始化', 'WARN', 'localStorage损坏，使用内置库');
    }
  }
  var builtin = QUOTES.map(function(q) { return { text: q.text, tags: q.tags }; });
  saveQuotes(builtin);
  debugLog('初始化', 'OK', '首次写入内置库 ' + builtin.length + '条');
  return builtin;
}

function renderQuotes() {
  quoteCountSpan.textContent = quotes.length;
  quotesListDiv.innerHTML = quotes.map(function(q, i) {
    var isAiTagged = q.tags && typeof q.tags === 'object' && q.tags.intensity !== undefined;
    var aiBadge = isAiTagged ? '<span class="ai-badge">精标</span>' : '';
    return '<div class="quote-item">' + q.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + aiBadge + '<span class="del-quote" data-idx="' + i + '">x</span></div>';
  }).join('');
  document.querySelectorAll('.del-quote').forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      var idx = parseInt(el.dataset.idx);
      if (confirm('删除: "' + quotes[idx].text.substring(0, 30) + '..." ?')) {
        quotes.splice(idx, 1);
        saveQuotes(quotes);
        renderQuotes();
      }
    });
  });
}

$('addQuotesBtn').addEventListener('click', function() {
  var raw = $('newQuotes').value.trim();
  if (!raw) return;
  var lines = raw.split(/[\n\r]+/).filter(function(l) { return l.trim(); });
  var added = 0;
  lines.forEach(function(line) {
    var text = line.trim();
    if (quotes.some(function(q) { return q.text === text; })) return;
    quotes.push({ text: text, tags: null });
    added++;
  });
  if (added > 0) {
    saveQuotes(quotes);
    $('newQuotes').value = '';
    renderQuotes();
    debugLog('添加', 'OK', '手动添加' + added + '条');
    $('aiTagBtn').textContent = 'AI精标未标注语录';
  }
});

$('aiTagBtn').addEventListener('click', async function() {
  var apiKey = apiKeyInput.value.trim();
  if (!apiKey) { alert('请先输入API Key'); return; }
  var untagged = [];
  quotes.forEach(function(q, i) {
    if (!q.tags || typeof q.tags !== 'object' || q.tags.intensity === undefined) untagged.push({ idx: i, text: q.text });
  });
  if (untagged.length === 0) {
    alert('所有语录已精标');
    $('aiTagBtn').textContent = 'AI精标未标注语录(全部精标)';
    return;
  }
  if (!confirm('检测到' + untagged.length + '条未精标语录，调用AI标注？')) return;
  $('aiTagBtn').disabled = true; $('aiTagBtn').textContent = 'AI精标中...';
  debugLog('AI精标', 'START', '待标' + untagged.length + '条');
  try {
    var resp = await fetch('https://api.deepseek.com', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({
        model: 'deepseek-v4-flash',
        messages: [
          { role: 'system', content: AI_TAG_PROMPT },
          { role: 'user', content: JSON.stringify(untagged.map(function(u) { return u.text; })) }
        ],
        temperature: 0.2
      })
    });
    if (!resp.ok) throw new Error(resp.status === 402 ? '余额不足' : resp.status === 429 ? '请求频繁' : resp.status === 401 ? 'APIKey无效' : 'HTTP ' + resp.status);
    var data = await resp.json();
    var rawContent = data.choices[0].message.content.trim();
    if (rawContent.startsWith('```')) rawContent = rawContent.replace(/^```json?\s*/i, '').replace(/\s*```$/, '');
    var aiResult = JSON.parse(rawContent);
    var taggedList = Array.isArray(aiResult) ? aiResult : (aiResult.result || aiResult.data || aiResult.tags || []);
    var updated = 0;
    if (Array.isArray(taggedList)) {
      taggedList.forEach(function(item) {
        if (item.text && item.tags && item.tags.intensity !== undefined) {
          for (var i = 0; i < quotes.length; i++) {
            if (quotes[i].text === item.text) { quotes[i].tags = item.tags; updated++; break; }
          }
        }
      });
    }
    saveQuotes(quotes); renderQuotes();
    debugLog('AI精标', 'OK', updated + '/' + untagged.length + '条');
    alert('AI精标完成：' + updated + '/' + untagged.length + '条');
    var remaining = 0;
    quotes.forEach(function(q) { if (!q.tags || typeof q.tags !== 'object' || q.tags.intensity === undefined) remaining++; });
    $('aiTagBtn').textContent = remaining === 0 ? 'AI精标未标注语录(全部精标)' : 'AI精标未标注语录';
  } catch(err) {
    debugLog('AI精标', 'ERR', err.message);
    alert('AI精标失败：' + err.message);
  } finally {
    $('aiTagBtn').disabled = false;
  }
});

$('exportQuotesBtn').addEventListener('click', function() {
  var jsonStr = JSON.stringify(quotes, null, 2);
  var encoder = new TextEncoder(); var bytes = encoder.encode(jsonStr);
  var result = '';
  for (var i = 0; i < bytes.length; i += 0x8000) result += String.fromCharCode.apply(null, bytes.subarray(i, Math.min(i + 0x8000, bytes.length)));
  var a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8;base64,' + btoa(result);
  a.download = 'sunba_quotes.json'; a.click(); a.remove();
  debugLog('导出', 'OK', quotes.length + '条');
});

  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var imported = JSON.parse(ev.target.result);
      if (!Array.isArray(imported)) throw new Error('需要JSON数组');
      var untaggedCount = 0;
      imported.forEach(function(item) {
        if (!item.tags || typeof item.tags !== 'object' || item.tags.intensity === undefined) { item.tags = null; untaggedCount++; }
      });
      quotes = imported; saveQuotes(quotes); renderQuotes();
      var msg = '导入' + imported.length + '条';
      if (untaggedCount > 0) msg += ' (' + untaggedCount + '条未精标,建议点击AI精标)';
      alert(msg); debugLog('导入', 'OK', msg);
      $('aiTagBtn').textContent = 'AI精标未标注语录';
    } catch(err) { alert('导入失败: ' + err.message); debugLog('导入', 'ERR', err.message); }
  };
  reader.readAsText(file); importFileInput.value = '';
});

    var kHtml = latest.loadedSkills && latest.loadedSkills.length > 0 ? '<div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:4px;">技能: ' + latest.loadedSkills.join(', ') + '</div>' : '';
    latestResult.innerHTML = '<small>' + latest.time + ' 强度:' + latest.intensity + '/10 ' + latest.roleName + ' ' + latest.sceneName + ' | ' + latest.targetPreview + '</small>' + sHtml + kHtml + '<div style="white-space:pre-wrap;color:#ddd;">' + latest.result.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div><button class="btn copy-btn" id="copyLatestBtn">复制</button><div style="clear:both;"></div>';
    $('copyLatestBtn').addEventListener('click', function() { navigator.clipboard.writeText(latest.result).then(function() { var b = $('copyLatestBtn'); b.textContent = '已复制!'; setTimeout(function() { b.textContent = '复制'; }, 1500); }); });
  } else { latestSection.style.display = 'none'; }
  renderOldHistory();
}

async function classifySpecies(text, apiKey) {
  var t0 = Date.now();
  debugLog('成分分析', 'START', '原文' + text.length + '字符');
  var resp = await fetch('https://api.deepseek.com/chat/completions', {
    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
    body: JSON.stringify({ model: 'deepseek-v4-flash', messages: [{ role: 'system', content: L1_ARMOR_BREAK_PROMPT }, { role: 'user', content: text }], temperature: 0.1, response_format: { type: 'json_object' } })
  });
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  var data = await resp.json();
  var cleaned = data.choices[0].message.content.trim();
  if (cleaned.startsWith('```')) cleaned = cleaned.replace(/^```json?\s*/i, '').replace(/\s*```$/, '');
  var parsed = JSON.parse(cleaned);
  debugLog('成分分析', 'OK', (Date.now() - t0) + 'ms 标签:' + ((parsed.tags || []).join(',') || '无'));
  return { tags: parsed.tags || [], slices: parsed.slices || {} };
}


function loadSkills(intensity, roleId, sceneId) {
  // 1. 获取固定表中的技能（根据强度）
  var fixed = FIXED_SKILL_TABLE[intensity] || [];
  var loaded = new Set(fixed);
  var details = fixed.map(function(s) { return { id: s, src: '固定表' }; });

  // 2. 添加场景技能（始终保留）
  if (SCENES[sceneId] && SCENES[sceneId].skills) {
    SCENES[sceneId].skills.forEach(function(s) {
      if (!loaded.has(s)) {
        loaded.add(s);
        details.push({ id: s, src: '场景' });
      }
    });
  }

  // 3. 添加角色技能（始终保留）
  if (ROLES[roleId] && ROLES[roleId].skills) {
    ROLES[roleId].skills.forEach(function(s) {
      if (!loaded.has(s)) {
        loaded.add(s);
        details.push({ id: s, src: '角色' });
      }
    });
  }

  // 4. 和谐判定：强度 <= 5 且还没有 H1 时强制添加
  var harmony = intensity <= 5;
  if (harmony && !loaded.has('H1')) {
    loaded.add('H1');
    details.push({ id: 'H1', src: '强制和谐' });
  }

  debugLog('技能装载', 'OK', loaded.size + '个 和谐:' + (harmony ? '是' : '否'));
  return { loadedSkills: Array.from(loaded), harmonyEnabled: harmony, skillDetails: details };
}



function buildSystemPrompt(params) {
  var speciesResult = params.speciesResult, loadedSkills = params.loadedSkills, skillDetails = params.skillDetails;
  var harmonyEnabled = params.harmonyEnabled, intensity = params.intensity, roleId = params.roleId, sceneId = params.sceneId;
  var parts = [BASE_SYSTEM_SKELETON];
  parts.push('\n[成分分析]');
  if (speciesResult.tags.length > 0) {
    parts.push('标签: ' + speciesResult.tags.join(', '));
    for (var k in speciesResult.slices) { if (speciesResult.slices.hasOwnProperty(k)) parts.push('  ' + k + ': "' + speciesResult.slices[k] + '"'); }
  } else { parts.push('未检测到'); }
  parts.push('\n[技能 ' + loadedSkills.length + '个] ' + loadedSkills.join(', '));
  for (var i = 0; i < skillDetails.length; i++) { var sd = skillDetails[i]; var a = ATOM_SKILLS[sd.id]; if (a) parts.push('  ' + sd.id + '|' + a.name + '|' + sd.src); }
  parts.push('\n[和谐] ' + (harmonyEnabled ? '激活' : '关闭'));
if (harmonyEnabled) {
  parts.push('和谐替换规则（必须严格遵守）：');
  parts.push('1. 将所有直接脏话替换为同音近音字或拼音缩写：');
  parts.push('   - 傻逼 -> 沙碧 / sb');
  parts.push('   - 操你妈 -> 草拟吗 / cnm');
  parts.push('   - 鸡巴 -> 吉跋 / jb');
  parts.push('   - 逼 -> b / 碧');
  parts.push('   - 妈 -> 🐴 / 麻');
  parts.push('   - 死 -> 4 / s');
  parts.push('2. 侮辱性比喻保留，但关键词按上表替换。');
  parts.push('3. 输出必须是替换后的版本，攻击意图不变，但文字表面无直接敏感词。');
  parts.push('4. 示例："你妈死了，傻逼" 应输出为 "你🐴4了，sb" 或 "你麻s了，沙碧"。');
}
  parts.push('\n[语录库 ' + quotes.length + '条]');
  parts.push(quotes.map(function(q, i) {
    var t = q.tags;
    if (t && t.intensity !== undefined) return (i+1)+'.[强'+t.intensity+'|'+(t.style||[]).join('/')+'|'+(t.target||[]).join('/')+'|'+((t.emotion||[])[0]||'')+'] '+q.text;
    return (i+1)+'. '+q.text;
  }).join('\n'));
  parts.push('\nL4从语录检索3~5条最相似学习句式。');
  parts.push('\n[参数] 攻'+intensity+'/10 '+(ROLES[roleId]?ROLES[roleId].name:'')+' '+(SCENES[sceneId]?SCENES[sceneId].name:'')+' '+(SCENES[sceneId]?SCENES[sceneId].emotionParam:''));
  var prompt = parts.join('\n');
  debugLog('Prompt', 'OK', prompt.length + '字符');
  return prompt;
}

var progressSim = null;
function startProgressSim(phases) {
  stopProgressSim();
  var pct = 0, phase = 0, seg = 88 / phases, thresholds = [];
  for (var i = 1; i <= phases; i++) thresholds.push({ p: i, t: Math.floor(seg * i) });
  thresholds.push({ p: phases + 1, t: 100 });
  progressSim = setInterval(function() {
    var target = thresholds[Math.min(phase, thresholds.length - 1)].t;
    if (pct < target) { var r = target - pct; pct = Math.min(target, pct + Math.max(0.3, r * 0.08 + Math.random() * 0.5)); progressInner.style.width = pct.toFixed(1) + '%'; }
  }, 200);
  return {
    advance: function() { phase++; var t = thresholds[Math.min(phase, thresholds.length - 1)].t; var fc = setInterval(function() { var cur = parseFloat(progressInner.style.width); if (cur >= t - 0.5) { clearInterval(fc); progressInner.style.width = t + '%'; } else { progressInner.style.width = (cur + 2).toFixed(1) + '%'; } }, 50); },
    complete: function() { stopProgressSim(); progressInner.style.width = '100%'; },
    reset: function() { stopProgressSim(); progressInner.style.width = '0%'; }
  };
}
function stopProgressSim() { if (progressSim) { clearInterval(progressSim); progressSim = null; } }
function resetPhaseUI() { ph1.className = 'phase'; ph2.className = 'phase'; ph3.className = 'phase'; ph4.className = 'phase'; }

renderQuotes(); showLatestResult();
debugLog('初始化', 'OK', 'quotes='+quotes.length+'条 内置QUOTES='+QUOTES.length+'条 localStorage:'+(localStorage.getItem('spray_quotes_v3')?'有':'无'));

generateBtn.addEventListener('click', async function() {
  var apiKey = apiKeyInput.value.trim(), targetText = targetInput.value.trim();
  if (!apiKey) { alert('请输入API Key'); return; }
  if (!targetText) { alert('请输入目标原文'); return; }
  var intensity = parseInt(intensitySlider.value), roleId = roleSelect.value, sceneId = sceneSelect.value;
  resetPhaseUI(); phaseIndicator.style.display = 'flex';
  generateBtn.disabled = true; generateBtn.textContent = '运行中...';
  progressBar.classList.add('active'); timerText.classList.add('active');
  timerText.textContent = '准备就绪'; progressInner.style.width = '0%';
  debugEntries.length = 0; $('debugLog').innerHTML = '';
  $('debugPanel').querySelector('summary').textContent = '调试日志 (0条)';
  var tStart = Date.now();
  debugLog('生成', 'START', '强度'+intensity+' '+roleId+' '+sceneId+' quotes='+quotes.length+'条');
  var sim = startProgressSim(3);
  try {
    ph1.className = 'phase active'; timerText.textContent = '1/3 成分分析...'; sim.advance();
    var speciesResult = { tags: [], slices: {} };
    try { speciesResult = await classifySpecies(targetText, apiKey); } catch(e) { debugLog('成分分析', 'WARN', e.message); }
    ph1.className = 'phase done'; ph2.className = 'phase active'; timerText.textContent = '2/3 装载技能...'; sim.advance();
    var skillData = loadSkills(intensity, roleId, sceneId);
    var systemPrompt = buildSystemPrompt({ speciesResult: speciesResult, loadedSkills: skillData.loadedSkills, skillDetails: skillData.skillDetails, harmonyEnabled: skillData.harmonyEnabled, intensity: intensity, roleId: roleId, sceneId: sceneId });
    ph2.className = 'phase done'; ph3.className = 'phase active'; timerText.textContent = '3/3 深度思考...';
    generateBtn.textContent = 'AI思考中...'; sim.advance();
    var apiStart = Date.now();
    var resp = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({ model: 'deepseek-v4-flash', messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: '目标原文:\n' + targetText + '\n\n严格按L0-L7生成攻击文本。' }], temperature: 0.9, thinking: { type: 'enabled' }, reasoning_effort: 'high' })
    });
    var apiElapsed = Date.now() - apiStart;
    if (!resp.ok) {
      var m = 'HTTP ' + resp.status;
      if (resp.status === 402) m = '余额不足'; else if (resp.status === 429) m = '请求频繁'; else if (resp.status === 401) m = 'APIKey无效';
      else { try { var ej = await resp.json(); m = ej.error ? ej.error.message : m; } catch(_) {} }
      throw new Error(m);
    }
    var data = await resp.json();
    var result = data.choices[0].message.content;
    debugLog('API#2', 'OK', apiElapsed+'ms 输出'+result.length+'字符');
    sim.complete(); ph3.className = 'phase done'; ph4.className = 'phase active';
    timerText.textContent = '完成 (' + Math.floor((Date.now() - tStart) / 1000) + 's)';
    var history = loadHistory();
    var roleNames = { street_fighter: '战斗型', sarcasm_master: '阴阳大师', conclusion_king: '总结型', xiehouyu_master: '歇后语大师', couplet_maniac: '对联狂魔', chaos_evil: '混乱邪恶', fangirl_spray: '反串型' };
    var sceneNames = { scene_work: '下班红温', scene_sleepless: '深夜破防', scene_gaming: '游戏被坑', scene_hangry: '饿肚暴躁', scene_justice: '正义暴怒' };
    history.unshift({ time: new Date().toLocaleString(), roleName: roleNames[roleId] || roleId, sceneName: sceneNames[sceneId] || '默认', intensity: intensity, targetPreview: targetText.substring(0, 30) + (targetText.length > 30 ? '...' : ''), result: result, speciesTags: speciesResult.tags, loadedSkills: skillData.loadedSkills });
    saveHistory(history); showLatestResult(); targetInput.value = '';
  } catch(err) {
    debugLog('生成', 'ERR', err.message); alert('生成失败：' + err.message); sim.reset(); resetPhaseUI();
  } finally {
    stopProgressSim(); generateBtn.disabled = false; generateBtn.textContent = '生成攻击指令';
    progressBar.classList.remove('active');
    setTimeout(function() { timerText.classList.remove('active'); phaseIndicator.style.display = 'none'; progressInner.style.width = '0%'; timerText.textContent = '准备就绪'; }, 3000);
  }
});
