// ===== 边界条件与异常处理 =====
async function withRetry(fn, maxRetries = 3, baseDelay = 1000) {
  let lastError;
  for (let attempt = 0; attempt <= maxRetries; attempt++) {
    try {
      return await fn();
    } catch (error) {
      lastError = error;
      
      if (error.message.includes('401') || error.message.includes('403')) {
        throw error;
      }
      
      if (error.message.includes('429')) {
        const delay = baseDelay * Math.pow(2, attempt) + Math.random() * 1000;
        DebugLogger.warn('api', `429限流，${delay}ms后重试 (${attempt + 1}/${maxRetries})`);
        await new Promise(r => setTimeout(r, delay));
        continue;
      }
      
      if (attempt < maxRetries) {
        const delay = baseDelay * Math.pow(2, attempt);
        DebugLogger.warn('api', `网络错误，${delay}ms后重试 (${attempt + 1}/${maxRetries}): ${error.message}`);
        await new Promise(r => setTimeout(r, delay));
      }
    }
  }
  throw lastError;
}

function checkStorageQuota() {
  let total = 0;
  for (const key in localStorage) {
    if (localStorage.hasOwnProperty(key)) {
      total += localStorage[key].length * 2;
    }
  }
  const quotaMB = total / (1024 * 1024);
  const maxMB = 5;
  
  if (quotaMB > maxMB * 0.8) {
    return {
      warning: true,
      usage: quotaMB,
      limit: maxMB,
      message: `存储空间已使用 ${quotaMB.toFixed(1)}MB/${maxMB}MB，建议导出并清理旧记录`
    };
  }
  return { warning: false, usage: quotaMB, limit: maxMB };
}

// ===== 输入验证 =====
const VALIDATION_RULES = {
  agentName: {
    minLength: 1,
    maxLength: 30,
    pattern: /^[\u4e00-\u9fa5a-zA-Z0-9·\-\s]+$/,
    message: '名称需1~30字符，支持中英文数字和·-符号'
  },
  groupName: {
    minLength: 1,
    maxLength: 50,
    pattern: /^[^\n\r]{1,50}$/,
    message: '群名需1~50字符'
  },
  apiKey: {
    minLength: 1,
    maxLength: 200,
    message: 'API Key不能为空'
  },
  temperature: { min: 0, max: 2, message: '温度范围0~2' },
  maxTokens: { min: 256, max: 1048576, message: 'Token范围256~1048576' },
  concurrencyLimit: { min: 1, max: 10, message: '并发限制1~10' },
  wakeInterval: { min: 0, max: 100, message: '活跃度0~100（0=仅被@唤醒，值越大发言越积极）' },
  baseURL: {
    pattern: /^https?:\/\/.+/,
    message: 'Base URL需以http://或https://开头'
  }
};

function validateField(fieldName, value) {
  const rule = VALIDATION_RULES[fieldName];
  if (!rule) return { valid: true };
  
  if (rule.minLength !== undefined && String(value).length < rule.minLength) {
    return { valid: false, message: rule.message };
  }
  if (rule.maxLength !== undefined && String(value).length > rule.maxLength) {
    return { valid: false, message: rule.message };
  }
  if (rule.min !== undefined && Number(value) < rule.min) {
    return { valid: false, message: rule.message };
  }
  if (rule.max !== undefined && Number(value) > rule.max) {
    return { valid: false, message: rule.message };
  }
  if (rule.pattern && !rule.pattern.test(String(value))) {
    return { valid: false, message: rule.message };
  }
  return { valid: true };
}

function escapeHTML(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatTime(timestamp) {
  const now = Date.now();
  const diff = now - timestamp;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
  if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
  return new Date(timestamp).toLocaleDateString('zh-CN');
}

// ===== 聊天渲染 =====
function renderChatMessages() {
  if (!activeGroupId) return;
  
  const container = document.getElementById('messageList');
  const group = getGroup(activeGroupId);
  if (!group) return;
  
    const rawMessages = getMessages(activeGroupId);
  // 【Bug5修复】并行API调用完成时间不同，按timestamp升序排列，
  // 确保后完成的消息排在前面（最新消息在底部）。先按timestamp排，
  // 同timestamp时保持原有的保存顺序（稳定排序）。
  const messages = [...rawMessages].sort((a, b) => {
    if (a.timestamp !== b.timestamp) return a.timestamp - b.timestamp;
    // timestamp相同时保持原顺序
    return rawMessages.indexOf(a) - rawMessages.indexOf(b);
  });
  
  let html = '';
  
  for (const msg of messages) {
    const isUser = msg.senderType === 'user';
    const isSystem = msg.senderType === 'system';
    const agent = msg.senderId ? getAgentFriend(msg.senderId) : null;
    const member = msg.senderId ? group.members.find(m => m.agentId === msg.senderId) : null;
    
    if (isSystem) {
      html += `
        <div class="message-wrapper system">
          <div class="message-bubble system-bg">${escapeHTML(msg.content)}</div>
        </div>`;
      continue;
    }
    
    const senderName = msg.senderName || (agent ? agent.name : '未知');
    const avatar = agent ? agent.avatar : (isUser ? '我' : '?');
    
    let roleBadge = '';
    if (member?.role === 'host') roleBadge = '<span class="badge badge-host">群主</span>';
    if (member?.role === 'admin') roleBadge = '<span class="badge badge-admin">管理</span>';
    if (member?.isMuted) roleBadge += '<span class="badge badge-muted">禁言</span>';
    
    let quoteHTML = '';
    if (msg.quotedMessageId) {
      const quoted = findMessageById(messages, msg.quotedMessageId);
      if (quoted) {
        const quotedId = quoted.id; // 用查到的完整ID做滚动定位
        quoteHTML = `
          <div class="quote-block" onclick="scrollToMessage('${quotedId}')">
            ${escapeHTML(quoted.senderName)}: ${escapeHTML((quoted.cleanContent || quoted.content || '').substring(0, 60))}...
          </div>`;
      }
    }
    
    const contentText = msg.cleanContent || msg.content || '';
    const isLong = contentText.length > 400;
    const msgId = msg.id;
    
    let commandResultHTML = '';
    if (msg.commandBlock) {
      commandResultHTML = renderCommandStatus(msg.commandBlock, msg.commandResult);
    }
    
    html += `
      <div class="message-wrapper ${isUser ? 'user' : 'agent'}" id="msg-${msgId}">

function renderCommandStatus(commandBlock, commandResult) {
  if (!commandBlock) return '';
  
  if (commandBlock.command === 'propose') {
    const proposal = ProposalStateMachine.proposals.get(commandBlock.proposalId);
    if (!proposal) {
      return `<div class="vote-status-bar">
        <span class="pending">提议: ${escapeHTML((commandBlock.content || '').substring(0, 40))}...</span>
      </div>`;
    }
    
    const votes = Object.values(proposal.votes || {});
    const agrees = votes.filter(v => v.vote === 'agree').length;
    const disagrees = votes.filter(v => v.vote === 'disagree').length;
    const statusText = proposal.status === 'passed' ? '[已通过]' 
      : proposal.status === 'rejected' ? '[已否决]'
      : proposal.status === 'timeout' ? '[已超时]'
      : `[表决中 ${agrees + disagrees}票]`;
    
    return `<div class="vote-status-bar">
      ${proposal.status === 'open' ? '<span class="pending">' + statusText + '</span>' : ''}
      ${proposal.status === 'passed' ? '<span class="agree">' + statusText + '</span>' : ''}
      ${proposal.status === 'rejected' ? '<span class="disagree">' + statusText + '</span>' : ''}
      ${proposal.status === 'timeout' ? '<span class="timeout">' + statusText + '</span>' : ''}
      <span class="agree">同意: ${agrees}</span>
      <span class="disagree">反对: ${disagrees}</span>
    </div>`;
  }
  
  return '';
}

function renderMarkdown(text) {
  if (!text) return '';
  let html = escapeHTML(text);
  
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, 
    '<pre style="background:rgba(255,255,255,0.05);padding:8px;border-radius:4px;overflow-x:auto;font-size:13px;font-family:var(--font-mono);">$2</pre>');
  
  html = html.replace(/`([^`]+)`/g, 
    '<code style="background:rgba(255,255,255,0.08);padding:1px 4px;border-radius:2px;font-family:var(--font-mono);font-size:13px;">$1</code>');
  
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  
  html = html.replace(/@(\S+)/g, '<span class="mention-tag">@$1</span>');
  
  html = html.replace(/\n/g, '<br>');
  
  return html;
}

// ===== 消息发送 =====
let isDiscussionRunning = false;

async function sendMessage() {
  const input = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  
  // 如果正在讨论中，这次点击是"停止"
  if (isDiscussionRunning) {
    stopDiscussion();
    return;
  }
  
  const content = input.value.trim();
  if (!content || !activeGroupId) return;
  
  input.value = '';
  input.style.height = 'auto';
  
  // 切换为停止模式
  enterStopMode();
  
  try {
    await runChatRound(activeGroupId, content);
  } catch(e) {
    if (e.message !== '讨论已被终止') {
      addSystemMessage(activeGroupId, `[错误] ${e.message}`);
      DebugLogger.error('chat', `sendMessage异常: ${e.message}`);
    }
  }
  
  // 恢复发送模式
  exitStopMode();
  
  renderChatMessages();
  renderGroupList();
}

function enterStopMode() {
  isDiscussionRunning = true;
  const sendBtn = document.getElementById('sendBtn');
  const input = document.getElementById('messageInput');
  
  sendBtn.textContent = '⏹ 停止';
  sendBtn.className = 'btn danger stop-active';
  input.disabled = true;
  input.placeholder = '讨论进行中... 点击红色按钮停止';
}

function exitStopMode() {
  isDiscussionRunning = false;
  const sendBtn = document.getElementById('sendBtn');
  const input = document.getElementById('messageInput');
  
  sendBtn.textContent = '发送';
  sendBtn.className = 'btn primary';
  input.disabled = false;
  input.placeholder = '输入消息... 使用 @ 提及Agent';
  input.focus();
}

function stopDiscussion() {
  if (!activeGroupId) return;
  abortGroupDiscussion(activeGroupId, '用户手动终止');
  addSystemMessage(activeGroupId, '[系统] ⏹ 用户手动终止了本轮讨论');
  exitStopMode();
  renderChatMessages();
  renderGroupList();
}

function getNextRoundIndex(groupId) {
  const messages = getMessages(groupId);
  if (messages.length === 0) return 0;
  return Math.max(...messages.map(m => m.roundIndex || 0)) + 1;
}

function addSystemMessage(groupId, content) {
  const msg = {
    id: generateUUID(),
    groupId,
    roundIndex: getNextRoundIndex(groupId),
    senderType: 'system',
    senderId: null,
    senderName: '系统',
    content,
    cleanContent: content,
    thinkingContent: null,
    commandBlock: null,
    commandResult: null,
    quotedMessageId: null,
    mentions: [],
    timestamp: Date.now()
  };
  saveMessage(groupId, msg);
}

// ===== 文件上传处理 =====
function handleFileUpload(input) {
  const groupId = window._uploadToGroupId || activeGroupId;
  if (window._uploadToGroupId === groupId) window._uploadToGroupId = null;
  if (!groupId) return;
  const file = input.files[0];
  if (!file) return;
  const MAX_SIZE = 10 * 1024 * 1024;
  if (file.size > MAX_SIZE) {
    showToast('文件不能超过10MB', 'error');
    input.value = '';
    return;
  }
  const ext = '.' + file.name.split('.').pop().toLowerCase();
  if (!FILE_PARSERS[ext]) {
    showToast('不支持的文件类型: ' + ext, 'error');
    input.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      const content = await FILE_PARSERS[ext](reader.result);
      if (!groupFiles[groupId]) groupFiles[groupId] = [];
      groupFiles[groupId] = groupFiles[groupId].filter(f => f.filename !== file.name);
      groupFiles[groupId].push({
        filename: file.name,
        content: content,
        size: file.size,
        timestamp: Date.now(),
        visible: true
      });
      addSystemMessage(groupId, '📎 已上传: ' + file.name + ' (' + (file.size/1024).toFixed(1) + 'KB)\nAgent可用 {"readFile":"' + file.name + '"} 读取');
      showToast('✅ 已上传: ' + file.name + ' (' + (file.size/1024).toFixed(1) + 'KB)', 'success');
      saveGroupFiles();
      DebugLogger.info('file', '上传文件: ' + file.name + ' (' + ext + ', ' + (file.size/1024).toFixed(1) + 'KB)');
    } catch(err) {
      showToast(file.name + ' 解析失败: ' + err.message, 'error');
      DebugLogger.error('file', '解析失败: ' + file.name + ' - ' + err.message);
    }
  };
  reader.onerror = () => {
    showToast('文件读取失败', 'error');
  };
  reader.readAsArrayBuffer(file);
  input.value = '';
}

// ===== JS字符串转义 =====
function escapeJSStr(s) {
  return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

// ===== Toast 提示 =====
function showToast(msg, type = 'success') {
  const existing = document.getElementById('toastEl');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.id = 'toastEl';
  const color = type === 'error' ? 'var(--accent-red)' : type === 'warning' ? 'var(--accent-gold)' : 'var(--accent-green)';
  toast.style.cssText = `
    position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:500;
    padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;
    background:rgba(0,0,0,0.9);border:1px solid ${color};color:${color};
    pointer-events:none;transition:opacity 0.3s;white-space:nowrap;
  `;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2500);
}

function handleInputKeydown(event) {
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    if (isDiscussionRunning) {
      // 讨论进行中，回车=停止
      stopDiscussion();
    } else {
      sendMessage();
    }
  }
}

function handleInputChange(event) {
  const input = event.target;
  // 移动端IME组合输入期间不调整高度，避免卡死
  if (event.isComposing) return;
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, window.innerHeight * 0.4) + 'px';
  
  const cursorPos = input.selectionStart;
  const textBeforeCursor = input.value.substring(0, cursorPos);
  if (textBeforeCursor.endsWith('@') && activeGroupId) {
    showMentionSelector(input, activeGroupId);
  }
}

function showChatHamburgerMenu(event) {
  if (!activeGroupId) return;
  const group = getGroup(activeGroupId);
  if (!group) return;
  
  // 【修复】捕获坐标值而非event对象引用，避免闭包中使用已回收的event
  const clickX = event.clientX;
  const clickY = event.clientY;
  
  const menuItems = [
    { label: '禁言成员', action: () => showMuteSelector(group, clickX, clickY) },
    { label: '解除禁言', action: () => showUnmuteSelector(group, clickX, clickY) },
    { label: '---' },
    { label: '发起提议', action: () => showProposeInput(clickX, clickY) },
    { label: '表决当前提议', action: () => showVoteSelector(clickX, clickY) },
    { label: '---' },
    { label: '引用消息', action: () => enterQuoteMode() }
  ];
  
  showPopupMenu(clickX, clickY, menuItems);
}

function showPopupMenu(x, y, items) {
  const existing = document.getElementById('popupMenu');
  
  // 【修复】清理上一次可能残留的closeHandler引用
  if (existing._closeHandler) {
    document.removeEventListener('click', existing._closeHandler);
    existing._closeHandler = null;
  }
  
  existing.style.display = 'none';
  
  existing.innerHTML = items.map((item, idx) => {
    if (item.label === '---') {
      return '<div style="border-top:1px solid var(--border-color);margin:4px 0;"></div>';
    }
    return `<div class="popup-menu-item${item.danger ? ' danger' : ''}" 
      data-idx="${idx}">${item.label}</div>`;
  }).join('');
  
  existing.querySelectorAll('.popup-menu-item').forEach((el) => {
    const idx = parseInt(el.dataset.idx);
    const item = items[idx];
    if (item && item.action) {
      el.addEventListener('click', () => {
        existing.style.display = 'none';
        // 【修复】菜单项点击时主动清理外部点击监听器
        if (existing._closeHandler) {
          document.removeEventListener('click', existing._closeHandler);
          existing._closeHandler = null;
        }
        item.action();
      });
    }
  });
  
  existing.style.display = 'block';
  
  requestAnimationFrame(() => {
    const menuWidth = existing.offsetWidth;
    const menuHeight = existing.offsetHeight;
    existing.style.left = Math.min(x, window.innerWidth - menuWidth - 10) + 'px';
    existing.style.top = Math.min(y, window.innerHeight - menuHeight - 60) + 'px';
  });
  
  const closeHandler = (e) => {
    if (!existing.contains(e.target)) {
      existing.style.display = 'none';
      document.removeEventListener('click', closeHandler);
      existing._closeHandler = null;
    }
  };
  existing._closeHandler = closeHandler;
  setTimeout(() => document.addEventListener('click', closeHandler), 100);
}

function showMuteSelector(group, x, y) {
  const members = group.members.filter(m => m.role !== 'host');
  if (members.length === 0) {

    return;
  }
  
  const items = members.map(m => {
    const agent = getAgentFriend(m.agentId);
    return {
      label: `${agent?.name || '未知'}${m.isMuted ? ' [已禁言]' : ''}`,
      action: () => {
        if (m.isMuted) {
          alert(`${agent?.name || '该成员'} 已处于禁言状态`);
        } else {
          const rounds = parseInt(prompt(`禁言 ${agent?.name || '该成员'} 几轮?`, '3'));
          if (rounds > 0 && !isNaN(rounds)) {
            m.isMuted = true;
            const scheduler = getWakeScheduler(activeGroupId);

            saveGroup(group);
            addSystemMessage(activeGroupId, `[系统] ${agent?.name || '成员'} 被禁言 ${rounds} 轮`);
            renderChatMessages();
          }
        }
      }
    };
  });
  
  showPopupMenu(x, y, items);
}

function showProposeInput(x, y) {
  const content = prompt('输入提议内容:');
  if (content && content.trim()) {
    const groupId = activeGroupId;
    const proposalId = generateUUID();
    ProposalStateMachine.create(proposalId, content.trim(), '__user__', groupId);
    addSystemMessage(groupId, `[用户提议] ${content.trim()} (ID: ${proposalId.substring(0, 8)})`);
    renderChatMessages();
    
    // 【Bug2修复】用户手动发起提议后强制唤醒全体非禁言成员参与表决
    // 不使用runChatRound（避免计数唤醒的随机性），直接构造表决任务
    const group = getGroup(groupId);
    if (!group) return;
    
    setTimeout(async () => {
      const abortSignal = groupAbortControllers.get(groupId)?.signal || null;
      try {
        const allMessages = getMessages(groupId);
        const concurrency = getConcurrencyController(groupId);
        
        // 强制唤醒所有非禁言、有API Key的成员
        const allMemberIds = group.members
          .filter(m => !m.isMuted)
          .map(m => m.agentId)
          .filter(id => {
            const agent = getAgentFriend(id);
            return agent && agent.apiKey && agent.apiKey.trim();
          });
        
        if (allMemberIds.length === 0) return;
        
        const votingPrompt = `[系统表决请求] 用户发起了一个新提议需要表决:\n  提议ID: ${proposalId}\n  提议内容: ${content.trim()}\n  请各成员使用 vote 命令进行表决: {\"command\":\"vote\",\"proposalId\":\"${proposalId}\",\"vote\":\"agree或disagree\",\"reason\":\"表决理由\"}`;
        
        const tasks = allMemberIds.map(agentId => {
          return async () => {
            const member = group.members.find(m => m.agentId === agentId);
            const agent = getAgentFriend(agentId);
            if (!member || !agent) return;
            
            const context = buildAgentContext(group, agentId, allMessages);
            try {
              const response = await callAgentAPI(
                agent, member, group,
                votingPrompt,
                context.messages,
                false
              );
              
              let fullResponse = '';
              let thinkingResponse = '';
              const msgElement = createMessageBubble(agent.name, agent.avatar, member);
              
              await streamAgentResponse(
                response,
                (chunk, full, isThinking) => {
                  if (isThinking) {
                    thinkingResponse += chunk;
                    updateThinkingBlock(msgElement, thinkingResponse);
                  } else {
                    fullResponse += chunk;
                    updateMessageContent(msgElement, fullResponse);
                  }
                },
                (fullText, thinkingText) => {
                  if (abortSignal && abortSignal.aborted) return;
                  const parsed = parseAgentResponse(fullText);

                  // 【v3修复】空输出过滤——与主线聊天循环保持一致，防止偏离检测哨兵空格泄露
                  const hasContent = parsed.cleanContent && parsed.cleanContent.trim();
                  if (!hasContent) {
                    if (msgElement && msgElement.parentNode) {
                      msgElement.remove();
                    }
                    DebugLogger.info('chat', `${agent.name} 空输出已过滤（静默）`);
                    return;
                  }

                  const msg = {
                    id: generateUUID(),
                    groupId,
                    roundIndex: getNextRoundIndex(groupId),
                    senderType: 'agent',
                    senderId: agentId,
                    senderName: agent.name,
                    content: parsed.cleanContent || parsed.displayContent,
                    cleanContent: parsed.cleanContent,
                    thinkingContent: thinkingText || parsed.thinkingContent,
                    commandBlock: parsed.commandBlock,
                    commandResult: null,
                    searchResult: null,
                    quotedMessageId: parsed.quotedMessageId || null,
                    mentions: extractMentionsFromContent(parsed.cleanContent, group),
                    timestamp: Date.now()
                  };
                  saveMessage(groupId, msg);

                  if (parsed.commandBlock) {
                    handleCommand(parsed.commandBlock, groupId, agentId);
                  }

                  // 【Bug4修复】消息生成完成后递增messageCount
                  const scheduler = getWakeScheduler(groupId);
                  scheduler.incrementMessageCount();

                  finalizeMessageBubble(msgElement, parsed, msg);
                },
 
                (error) => {
                  showErrorMessage(msgElement, error.message);
                },
                abortSignal
              );
            } catch (error) {
              DebugLogger.error(`agent:${agent.name}`, `表决响应失败: ${error.message}`);
            }
          };
        });
        
        await concurrency.executeAll(tasks);
        renderChatMessages();
        renderGroupList();
      } catch(e) {
        DebugLogger.error('command', `用户提议表决轮触发失败: ${e.message}`);
      }
    }, 500);
  }
}

function showVoteSelector(x, y) {
  const openProposals = [];
  ProposalStateMachine.proposals.forEach((p, id) => {
    if (p.status === 'open' && p.groupId === activeGroupId) {

function enterQuoteMode() {
  // 【修复】实现真正的引用模式：让用户点击消息来引用
  const messageList = document.getElementById('messageList');
  if (!messageList) return;
  
  // 添加视觉提示：进入引用模式
  const input = document.getElementById('messageInput');
  if (input) {
    input.placeholder = '[引用模式] 点击一条消息来引用它，或按Esc取消...';
    input.focus();
  }
  
  // 高亮所有可引用的消息
  const wrappers = messageList.querySelectorAll('.message-wrapper.agent, .message-wrapper.user');
  wrappers.forEach(w => {
    w.style.cursor = 'pointer';
    w.style.outline = '2px dashed var(--accent-blue)';
    w.style.outlineOffset = '2px';
  });
  
  // 点击消息完成引用
  const quoteHandler = function(e) {
    const wrapper = e.target.closest('.message-wrapper');
    if (!wrapper) return;
    
    // 从id提取消息ID: msg-xxxx
    const msgId = wrapper.id.replace('msg-', '');
    if (!msgId) return;
    
    // 将引用标记插入输入框
    if (input) {
      const currentVal = input.value;
      input.value = (currentVal ? currentVal + ' ' : '') + `[引用:${msgId}] `;
      input.placeholder = '输入消息... 使用 @ 提及Agent';
      input.focus();
    }
    
    // 清理引用模式
    cleanupQuoteMode(wrappers);
  };
  
  // Esc取消
  const keyHandler = function(e) {
    if (e.key === 'Escape') {
      cleanupQuoteMode(wrappers);
    }
  };
  
  function cleanupQuoteMode(wrappersList) {
    wrappersList.forEach(w => {
      w.style.cursor = '';
      w.style.outline = '';
      w.style.outlineOffset = '';
      w.removeEventListener('click', quoteHandler);
    });
    document.removeEventListener('keydown', keyHandler);
    if (input) {
      input.placeholder = '输入消息... 使用 @ 提及Agent';
    }
  }
  
  wrappers.forEach(w => {
    w.addEventListener('click', quoteHandler);
  });
  document.addEventListener('keydown', keyHandler);
}

function toggleFileVisibility(groupId, filename) {
  const files = groupFiles[groupId] || [];
  const found = files.find(f => f.filename === filename);

  found.visible = (found.visible === false) ? true : false;
  saveGroupFiles();

    ? '[系统] 文件 "' + filename + '" 已被屏蔽，Agent将无法读取'
    : '[系统] 文件 "' + filename + '" 已恢复可见');

function deleteGroupFile(groupId, filename) {
  if (!confirm('确定删除文件 "' + filename + '"? 此操作不可恢复。')) return;
  if (!groupFiles[groupId]) return;
  groupFiles[groupId] = groupFiles[groupId].filter(f => f.filename !== filename);
  saveGroupFiles();
  addSystemMessage(groupId, '[系统] 文件 "' + filename + '" 已被删除');
  openGroupSettingsPanel(groupId);
}

function downloadGroupFile(groupId, filename) {
  const flist = groupFiles[groupId] || [];
  const found = flist.find(f => f.filename === filename);
  if (!found) return;
  const ext = '.' + filename.split('.').pop().toLowerCase();
  const mimeMap = {
    // 纯文本
    '.txt':'text/plain','.md':'text/markdown','.log':'text/plain',
    // 数据
    '.json':'application/json','.csv':'text/csv','.xml':'application/xml','.html':'text/html',
    '.yaml':'text/yaml','.yml':'text/yaml','.toml':'text/plain','.ini':'text/plain',
    '.cfg':'text/plain','.env':'text/plain','.css':'text/css',
    // 脚本
    '.sh':'text/x-shellscript','.bash':'text/x-shellscript','.zsh':'text/x-shellscript',
    '.bat':'text/plain','.ps1':'text/plain',
    // 代码
    '.js':'text/javascript','.ts':'text/typescript','.jsx':'text/javascript','.tsx':'text/typescript',
    '.py':'text/x-python','.java':'text/x-java','.c':'text/x-c','.cpp':'text/x-c++',
    '.h':'text/x-c','.hpp':'text/x-c++','.go':'text/x-go','.rs':'text/x-rust',
    '.rb':'text/x-ruby','.php':'text/x-php','.swift':'text/x-swift','.kt':'text/x-kotlin',
    '.scala':'text/x-scala','.r':'text/x-r','.m':'text/x-objectivec','.lua':'text/x-lua',
    '.sql':'text/x-sql','.pl':'text/x-perl','.tex':'text/x-tex','.rkt':'text/x-scheme',
    '.dart':'text/x-dart','.elm':'text/x-elm','.ex':'text/x-elixir','.exs':'text/x-elixir',
    '.fsx':'text/x-fsharp','.groovy':'text/x-groovy','.hs':'text/x-haskell',
    '.nim':'text/x-nim','.jl':'text/x-julia','.ml':'text/x-ocaml','.pas':'text/x-pascal',
    // Office
    '.pdf':'application/pdf','.docx':'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
    '.xlsx':'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
    '.xls':'application/vnd.ms-excel','.xlsm':'application/vnd.ms-excel.sheet.macroEnabled.12',
    '.ods':'application/vnd.oasis.opendocument.spreadsheet',
    '.pptx':'application/vnd.openxmlformats-officedocument.presentationml.presentation',
    // 电子书
    '.epub':'application/epub+zip',
    // 图片
    '.png':'image/png','.jpg':'image/jpeg','.jpeg':'image/jpeg','.gif':'image/gif',
    '.webp':'image/webp','.bmp':'image/bmp'
  };
  const mime = mimeMap[ext] || 'application/octet-stream';
  const charset = mime.startsWith('text/') || mime === 'application/json' || mime === 'application/xml'
    ? ';charset=utf-8' : '';
  const blob = new Blob([found.content], { type: mime + charset });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 60000);
}

function promoteMember(groupId, agentId, role) {
  const group = getGroup(groupId);
  if (!group) return;
  if (role === 'host') {
    group.members.forEach(m => { if (m.role === 'host') m.role = 'member'; });
  }
  const member = group.members.find(m => m.agentId === agentId);
  if (member) member.role = role;
  saveGroup(group);
  const agent = getAgentFriend(agentId);
  addSystemMessage(groupId, `[系统] ${agent?.name || '成员'} 被任命为${role === 'host' ? '群主' : '管理员'}`);
  openGroupSettingsPanel(groupId);
  renderChatMessages();
}

function demoteMember(groupId, agentId) {
  const group = getGroup(groupId);
  if (!group) return;
  const member = group.members.find(m => m.agentId === agentId);
  if (member) member.role = 'member';
  saveGroup(group);
  const agent = getAgentFriend(agentId);
  addSystemMessage(groupId, `[系统] ${agent?.name || '成员'} 被降级为普通成员`);
  openGroupSettingsPanel(groupId);
  renderChatMessages();
}

function kickMember(groupId, agentId) {
  const group = getGroup(groupId);
  const agent = getAgentFriend(agentId);
  if (!group || !agent) return;
  if (!confirm(`确认将 ${agent.name} 踢出群聊?`)) return;
  group.members = group.members.filter(m => m.agentId !== agentId);
  saveGroup(group);
  addSystemMessage(groupId, `[系统] ${agent.name} 已被移出群聊`);
  openGroupSettingsPanel(groupId);
  renderChatMessages();
}

function showInviteMemberSelector(groupId) {
  const group = getGroup(groupId);
  if (!group) return;
  
  const allFriends = getAllAgentFriends();
  const activeMemberIds = new Set(group.members.map(m => m.agentId));
  const available = allFriends.filter(a => !activeMemberIds.has(a.id));
  
  if (available.length === 0) {
    alert('没有可邀请的好友（所有好友已在群内）');
    return;
  }
  
  const dialog = document.createElement('div');
  dialog.style.cssText = `
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.7);z-index:400;
    display:flex;align-items:center;justify-content:center;
  `;
  dialog.id = 'inviteMemberDialog';
  
  const selectedIds = new Set();
  
  const toggleSelect = (agentId, el) => {
    if (selectedIds.has(agentId)) {
      selectedIds.delete(agentId);
      el.style.background = 'transparent';
      el.style.outline = '';
    } else {
      selectedIds.add(agentId);
      el.style.background = 'rgba(68,136,255,0.15)';
      el.style.outline = '1px solid var(--accent-blue)';
    }
    const btn = dialog.querySelector('#inviteConfirmBtn');
    if (btn) btn.textContent = `拉入群聊 (${selectedIds.size})`;
  };
  
  dialog.innerHTML = `
    <div style="background:var(--bg-secondary);border:1px solid var(--border-color);
      border-radius:var(--radius-lg);width:400px;max-width:90vw;max-height:70vh;
      display:flex;flex-direction:column;">
      <div style="padding:14px 16px;border-bottom:1px solid var(--border-color);
        display:flex;justify-content:space-between;align-items:center;">
        <span style="font-weight:600;">拉人进群 · ${escapeHTML(group.name)}</span>
        <button class="hamburger-btn" id="inviteDialogClose">[×]</button>
      </div>
      <div style="flex:1;overflow-y:auto;padding:8px;">
        ${available.map(a => `
          <div class="invite-candidate" data-agent-id="${a.id}"
            style="display:flex;align-items:center;gap:10px;padding:10px 12px;
              cursor:pointer;border-radius:var(--radius-sm);margin:2px 0;
              transition:background 0.1s;">
            <div style="width:32px;height:32px;border-radius:50%;background:var(--bg-tertiary);
              display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;
              flex-shrink:0;">${escapeHTML(a.avatar)}</div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:14px;">${escapeHTML(a.name)}</div>
              <div style="font-size:11px;color:var(--text-weak);">${escapeHTML(a.model)} ${(a.tags||[]).join(' · ')}</div>
            </div>
          </div>
        `).join('')}
        ${available.length === 0 ? '<div style="text-align:center;color:var(--text-weak);padding:24px;">没有可邀请的好友</div>' : ''}
      </div>
      <div style="padding:12px 16px;border-top:1px solid var(--border-color);
        display:flex;gap:8px;justify-content:flex-end;">
        <button class="btn" id="inviteCancelBtn">取消</button>
        <button class="btn primary" id="inviteConfirmBtn">拉入群聊</button>
      </div>
    </div>`;
  
  document.body.appendChild(dialog);
  
  // 绑定候选人点击事件
  dialog.querySelectorAll('.invite-candidate').forEach(el => {
    el.addEventListener('mouseenter', () => {
      if (!selectedIds.has(el.dataset.agentId)) el.style.background = 'rgba(255,255,255,0.03)';
    });
    el.addEventListener('mouseleave', () => {
      if (!selectedIds.has(el.dataset.agentId)) el.style.background = 'transparent';
    });
    el.addEventListener('click', () => toggleSelect(el.dataset.agentId, el));
  });
  
  // 关闭按钮
  dialog.querySelector('#inviteDialogClose').addEventListener('click', () => dialog.remove());
  dialog.querySelector('#inviteCancelBtn').addEventListener('click', () => dialog.remove());
  
  // 点击遮罩关闭
  dialog.addEventListener('click', (e) => {
    if (e.target === dialog) dialog.remove();
  });
  
  // 确认按钮
  dialog.querySelector('#inviteConfirmBtn').addEventListener('click', () => {
    if (selectedIds.size === 0) return;
    for (const agentId of selectedIds) {
      inviteMemberToGroup(groupId, agentId);
    }
    dialog.remove();
    openGroupSettingsPanel(groupId);
    renderChatMessages();
  });
}

function inviteMemberToGroup(groupId, agentId) {
  const group = getGroup(groupId);
  const agent = getAgentFriend(agentId);
  if (!group || !agent) return;
  
  if (group.members.some(m => m.agentId === agentId)) return;
  
  group.members.push({
    agentId: agentId,
    overrides: {},
    role: 'member',
    isMuted: false,
    muteUntilCount: null,
    joinedAt: Date.now()
  });
  saveGroup(group);
  addSystemMessage(groupId, `[加入] ${agent.name} 被邀请加入群聊`);
}

function muteMemberFromPanel(groupId, agentId) {
  const group = getGroup(groupId);
  const agent = getAgentFriend(agentId);
  if (!group || !agent) return;
  const member = group.members.find(m => m.agentId === agentId);
  if (!member) return;
  if (member.role === 'host') {
    alert('不能禁言群主');
    return;
  }
  const rounds = parseInt(prompt(`禁言 ${agent.name} 几轮?`, '3'));
  if (!rounds || rounds <= 0 || isNaN(rounds)) return;
  member.isMuted = true;
  const scheduler = getWakeScheduler(groupId);
  member.muteUntilCount = scheduler.messageCount + rounds;
  saveGroup(group);
  addSystemMessage(groupId, `[系统] ${agent.name} 被禁言 ${rounds} 轮`);
  openGroupSettingsPanel(groupId);
  renderChatMessages();
}

function unmuteMemberFromPanel(groupId, agentId) {
  const group = getGroup(groupId);
  const agent = getAgentFriend(agentId);
  if (!group || !agent) return;
  const member = group.members.find(m => m.agentId === agentId);
  if (member) {
    member.isMuted = false;
    member.muteUntilCount = null;
    saveGroup(group);
    addSystemMessage(groupId, `[系统] ${agent.name} 被解除禁言`);
    openGroupSettingsPanel(groupId);
    renderChatMessages();
  }
}

function renderMuteManagement(group) {
  const mutedMembers = group.members.filter(m => m.isMuted);
  if (mutedMembers.length === 0) {
    return '<div style="font-size:13px;color:var(--text-weak);">当前无禁言成员</div>';
  }
  const scheduler = getWakeScheduler(group.id);
  return `
    <div style="margin-bottom:8px;">
      ${mutedMembers.map(m => {
        const agent = getAgentFriend(m.agentId);
        const remaining = m.muteUntilCount !== null && m.muteUntilCount !== undefined
          ? Math.max(0, m.muteUntilCount - scheduler.messageCount)
          : '?';
        return `<div style="font-size:13px;padding:4px 0;display:flex;justify-content:space-between;">
          <span>${agent?.name || '未知'} <span style="color:var(--accent-red);">(剩余${remaining}轮)</span></span>
          <button class="btn small" onclick="unmuteMemberFromPanel('${group.id}','${m.agentId}')">解除</button>
        </div>`;
      }).join('')}
    </div>
    <button class="btn small danger" onclick="unmuteAllMembers('${group.id}')">批量解除所有禁言</button>`;
}

function unmuteAllMembers(groupId) {
  const group = getGroup(groupId);
  if (!group) return;
  group.members.forEach(m => { m.isMuted = false; m.muteUntilCount = null; });
  saveGroup(group);
  addSystemMessage(groupId, '[系统] 所有禁言已解除');
  openGroupSettingsPanel(groupId);
  renderChatMessages();
}

function resetChat(groupId) {
  if (!confirm('确认重置聊天? 所有消息和摘要将被清空。')) return;
  saveMessages(groupId, []);
  const group = getGroup(groupId);
  if (group) {
    group.summaries = [];
    saveGroup(group);
    const scheduler = wakeSchedulers.get(groupId);
    if (scheduler) scheduler.reset();
  }
  addSystemMessage(groupId, '[系统] 聊天记录已重置');
  renderChatMessages();
}

function disbandGroup(groupId) {
  const group = getGroup(groupId);
  if (!group) return;
  if (!confirm(`确认解散群聊 "${group.name}"? 此操作不可恢复。`)) return;
  if (!confirm(`再次确认解散 "${group.name}"?`)) return;
  deleteGroup(groupId);
  if (activeGroupId === groupId) {
    activeGroupId = null;
    const settings = getAppSettings();
    settings.activeGroupId = null;
    saveAppSettings(settings);
  }
  closePanel();
  switchView('groups');
  renderGroupList();
}

  document.getElementById('createGroupDialog').style.display = 'none';

function createNewGroup() {
  const name = document.getElementById('newGroupName').value.trim();
  if (!name) { alert('请输入群名称'); return; }
  
  const topic = document.getElementById('newGroupTopic').value.trim();
  const hostId = document.querySelector('input[name="hostSelect"]:checked')?.value;
  if (!hostId) { alert('请选择群主'); return; }
  
  const memberIds = [...document.querySelectorAll('input[name="memberSelect"]:checked')]
    .map(el => el.value);
  const concurrency = parseInt(document.getElementById('newGroupConcurrency').value) || 3;
  const breakArmor = document.getElementById('newGroupBreakArmor').classList.contains('on');
  
  const groupId = generateUUID();
  const group = {
    id: groupId,
    name,
    topic,
    createdAt: Date.now(),
    members: [],
    settings: {
      concurrencyLimit: Math.max(1, Math.min(10, concurrency)),
      globalBreakArmor: breakArmor,
      hostContextMultiplier: 2,
      maxHistoryRounds: 15
    },
    summaries: []
  };
  
  group.members.push({
    agentId: hostId,
    overrides: {},
    role: 'host',
    isMuted: false,
    muteUntilCount: null,
    joinedAt: Date.now()
  });
  
  for (const id of memberIds) {
    if (id === hostId) continue;
    group.members.push({
      agentId: id,
      overrides: {},
      role: 'member',
      isMuted: false,
      muteUntilCount: null,
      joinedAt: Date.now()
    });
  }
  
  // 【AI话题检测】强制添加话题偏离检测Agent到每个群
  // Watcher作为系统哨兵，不占用用户选择的成员名额
  const DRIFT_WATCHER_ID = 'builtin-watchdog-drift';
  if (!group.members.some(m => m.agentId === DRIFT_WATCHER_ID)) {
    const watcher = getAgentFriend(DRIFT_WATCHER_ID);
    if (watcher) {
      group.members.push({
        agentId: DRIFT_WATCHER_ID,
        overrides: {},
        role: 'member',
        isMuted: false,
        muteUntilCount: null,
        joinedAt: Date.now()
      });
    }
  }
  
  saveGroup(group);
  
  getWakeScheduler(groupId);
  
  const hostAgent = getAgentFriend(hostId);
  // 构建成员列表供初始显示
  const visibleMembers = group.members.filter(m => !HIDDEN_AGENT_IDS.has(m.agentId));
  const memberIntro = visibleMembers.map(m => {
    const a = getAgentFriend(m.agentId);
    const role = m.role === 'host' ? '群主' : '成员';
    return `  • ${a?.name || '未知'} (${role})`;
  }).join('\n');
  addSystemMessage(groupId, `[系统] 群聊 "${name}" 已创建!\n\n当前成员(${visibleMembers.length}人):\n${memberIntro}\n\n请 @${hostAgent?.name || '群主'} 并描述您的话题或项目，群主会开始引导讨论并分配任务。`);  
  closeCreateGroupDialog();
  openChat(groupId);
}

function getTestStatusBadge(agent, testResult, tavilyResult) {
  if (!agent.apiKey || !agent.apiKey.trim()) {
    return '<span style="font-size:10px;padding:1px 6px;border-radius:3px;background:rgba(255,255,255,0.05);color:var(--text-weak);">未配置Key</span>';
  }
  
  if (!testResult) {
    return '<span style="font-size:10px;padding:1px 6px;border-radius:3px;background:rgba(255,255,255,0.05);color:var(--text-weak);">未测试</span>';
  }
  
  const badgeMap = {
    'ok':              { bg: 'rgba(68,255,68,0.15)', color: 'var(--accent-green)', text: '连通' },
    'model_not_found': { bg: 'rgba(255,215,0,0.15)', color: 'var(--accent-gold)',  text: '模型未找到' },
    'auth_error':      { bg: 'rgba(255,68,68,0.15)',  color: 'var(--accent-red)',   text: '认证失败' },
    'timeout':         { bg: 'rgba(255,68,68,0.15)',  color: 'var(--accent-red)',   text: '超时' },
    'network_error':   { bg: 'rgba(255,68,68,0.15)',  color: 'var(--accent-red)',   text: '网络错误' },
    'rate_limited':    { bg: 'rgba(255,215,0,0.15)', color: 'var(--accent-gold)',  text: '限流429' },
    'bad_request':     { bg: 'rgba(255,68,68,0.15)',  color: 'var(--accent-red)',   text: '请求错误' },
    'unexpected':      { bg: 'rgba(255,68,68,0.15)',  color: 'var(--accent-red)',   text: '异常响应' }
  };
  
  const b = badgeMap[testResult.status] || badgeMap['unexpected'];
  let html = `<span style="font-size:10px;padding:1px 6px;border-radius:3px;
    background:${b.bg};color:${b.color};">${b.text}</span>`;

  // Tavily搜索状态徽章（仅当该Agent启用了搜索工具且配置了Tavily Key时显示）
  if (agent.enableSearchTool && agent.tavilyApiKey && agent.tavilyApiKey.trim()) {
    if (tavilyResult && tavilyResult.type === 'tavily') {
      const tb = badgeMap[tavilyResult.status] || badgeMap['unexpected'];
      html += ` <span style="font-size:10px;padding:1px 6px;border-radius:3px;
        background:${tb.bg};color:${tb.color};">⚡Tavily ${tb.text}</span>`;
    } else if (!tavilyResult) {
      html += ` <span style="font-size:10px;padding:1px 6px;border-radius:3px;
        background:rgba(255,255,255,0.05);color:var(--text-weak);">⚡未测试</span>`;
    }
  }

  return html;
}

function getLatencyDisplay(testResult) {
  if (!testResult || testResult.status === 'skipped') return '';
  const ms = testResult.latency;
  const color = ms < 1000 ? 'var(--accent-green)' : ms < 3000 ? 'var(--accent-gold)' : 'var(--accent-red)';
  return `<span style="color:${color};">${ms}ms</span>`;
}

function showFriendHamburgerMenu(event) {
  const items = [
    { label: '导入Agent列表', action: () => {
      const input = document.getElementById('hiddenFileInput');
      if (!input) return;
      input.accept = '.json';
      // 清理旧handler，绑定新的
      if (input._oldHandler) {
        input.removeEventListener('change', input._oldHandler);
      }
      const handler = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const result = await importAgentList(file);
          alert(`导入完成: ${result.imported}个成功, ${result.skipped}个跳过(重名), 共${result.total}个`);
          renderFriendList();
        } catch(err) {
          alert('导入失败: ' + err.message);
        }
        input.value = '';
      };
      input._oldHandler = handler;
      input.addEventListener('change', handler);
      input.click();
    }},
    { label: '导出Agent列表', action: () => exportAgentList() }
  ];
  showPopupMenu(event.clientX, event.clientY, items);
}

function deleteAgentConfirm(agentId) {
  const agent = getAgentFriend(agentId);
  if (!agent) return;
  if (!confirm(`确认删除Agent "${agent.name}"? \n此操作会将TA从所有群聊中移除。`)) return;
  
  const groups = getAllGroups();
  for (const group of groups) {
    const wasMember = group.members.some(m => m.agentId === agentId);
    group.members = group.members.filter(m => m.agentId !== agentId);
    if (wasMember) {
      saveGroup(group);
      DebugLogger.info('group', `从群 ${group.name} 移除已删除的Agent: ${agent.name}`);
    }
  }
  
  deleteAgentFriend(agentId);
  closePanel();
  renderFriendList();
  renderGroupList();
  if (activeGroupId) renderChatMessages();
}

// ===== 命令失败反馈 =====
// 当命令执行失败时，自动唤醒发出命令的Agent并强调正确命令格式
function triggerCommandFeedback(groupId, senderAgentId) {
  if (!senderAgentId || senderAgentId === '__user__') return; // 用户不需要自动反馈
  
  const scheduler = getWakeScheduler(groupId);
  // 强制该Agent在下一轮被唤醒，使其看到失败反馈
  scheduler.forceWakeNextRound(senderAgentId);
  
  // 立即触发新对话轮
  setTimeout(async () => {
    try {
      await runChatRound(groupId, null);
    } catch(e) {
      DebugLogger.error('command', `命令反馈触发新对话轮失败: ${e.message}`);
    }
  }, 500);
  
  DebugLogger.info('command', `命令失败反馈: 唤醒 ${getAgentFriend(senderAgentId)?.name || senderAgentId} 查看错误信息`);
}

// ===== 命令处理 =====
function handleCommand(commandBlock, groupId, senderAgentId) {
  const group = getGroup(groupId);
  if (!group) return;
  
  const senderMember = group.members.find(m => m.agentId === senderAgentId);
  const senderAgent = getAgentFriend(senderAgentId);
  
  DebugLogger.info('command', `${senderAgent?.name || '未知'} 执行 ${commandBlock.command}`, commandBlock);
  
  switch (commandBlock.command) {
    case 'propose': {
      const proposalId = commandBlock.proposalId || generateUUID();
      ProposalStateMachine.create(
        proposalId, 
        commandBlock.content, 
        senderAgentId, 
        groupId
      );
      addSystemMessage(groupId, 
        `[提议] ${senderAgent?.name || 'Agent'} 提议: ${commandBlock.content} (ID: ${proposalId.substring(0, 8)})`);
      
      // 【Bug2修复】提案创建后强制唤醒全体非禁言成员参与表决
      // 不使用runChatRound（避免计数唤醒的随机性），直接构造表决任务
      const group = getGroup(groupId);
      if (!group) break;
      
      setTimeout(async () => {
        const abortSignal = groupAbortControllers.get(groupId)?.signal || null;
        try {
          const allMessages = getMessages(groupId);
          const concurrency = getConcurrencyController(groupId);
          
          // 强制唤醒所有非禁言、有API Key的成员
          const allMemberIds = group.members
            .filter(m => !m.isMuted)
            .map(m => m.agentId)
            .filter(id => {
              const agent = getAgentFriend(id);
              return agent && agent.apiKey && agent.apiKey.trim();
            });
          
          if (allMemberIds.length === 0) return;
          
          const votingPrompt = `[系统表决请求] 群内有一个新提议需要表决:\n  提议ID: ${proposalId}\n  提议内容: ${commandBlock.content}\n  提议人: ${senderAgent?.name || 'Agent'}\n  请各成员使用 vote 命令进行表决: {\"command\":\"vote\",\"proposalId\":\"${proposalId}\",\"vote\":\"agree或disagree\",\"reason\":\"表决理由\"}`;
          
          const tasks = allMemberIds.map(agentId => {
            return async () => {
              const member = group.members.find(m => m.agentId === agentId);
              const agent = getAgentFriend(agentId);
              if (!member || !agent) return;
              
              const context = buildAgentContext(group, agentId, allMessages);
              try {
                const response = await callAgentAPI(
                  agent, member, group,
                  votingPrompt,
                  context.messages,
                  false
                );
                
                let fullResponse = '';
                let thinkingResponse = '';
                const msgElement = createMessageBubble(agent.name, agent.avatar, member);
                
                await streamAgentResponse(
                  response,
                  (chunk, full, isThinking) => {
                    if (isThinking) {
                      thinkingResponse += chunk;
                      updateThinkingBlock(msgElement, thinkingResponse);
                    } else {
                      fullResponse += chunk;
                      updateMessageContent(msgElement, fullResponse);
                    }
                  },
                  (fullText, thinkingText) => {
                    if (abortSignal && abortSignal.aborted) return;
                    const parsed = parseAgentResponse(fullText);

                    // 【v3修复】空输出过滤——与主线聊天循环保持一致，防止偏离检测哨兵空格泄露
                    const hasContent = parsed.cleanContent && parsed.cleanContent.trim();
                    if (!hasContent) {
                      if (msgElement && msgElement.parentNode) {
                        msgElement.remove();
                      }
                      DebugLogger.info('chat', `${agent.name} 空输出已过滤（静默）`);
                      return;
                    }

                    const msg = {
                      id: generateUUID(),
                      groupId,
                      roundIndex: getNextRoundIndex(groupId),
                      senderType: 'agent',
                      senderId: agentId,
                      senderName: agent.name,
                      content: parsed.cleanContent || parsed.displayContent,
                      cleanContent: parsed.cleanContent,
                      thinkingContent: thinkingText || parsed.thinkingContent,
                      commandBlock: parsed.commandBlock,
                      commandResult: null,
                      searchResult: null,
                      quotedMessageId: parsed.quotedMessageId || null,
                      mentions: extractMentionsFromContent(parsed.cleanContent, group),
                      timestamp: Date.now()
                    };
                    saveMessage(groupId, msg);

                    if (parsed.commandBlock) {
                      handleCommand(parsed.commandBlock, groupId, agentId);
                    }

                    // 【Bug4修复】消息生成完成后递增messageCount
                    const scheduler = getWakeScheduler(groupId);
                    scheduler.incrementMessageCount();

                    finalizeMessageBubble(msgElement, parsed, msg);
                  },
 
                  (error) => {
                    showErrorMessage(msgElement, error.message);
                  },
                  abortSignal
                );
              } catch (error) {
                DebugLogger.error(`agent:${agent.name}`, `表决响应失败: ${error.message}`);
              }
            };
          });
          
          await concurrency.executeAll(tasks);
          renderChatMessages();
          renderGroupList();
        } catch(e) {
          DebugLogger.error('command', `提案表决轮触发失败: ${e.message}`);
        }
      }, 500);
      break;
    }
    
    case 'vote': {
      // 【Bug1修复】如果没有指定proposalId，尝试对当前群唯一活跃提议投票
      if (!commandBlock.proposalId) {
        const openProposals = ProposalStateMachine.getOpenProposalsForGroup(groupId);
        if (openProposals.length === 1) {
          commandBlock.proposalId = openProposals[0].id;
        } else if (openProposals.length === 0) {
          addSystemMessage(groupId, `[系统] 当前没有进行中的提议可以表决`);
          break;
        } else {
          const proposalList = openProposals.map(p => 
            `  - ID: ${p.id.substring(0, 8)}... 内容: ${(p.content || '').substring(0, 40)}`
          ).join('\n');
          addSystemMessage(groupId, `[系统] 当前有多个进行中的提议，请指定proposalId：\n${proposalList}`);
          break;
        }
      }
      
      const voterId = senderAgentId || '__user__';
      const result = ProposalStateMachine.castVote(
        commandBlock.proposalId,
        voterId,
        commandBlock.vote,
        commandBlock.reason || ''
      );
      
      if (result) {
        const voteLabel = commandBlock.vote === 'agree' ? '同意' : '反对';
        const voterName = senderAgent?.name || '用户';
        addSystemMessage(groupId, 
          `[表决] ${voterName} ${voteLabel}了提议 (${commandBlock.proposalId.substring(0, 8)}): ${commandBlock.reason || ''}`);
      } else {
        // 【Bug1修复】投票失败时给出明确提示
        const p = ProposalStateMachine.proposals.get(commandBlock.proposalId);
        if (!p) {
          addSystemMessage(groupId, `[系统] 未找到提议 (ID: ${(commandBlock.proposalId || '').substring(0, 8)}...)，可能已过期或不存在`);
        } else if (p.status !== 'open') {
          addSystemMessage(groupId, `[系统] 提议 "${(p.content || '').substring(0, 40)}" 已${p.status === 'passed' ? '通过' : p.status === 'rejected' ? '被否决' : '超时'}，无法再表决`);
        }
      }
      break;
    }
    
    case 'mute': {
      if (!senderMember || (senderMember.role !== 'host' && senderMember.role !== 'admin')) {
        DebugLogger.warn('command', `${senderAgent?.name} 无权执行禁言`);
        addSystemMessage(groupId, `[命令失败] ${senderAgent?.name || 'Agent'} 无权执行禁言命令（仅群主和管理员可禁言）`);
        triggerCommandFeedback(groupId, senderAgentId);
        break;
      }
      // 【ID制】直接按agentId查找目标成员
      const targetMember = group.members.find(m => m.agentId === commandBlock.target);
      if (!targetMember) {
        const targetName = (getAgentFriend(commandBlock.target) || {}).name || commandBlock.target;
        addSystemMessage(groupId, `[命令失败] 未找到目标成员(ID: ${commandBlock.target})，请检查ID是否正确。可从群成员列表中获取精确ID。`);
        triggerCommandFeedback(groupId, senderAgentId);
        break;
      }
      if (targetMember.role === 'host') {
        addSystemMessage(groupId, `[命令失败] 不能禁言群主`);
        triggerCommandFeedback(groupId, senderAgentId);
        break;
      }
      targetMember.isMuted = true;
      const scheduler = getWakeScheduler(groupId);
      targetMember.muteUntilCount = scheduler.messageCount + (commandBlock.rounds || 3);
      saveGroup(group);
      const targetAgent = getAgentFriend(targetMember.agentId);
      addSystemMessage(groupId, 
        `[禁言] ${senderAgent?.name || 'Agent'} 禁言了 ${targetAgent?.name || commandBlock.target}，持续 ${commandBlock.rounds || 3} 条消息`);
      break;
    }
    
    case 'unmute': {
      if (!senderMember || (senderMember.role !== 'host' && senderMember.role !== 'admin')) {
        DebugLogger.warn('command', `${senderAgent?.name} 无权执行解除禁言`);
        addSystemMessage(groupId, `[命令失败] ${senderAgent?.name || 'Agent'} 无权执行解除禁言命令（仅群主和管理员可解除禁言）`);
        triggerCommandFeedback(groupId, senderAgentId);
        break;
      }
      // 【ID制】直接按agentId查找目标成员
      const targetMember = group.members.find(m => m.agentId === commandBlock.target);
      if (!targetMember) {
        addSystemMessage(groupId, `[命令失败] 未找到目标成员(ID: ${commandBlock.target})，请检查ID是否正确。`);
        triggerCommandFeedback(groupId, senderAgentId);
        break;
      }
      if (targetMember.isMuted) {
        targetMember.isMuted = false;
        targetMember.muteUntilCount = null;
        saveGroup(group);
        const targetAgent = getAgentFriend(targetMember.agentId);
        addSystemMessage(groupId, `[解除禁言] ${senderAgent?.name || 'Agent'} 解除了 ${targetAgent?.name || commandBlock.target} 的禁言`);
      } else {
        const targetAgent = getAgentFriend(targetMember.agentId);
        addSystemMessage(groupId, `[命令失败] ${targetAgent?.name || commandBlock.target} 当前未被禁言，无需解除`);
        triggerCommandFeedback(groupId, senderAgentId);
      }
      break;
    }
    
    case 'invite': {
      if (!senderMember || senderMember.role !== 'host') {
        DebugLogger.warn('command', `${senderAgent?.name} 无权执行拉人`);
        addSystemMessage(groupId, `[命令失败] ${senderAgent?.name || 'Agent'} 无权执行拉人命令（仅群主可拉人）`);
        triggerCommandFeedback(groupId, senderAgentId);
        break;
      }
      // 【ID制】支持逗号分隔的批量拉人，target使用精确的好友ID
      const targets = commandBlock.target.split(/[,，、\s]+/).map(s => s.trim()).filter(Boolean);
      const invited = [];
      const invitedIds = [];
      const notFound = [];
      const alreadyIn = [];
      
      for (const targetId of targets) {
        const friend = getAgentFriend(targetId);
        if (!friend) {
          notFound.push(targetId);
          continue;
        }
        if (group.members.some(m => m.agentId === friend.id)) {
          alreadyIn.push(friend.name + ' (ID:' + friend.id.substring(0, 8) + '...)');
          continue;
        }
        group.members.push({
          agentId: friend.id,
          overrides: {},
          role: 'member',
          isMuted: false,
          muteUntilCount: null,
          joinedAt: Date.now()
        });
        invited.push(friend.name);
        invitedIds.push(friend.id);
      }
      
      saveGroup(group);
      if (invited.length > 0) {
        addSystemMessage(groupId, `[加入] ${senderAgent?.name || '群主'} 邀请了 ${invited.join(', ')} 加入群聊`);
      }
      if (notFound.length > 0) {
        addSystemMessage(groupId, `[命令失败] 未找到好友ID: ${notFound.join(', ')}。请先使用listFriends命令获取可邀请好友的精确ID，再使用返回的ID执行invite。不要凭记忆编造ID。`);
        triggerCommandFeedback(groupId, senderAgentId);
      }
      if (alreadyIn.length > 0) {
        addSystemMessage(groupId, `[系统] ${alreadyIn.join(', ')} 已在群中，跳过`);
      }
      // 【Bug3修复】invite成功后主动触发新对话轮，并将新成员加入wakeList
      if (invitedIds.length > 0) {
        const scheduler = getWakeScheduler(groupId);
        for (const newId of invitedIds) {
          // 为新成员设置lastMentionWakeCount，确保下一轮立即被唤醒
          scheduler.forceWakeNextRound(newId);
        }
        setTimeout(async () => {
          try {
            await runChatRound(groupId, null);
          } catch(e) {
            DebugLogger.error('command', `invite后触发新对话轮失败: ${e.message}`);
          }
        }, 500);
      }
      break;
    }
    
    case 'remove': {
      if (!senderMember || senderMember.role !== 'host') {
        DebugLogger.warn('command', `${senderAgent?.name} 无权执行删人`);
        addSystemMessage(groupId, `[命令失败] ${senderAgent?.name || 'Agent'} 无权执行删人命令（仅群主可删人）`);
        triggerCommandFeedback(groupId, senderAgentId);
        break;
      }
      // 【ID制】直接按agentId查找目标成员
      const targetMember = group.members.find(m => m.agentId === commandBlock.target);
      if (!targetMember) {
        addSystemMessage(groupId, `[命令失败] 未找到目标成员(ID: ${commandBlock.target})，请检查ID是否正确。可从群成员列表中获取精确ID。`);
        triggerCommandFeedback(groupId, senderAgentId);
        break;
      }
      if (targetMember.role === 'host') {
        addSystemMessage(groupId, `[命令失败] 不能移除群主`);
        triggerCommandFeedback(groupId, senderAgentId);
        break;
      }
      const targetAgent = getAgentFriend(targetMember.agentId);
      group.members = group.members.filter(m => m.agentId !== targetMember.agentId);
      saveGroup(group);
      addSystemMessage(groupId, `[移出] ${senderAgent?.name || '群主'} 将 ${targetAgent?.name || commandBlock.target} 移出群聊`);
      break;
    }
    
    case 'listFriends': {
      if (!senderMember || senderMember.role !== 'host') {
        DebugLogger.warn('command', `${senderAgent?.name} 无权拉取好友列表`);
        return;
      }
      const allFriends = getAllAgentFriends();
      const activeMembers = new Set(group.members.map(m => m.agentId));
      const available = allFriends.filter(a => !activeMembers.has(a.id));
      
      // 【ID制】显示格式变为「名称 (ID: xxx, 标签: xxx)」以方便群主用精确ID拉人
      const friendList = available.length > 0 
        ? available.map(a => `${a.name} (ID: ${a.id}, 标签: ${(a.tags||[]).join(',') || a.model || '无'})`).join('; ')
        : '无可邀请的好友';
      
      addSystemMessage(groupId, `[好友列表] 可邀请 (请使用精确ID执行invite): ${friendList}`);
      
      // 【Bug3修复】好友列表生成后自动触发新对话轮。
      // 系统消息[好友列表]已通过addSystemMessage写入上下文。
      // 群主作为host始终在wakeList中，新一轮自然会看到列表并决定下一步。
      // 不传userMessage参数，避免虚假的"用户发言"污染聊天记录。
      setTimeout(async () => {
        try {
          await runChatRound(groupId, null);
        } catch(e) {
          DebugLogger.error('command', `listFriends后触发新对话轮失败: ${e.message}`);
        }
      }, 500);
      break;
    }

    case 'stop': {
      // 仅群主可终止讨论
      if (!senderMember || senderMember.role !== 'host') {
        DebugLogger.warn('command', `${senderAgent?.name} 无权执行终止讨论`);
        addSystemMessage(groupId, `[命令失败] ${senderAgent?.name || 'Agent'} 无权终止讨论（仅群主可执行）`);
        triggerCommandFeedback(groupId, senderAgentId);
        break;
      }
      abortGroupDiscussion(groupId, `群主 ${senderAgent?.name} 终止了讨论`);
      addSystemMessage(groupId, `[系统] ⏹ ${senderAgent?.name || '群主'} 认为话题已完善，主动终止了本轮讨论。所有Agent调用已停止。`);
      renderChatMessages();
      break;
    }

  }
  
  renderChatMessages();
}

// ===== 调试面板 =====
const DebugLogger = {
  logs: [],
  maxEntries: 500,
  errorCount: 0,
  warnCount: 0,
  
  _add(level, tag, message, data) {
    const entry = {
      id: generateUUID().substring(0, 8),
      time: Date.now(),
      level,
      tag,
      message,
      data: data || null
    };
    this.logs.push(entry);
    if (level === 'error') this.errorCount++;
    if (level === 'warn') this.warnCount++;
    
    while (this.logs.length > this.maxEntries) {
      const removed = this.logs.shift();
      if (removed.level === 'error') this.errorCount = Math.max(0, this.errorCount - 1);
      if (removed.level === 'warn') this.warnCount = Math.max(0, this.warnCount - 1);
    }
    
    this._updateBadge();
    return entry;
  },
  
  info(tag, message, data)  { return this._add('info', tag, message, data); },
  warn(tag, message, data)  { return this._add('warn', tag, message, data); },
  error(tag, message, data) { return this._add('error', tag, message, data); },
  debug(tag, message, data) { return this._add('debug', tag, message, data); },
  api(tag, message, data)   { return this._add('api', tag, message, data); },
  
  _updateBadge() {
    const badges = document.querySelectorAll('#debugBadgeDesktop, #debugBadgeMobile');
    badges.forEach(badge => {
      badge.textContent = `日志:${this.logs.length} 错误:${this.errorCount}`;
      const trigger = badge.closest('#debugTrigger, #debugTriggerMobile');
      if (trigger) {
        if (this.errorCount > 0) {
          badge.style.color = 'var(--accent-red)';
          trigger.classList.add('debug-has-error');
        } else if (this.warnCount > 0) {
          badge.style.color = 'var(--accent-gold)';
          trigger.classList.remove('debug-has-error');
        } else {
          badge.style.color = 'var(--text-weak)';
          trigger.classList.remove('debug-has-error');
        }
      }
    });
  }
};

function openDebugPanel() {
  const panel = document.getElementById('panelOverlay');
  
  const logLevels = ['all', 'info', 'warn', 'error', 'debug', 'api'];
  const logTags = [...new Set(DebugLogger.logs.map(l => l.tag))];
  
  panel.innerHTML = `
    <div class="panel-header">
      <span style="font-weight:600;">调试面板</span>
      <button class="hamburger-btn" onclick="closePanel()">[×]</button>
    </div>
    <div class="panel-content">
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;">
        <span style="font-size:12px;color:var(--text-weak);">筛选:</span>
        <select id="debugLevelFilter" onchange="renderDebugLogs()">
          ${logLevels.map(l => `<option value="${l}">${l}</option>`).join('')}
        </select>
        <select id="debugTagFilter" onchange="renderDebugLogs()">
          <option value="all">全部标签</option>
          ${logTags.map(t => `<option value="${t}">${t}</option>`).join('')}
        </select>
        <span style="font-size:11px;color:var(--text-weak);margin-left:auto;">
          总计:${DebugLogger.logs.length} | 错误:${DebugLogger.errorCount} | 警告:${DebugLogger.warnCount}
        </span>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <button class="btn small" onclick="exportDebugLogs()">导出日志</button>
        <button class="btn small danger" onclick="clearDebugLogs()">清空日志</button>
      </div>
      <div id="debugLogContainer" style="max-height:60vh;overflow-y:auto;font-family:var(--font-mono);"></div>
    </div>`;
  
  panel.classList.add('open');
  renderDebugLogs();
}

function renderDebugLogs() {
  const container = document.getElementById('debugLogContainer');
  if (!container) return;
  
  const levelFilter = document.getElementById('debugLevelFilter')?.value || 'all';
  const tagFilter = document.getElementById('debugTagFilter')?.value || 'all';
  
  let filtered = DebugLogger.logs;
  if (levelFilter !== 'all') filtered = filtered.filter(l => l.level === levelFilter);
  if (tagFilter !== 'all') filtered = filtered.filter(l => l.tag === tagFilter);
  
  container.innerHTML = filtered.slice(-200).reverse().map(l => {
    const time = new Date(l.time).toLocaleTimeString('zh-CN', {hour12: false});
    const dataStr = l.data ? ' ' + JSON.stringify(l.data).substring(0, 200) : '';
    return `<div class="debug-log-entry ${l.level}">
      <span style="color:var(--text-weak);">${time}</span>
      <span style="color:${l.level==='error'?'var(--accent-red)':l.level==='warn'?'var(--accent-gold)':'var(--accent-blue)'};">[${l.level.toUpperCase()}]</span>
      <span style="color:var(--accent-green);">[${l.tag}]</span>
      ${escapeHTML(l.message)}${escapeHTML(dataStr)}
    </div>`;
  }).join('');
}

function exportDebugLogs() {
  const exportData = {
    exportedAt: new Date().toISOString(),
    summary: {
      total: DebugLogger.logs.length,
      errors: DebugLogger.errorCount,
      warnings: DebugLogger.warnCount
    },
    logs: DebugLogger.logs
  };
  
  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `debug_logs_${new Date().toISOString().slice(0,10)}.json`;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 60000);
}

function clearDebugLogs() {
  if (!confirm('确认清空所有调试日志?')) return;
  DebugLogger.logs = [];
  DebugLogger.errorCount = 0;
  DebugLogger.warnCount = 0;
  DebugLogger._updateBadge();
  renderDebugLogs();
}

// ===== 批量API连通性测试 =====
const APITester = {
  results: {},
  isRunning: false,
  abortControllers: [],
  
  async runAll(agents) {
    this.isRunning = true;
    this.results = {};
    this.abortControllers = [];
    
    const testableAgents = agents.filter(a => a.apiKey && a.apiKey.trim());
    // 搜索测试：需要同时有tavilyApiKey且enableSearchTool
    const searchTestableAgents = agents.filter(a =>
      a.enableSearchTool && a.tavilyApiKey && a.tavilyApiKey.trim()
    );
    const totalCount = testableAgents.length + searchTestableAgents.length;

    if (totalCount === 0) {
      this.isRunning = false;
      return;
    }
    
    let completed = 0;
    
    renderFriendList();
    
    const updateProgress = () => {
      const fill = document.getElementById('testProgressFill');
      const text = document.getElementById('testProgressText');
      if (fill) fill.style.width = ((completed / totalCount) * 100) + '%';
      if (text) text.textContent = `测试中: ${completed}/${totalCount}`;
    };
    
    // ===== LLM API 测试 =====
    const testLLM = async (agent) => {
      const controller = new AbortController();
      this.abortControllers.push(controller);
      const timeoutId = setTimeout(() => controller.abort(), 15000);
      
      const startTime = performance.now();
      
      try {
        const response = await fetch(`${agent.baseURL.replace(/\/+$/, '')}/v1/chat/completions`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${agent.apiKey}`
          },
          body: JSON.stringify({
            model: agent.model,
            messages: [{ role: 'user', content: 'ping' }],
            max_tokens: 5,
            stream: false
          }),
          signal: controller.signal
        });
        
        clearTimeout(timeoutId);
        const latency = Math.round(performance.now() - startTime);
        
        let respBody = null;
        let respText = '';
        try {
          respText = await response.text();
          respBody = JSON.parse(respText);
        } catch (e) {
          respBody = null;
          respText = respText || '';
        }
        
        if (response.ok && respBody && !respBody.error) {
          const hasValidContent = respBody.choices &&
            Array.isArray(respBody.choices) &&
            respBody.choices.length > 0;
          
          if (hasValidContent) {
            this.results[agent.id] = { status: 'ok', latency };
          } else {
            this.results[agent.id] = {
              status: 'unexpected',
              latency,
              error: `响应不含有效内容: ${respText.substring(0, 80)}`
            };
            DebugLogger.warn('apitest', `${agent.name}: 200但响应体异常`);
          }
        } else if (response.ok && respBody && respBody.error) {
          const errMsg = typeof respBody.error === 'string'
            ? respBody.error
            : (respBody.error.message || JSON.stringify(respBody.error));
          this.results[agent.id] = {
            status: 'unexpected',
            latency,
            error: `API返回错误: ${errMsg.substring(0, 100)}`
          };
          DebugLogger.warn('apitest', `${agent.name}: 200但body含错误`);
        } else if (response.status === 401 || response.status === 403) {
          this.results[agent.id] = { status: 'auth_error', latency, error: `HTTP ${response.status}` };
          DebugLogger.warn('apitest', `${agent.name}: 认证失败 (${response.status})`);
        } else if (response.status === 404) {
          this.results[agent.id] = { status: 'model_not_found', latency, error: '模型或端点未找到' };
          DebugLogger.warn('apitest', `${agent.name}: 模型未找到`);
        } else if (response.status === 429) {
          const retryAfter = respBody?.retry_after || '未知';
          this.results[agent.id] = { status: 'rate_limited', latency, error: `频率限制(重试:${retryAfter})` };
          DebugLogger.warn('apitest', `${agent.name}: 429限流`);
        } else if (response.status === 400) {
          const errMsg = respBody?.error?.message || respText.substring(0, 100) || `HTTP 400`;
          this.results[agent.id] = { status: 'bad_request', latency, error: errMsg };
          DebugLogger.warn('apitest', `${agent.name}: 400请求错误`);
        } else {
          this.results[agent.id] = {
            status: 'unexpected',
            latency,
            error: `HTTP ${response.status}: ${respText.substring(0, 100)}`
          };
          DebugLogger.warn('apitest', `${agent.name}: 异常响应 ${response.status}`);
        }
      } catch (error) {
        clearTimeout(timeoutId);
        const latency = Math.round(performance.now() - startTime);
        
        if (error.name === 'AbortError') {
          this.results[agent.id] = { status: 'timeout', latency, error: '超时(15s)' };
          DebugLogger.warn('apitest', `${agent.name}: 超时`);
        } else {
          this.results[agent.id] = { status: 'network_error', latency, error: error.message.substring(0, 100) };
          DebugLogger.warn('apitest', `${agent.name}: 网络错误 - ${error.message}`);
        }
      }
      
      completed++;
      updateProgress();
      renderFriendList();
    };

    // ===== Tavily 搜索API测试 =====
    const testTavily = async (agent) => {
      const controller = new AbortController();
      this.abortControllers.push(controller);
      const timeoutId = setTimeout(() => controller.abort(), 15000);
      const startTime = performance.now();
      const searchResultKey = agent.id + '_tavily';

      try {
        const response = await fetch('https://api.tavily.com/search', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${agent.tavilyApiKey}`
          },
          body: JSON.stringify({
            query: 'test',
            search_depth: 'basic',
            max_results: 1
          }),
          signal: controller.signal
        });

        clearTimeout(timeoutId);
        const latency = Math.round(performance.now() - startTime);

        if (response.ok) {
          const body = await response.json().catch(() => null);
          if (body && body.results !== undefined) {
            this.results[searchResultKey] = { status: 'ok', latency, type: 'tavily' };
            DebugLogger.info('apitest', `${agent.name}: Tavily搜索API连通 (${latency}ms)`);
          } else {
            this.results[searchResultKey] = {
              status: 'unexpected', latency, type: 'tavily',
              error: `Tavily响应格式异常: ${JSON.stringify(body).substring(0, 80)}`
            };
            DebugLogger.warn('apitest', `${agent.name}: Tavily响应异常`);
          }
        } else if (response.status === 401 || response.status === 403) {
          this.results[searchResultKey] = { status: 'auth_error', latency, type: 'tavily', error: `HTTP ${response.status}` };
          DebugLogger.warn('apitest', `${agent.name}: Tavily认证失败`);
        } else if (response.status === 429) {
          this.results[searchResultKey] = { status: 'rate_limited', latency, type: 'tavily', error: '频率限制' };
          DebugLogger.warn('apitest', `${agent.name}: Tavily限流`);
        } else {
          this.results[searchResultKey] = {
            status: 'unexpected', latency, type: 'tavily',
            error: `HTTP ${response.status}`
          };
          DebugLogger.warn('apitest', `${agent.name}: Tavily异常响应 ${response.status}`);
        }
      } catch (error) {
        clearTimeout(timeoutId);
        const latency = Math.round(performance.now() - startTime);
        if (error.name === 'AbortError') {
          this.results[searchResultKey] = { status: 'timeout', latency, type: 'tavily', error: '超时(15s)' };
        } else {
          this.results[searchResultKey] = { status: 'network_error', latency, type: 'tavily', error: error.message.substring(0, 100) };
        }
      }

      completed++;
      updateProgress();
      renderFriendList();
    };

    // 先测LLM API
    for (const agent of testableAgents) {
      if (!this.isRunning) break;
      await testLLM(agent);
    }
    // 再测Tavily搜索API
    for (const agent of searchTestableAgents) {
      if (!this.isRunning) break;
      await testTavily(agent);
    }
    
    this.isRunning = false;
    DebugLogger.info('apitest', `批量测试完成: ${completed}/${totalCount}`);
    renderFriendList();
  },
  
  cancel() {
    this.isRunning = false;
    for (const ctrl of this.abortControllers) {
      ctrl.abort();
    }
    this.abortControllers = [];
    DebugLogger.info('apitest', '批量测试已取消');
    renderFriendList();
  }
};

function startBatchAPITest() {
  const agents = getAllAgentFriends();
  APITester.runAll(agents);
}

function cancelBatchTest() {
  APITester.cancel();
}
