function createMessageBubble(agentName, avatar, memberConfig) {
  const container = document.getElementById('messageList');
  const wrapper = document.createElement('div');
  wrapper.className = 'message-wrapper agent';
  wrapper.id = 'streaming-' + generateUUID().substring(0, 8);
  
  let roleBadge = '';
  if (memberConfig?.role === 'host') roleBadge = '<span class="badge badge-host">群主</span>';
  if (memberConfig?.role === 'admin') roleBadge = '<span class="badge badge-admin">管理</span>';
  
  wrapper.innerHTML = `
    <div class="message-header">
      <div class="avatar">${escapeHTML(avatar)}</div>
      <span class="name">${escapeHTML(agentName)}</span>
      ${roleBadge}
      <span class="time" style="color:var(--accent-green);">生成中...</span>
    </div>
    <div class="message-bubble agent-bg">
      <div class="message-body"></div>
      <div class="thinking-block collapsed" style="display:none;"></div>
    </div>`;
  
  container.appendChild(wrapper);
  container.scrollTop = container.scrollHeight;
  
  return wrapper;
}

function updateMessageContent(wrapper, fullText) {
  const body = wrapper.querySelector('.message-body');
  if (body) {
    body.innerHTML = renderMarkdown(fullText);
  }
  const container = document.getElementById('messageList');
  container.scrollTop = container.scrollHeight;
}

function updateThinkingBlock(wrapper, thinkingText) {
  const thinkingBlock = wrapper.querySelector('.thinking-block');
  const thinkingToggle = wrapper.querySelector('.thinking-toggle');
  
  if (thinkingBlock) {
    thinkingBlock.style.display = 'block';
    thinkingBlock.classList.remove('collapsed');
    thinkingBlock.textContent = thinkingText;
  }
  
  if (!thinkingToggle) {
    const header = wrapper.querySelector('.message-header .time');
    if (header) {
      const toggle = document.createElement('div');
      toggle.className = 'thinking-toggle';
      toggle.textContent = '[>] 思考过程';
      toggle.onclick = () => {
        const tb = wrapper.querySelector('.thinking-block');
        if (tb) tb.classList.toggle('collapsed');
      };
      wrapper.querySelector('.message-bubble').appendChild(toggle);
    }
  }
}

function finalizeMessageBubble(wrapper, parsed, savedMsg) {
  const timeEl = wrapper.querySelector('.message-header .time');
  if (timeEl) {
    timeEl.textContent = formatTime(savedMsg.timestamp);
    timeEl.style.color = '';
  }
  
  if (parsed.commandBlock && parsed.commandBlock.command === 'propose') {
    const statusHTML = renderCommandStatus(parsed.commandBlock, null);
    if (statusHTML) {
      const statusDiv = document.createElement('div');
      statusDiv.innerHTML = statusHTML;
      wrapper.appendChild(statusDiv.firstElementChild);
    }
  }
  
  const body = wrapper.querySelector('.message-body');
  const contentText = parsed.cleanContent || '';
  if (body && contentText.length > 400) {
    body.classList.add('folded');
    const toggle = document.createElement('span');
    toggle.className = 'expand-toggle';
    toggle.textContent = '[展开全文]';
    toggle.onclick = () => {
      body.classList.toggle('folded');
      toggle.textContent = body.classList.contains('folded') ? '[展开全文]' : '[收起]';
    };
    wrapper.querySelector('.message-bubble').appendChild(toggle);
  }
  
  const thinkingBlock = wrapper.querySelector('.thinking-block');
  if (thinkingBlock && !thinkingBlock.classList.contains('collapsed')) {
    thinkingBlock.classList.add('collapsed');
  }
  
  const streamingEl = document.getElementById(wrapper.id);
  if (streamingEl && savedMsg) {
    streamingEl.id = 'msg-' + savedMsg.id;
  }
}

function showErrorMessage(wrapper, errorMessage) {
  const body = wrapper.querySelector('.message-body');
  if (body) {
    body.innerHTML = `<span style="color:var(--accent-red);">[调用失败] ${escapeHTML(errorMessage)}</span>`;
  }
  const timeEl = wrapper.querySelector('.message-header .time');
  if (timeEl) {
    timeEl.textContent = '错误';
    timeEl.style.color = 'var(--accent-red)';
  }
}

// ===== 消息发送 =====
async function sendMessage() {
  const input = document.getElementById('messageInput');
  const content = input.value.trim();
  if (!content || !activeGroupId) return;
  
  input.value = '';
  input.style.height = 'auto';
  
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('messageInput').disabled = true;
  
  try {
    await runChatRound(activeGroupId, content);
  } catch(e) {
    addSystemMessage(activeGroupId, `[错误] ${e.message}`);
    DebugLogger.error('chat', `sendMessage异常: ${e.message}`);
  }
  
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('messageInput').disabled = false;
  document.getElementById('messageInput').focus();
  
  renderChatMessages();
  renderGroupList();
}

function getNextRoundIndex(groupId) {
  const messages = getMessages(groupId);
  if (messages.length === 0) return 0;
  return Math.max(...messages.map(m => m.roundIndex || 0)) + 1;
}

function addSystemMessage(groupId, content) {
  const msg = {
    id: generateUUID(),
    groupId,
    roundIndex: getNextRoundIndex(groupId),
    senderType: 'system',
    senderId: null,
    senderName: '系统',
    content,
    cleanContent: content,
    thinkingContent: null,
    commandBlock: null,
    commandResult: null,
    quotedMessageId: null,
    mentions: [],
    timestamp: Date.now()
  };
  saveMessage(groupId, msg);
}

function handleInputKeydown(event) {
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    sendMessage();
  }
}

function handleInputChange(event) {
  const input = event.target;
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  
  const cursorPos = input.selectionStart;
  const textBeforeCursor = input.value.substring(0, cursorPos);
  if (textBeforeCursor.endsWith('@') && activeGroupId) {
    showMentionSelector(input, activeGroupId);
  }
}

function showPopupMenu(x, y, items) {
  const existing = document.getElementById('popupMenu');
  
  // 【修复】清理上一次可能残留的closeHandler引用
  if (existing._closeHandler) {
    document.removeEventListener('click', existing._closeHandler);
    existing._closeHandler = null;
  }
  
  existing.style.display = 'none';
  
  existing.innerHTML = items.map((item, idx) => {
    if (item.label === '---') {
      return '<div style="border-top:1px solid var(--border-color);margin:4px 0;"></div>';
    }
    return `<div class="popup-menu-item${item.danger ? ' danger' : ''}" 
      data-idx="${idx}">${item.label}</div>`;
  }).join('');
  
  existing.querySelectorAll('.popup-menu-item').forEach((el) => {
    const idx = parseInt(el.dataset.idx);
    const item = items[idx];
    if (item && item.action) {
      el.addEventListener('click', () => {
        existing.style.display = 'none';
        // 【修复】菜单项点击时主动清理外部点击监听器
        if (existing._closeHandler) {
          document.removeEventListener('click', existing._closeHandler);
          existing._closeHandler = null;
        }
        item.action();
      });
    }
  });
  
  existing.style.display = 'block';
  
  requestAnimationFrame(() => {
    const menuWidth = existing.offsetWidth;
    const menuHeight = existing.offsetHeight;
    existing.style.left = Math.min(x, window.innerWidth - menuWidth - 10) + 'px';
    existing.style.top = Math.min(y, window.innerHeight - menuHeight - 60) + 'px';
  });
  
  const closeHandler = (e) => {
    if (!existing.contains(e.target)) {
      existing.style.display = 'none';
      document.removeEventListener('click', closeHandler);
      existing._closeHandler = null;
    }
  };
  existing._closeHandler = closeHandler;
  setTimeout(() => document.addEventListener('click', closeHandler), 100);
}

function showMuteSelector(group, x, y) {
  const members = group.members.filter(m => m.role !== 'host');
  if (members.length === 0) {
    alert('没有可禁言的成员');
    return;
  }
  
  const items = members.map(m => {
    const agent = getAgentFriend(m.agentId);
    return {
      label: `${agent?.name || '未知'}${m.isMuted ? ' [已禁言]' : ''}`,
      action: () => {
        if (m.isMuted) {
          alert(`${agent?.name || '该成员'} 已处于禁言状态`);
        } else {
          const rounds = parseInt(prompt(`禁言 ${agent?.name || '该成员'} 几轮?`, '3'));
          if (rounds > 0 && !isNaN(rounds)) {
            m.isMuted = true;
            const scheduler = getWakeScheduler(activeGroupId);
            m.muteUntilCount = scheduler.messageCount + rounds;
            saveGroup(group);
            addSystemMessage(activeGroupId, `[系统] ${agent?.name || '成员'} 被禁言 ${rounds} 轮`);
            renderChatMessages();
          }
        }
      }
    };
  });
  
  showPopupMenu(x, y, items);
}

function showUnmuteSelector(group, x, y) {
  const mutedMembers = group.members.filter(m => m.isMuted);
  if (mutedMembers.length === 0) {
    alert('没有被禁言的成员');

}

function showKickSelector(group, x, y) {

function showProposeInput(x, y) {
  const content = prompt('输入提议内容:');
  if (content && content.trim()) {
    const groupId = activeGroupId;
    const proposalId = generateUUID();
    ProposalStateMachine.create(proposalId, content.trim(), 'user', groupId);
    addSystemMessage(groupId, `[用户提议] ${content.trim()} (ID: ${proposalId.substring(0, 8)})`);
    renderChatMessages();
    
    // 【Bug2修复】用户手动发起提议后强制唤醒全体非禁言成员参与表决
    // 不使用runChatRound（避免计数唤醒的随机性），直接构造表决任务
    const group = getGroup(groupId);
    if (!group) return;
    
    setTimeout(async () => {
      try {
        const allMessages = getMessages(groupId);
        const concurrency = getConcurrencyController(groupId);
        
        // 强制唤醒所有非禁言、有API Key的成员
        const allMemberIds = group.members
          .filter(m => !m.isMuted)
          .map(m => m.agentId)
          .filter(id => {
            const agent = getAgentFriend(id);
            return agent && agent.apiKey && agent.apiKey.trim();
          });
        
        if (allMemberIds.length === 0) return;
        
        const votingPrompt = `[系统表决请求] 用户发起了一个新提议需要表决:\n  提议ID: ${proposalId}\n  提议内容: ${content.trim()}\n  请各成员使用 vote 命令进行表决: {\"command\":\"vote\",\"proposalId\":\"${proposalId}\",\"vote\":\"agree或disagree\",\"reason\":\"表决理由\"}`;
        
        const tasks = allMemberIds.map(agentId => {
          return async () => {
            const member = group.members.find(m => m.agentId === agentId);
            const agent = getAgentFriend(agentId);
            if (!member || !agent) return;
            
            const context = buildAgentContext(group, agentId, allMessages);
            try {
              const response = await callAgentAPI(
                agent, member, group,
                votingPrompt,
                context.messages,
                false
              );
              
              let fullResponse = '';
              let thinkingResponse = '';
              const msgElement = createMessageBubble(agent.name, agent.avatar, member);
              
              await streamAgentResponse(
                response,
                (chunk, full, isThinking) => {
                  if (isThinking) {
                    thinkingResponse += chunk;
                    updateThinkingBlock(msgElement, thinkingResponse);
                  } else {
                    fullResponse += chunk;
                    updateMessageContent(msgElement, fullResponse);
                  }
                },
                (fullText, thinkingText) => {
                  const parsed = parseAgentResponse(fullText);
                  const msg = {
                    id: generateUUID(),
                    groupId,
                    roundIndex: getNextRoundIndex(groupId),
                    senderType: 'agent',
                    senderId: agentId,
                    senderName: agent.name,
                    content: parsed.cleanContent || parsed.displayContent,
                    cleanContent: parsed.cleanContent,
                    thinkingContent: thinkingText || parsed.thinkingContent,
                    commandBlock: parsed.commandBlock,
                    commandResult: null,
                    quotedMessageId: null,
                    mentions: extractMentionsFromContent(parsed.cleanContent, group),
                    timestamp: Date.now()
                  };
                  saveMessage(groupId, msg);
                  
                  if (parsed.commandBlock) {
                    handleCommand(parsed.commandBlock, groupId, agentId);
                  }
                  
                  // 【Bug4修复】消息生成完成后递增messageCount
                  const scheduler = getWakeScheduler(groupId);
                  scheduler.incrementMessageCount();
                  
                  finalizeMessageBubble(msgElement, parsed, msg);
                },
                (error) => {
                  showErrorMessage(msgElement, error.message);
                }
              );
            } catch (error) {
              DebugLogger.error(`agent:${agent.name}`, `表决响应失败: ${error.message}`);
            }
          };
        });
        
        await concurrency.executeAll(tasks);
        renderChatMessages();
        renderGroupList();
      } catch(e) {
        DebugLogger.error('command', `用户提议表决轮触发失败: ${e.message}`);
      }
    }, 500);
  }
}

function showVoteSelector(x, y) {
  const openProposals = [];
  ProposalStateMachine.proposals.forEach((p, id) => {
    if (p.status === 'open' && p.groupId === activeGroupId) {
      openProposals.push({ id, content: p.content });
    }
  });
  
  if (openProposals.length === 0) {
    alert('当前没有进行中的提议');
    return;
  }
  
  const items = openProposals.map(p => ({
    label: `提议: ${p.content.substring(0, 30)}...`,
    action: () => {
      const vote = confirm(`对提议 "${p.content.substring(0, 40)}..." \n\n点击"确定"=同意，点击"取消"=反对`);
      const result = ProposalStateMachine.castVote(
        p.id, 'user', vote ? 'agree' : 'disagree', '用户手动表决'
      );
      if (result) {
        addSystemMessage(activeGroupId, `[用户表决] ${vote ? '同意' : '反对'}了提议 (${p.id.substring(0, 8)})`);
        renderChatMessages();
      }
    }
  }));
  
  showPopupMenu(x, y, items);
}

function enterQuoteMode() {
  // 【修复】实现真正的引用模式：让用户点击消息来引用
  const messageList = document.getElementById('messageList');
  if (!messageList) return;
  
  // 添加视觉提示：进入引用模式
  const input = document.getElementById('messageInput');
  if (input) {
    input.placeholder = '[引用模式] 点击一条消息来引用它，或按Esc取消...';
    input.focus();
  }
  
  // 高亮所有可引用的消息
  const wrappers = messageList.querySelectorAll('.message-wrapper.agent, .message-wrapper.user');
  wrappers.forEach(w => {
    w.style.cursor = 'pointer';
    w.style.outline = '2px dashed var(--accent-blue)';
    w.style.outlineOffset = '2px';
  });
  
  // 点击消息完成引用
  const quoteHandler = function(e) {
    const wrapper = e.target.closest('.message-wrapper');
    if (!wrapper) return;
    
    // 从id提取消息ID: msg-xxxx
    const msgId = wrapper.id.replace('msg-', '');
    if (!msgId) return;
    
    // 将引用标记插入输入框
    if (input) {
      const currentVal = input.value;
      input.value = (currentVal ? currentVal + ' ' : '') + `[引用:${msgId}] `;
      input.placeholder = '输入消息... 使用 @ 提及Agent';
      input.focus();
    }
    
    // 清理引用模式
    cleanupQuoteMode(wrappers);
  };
  
  // Esc取消
  const keyHandler = function(e) {
    if (e.key === 'Escape') {
      cleanupQuoteMode(wrappers);
    }
  };
  
  function cleanupQuoteMode(wrappersList) {
    wrappersList.forEach(w => {
      w.style.cursor = '';
      w.style.outline = '';
      w.style.outlineOffset = '';
      w.removeEventListener('click', quoteHandler);
    });
    document.removeEventListener('keydown', keyHandler);
    if (input) {
      input.placeholder = '输入消息... 使用 @ 提及Agent';
    }
  }
  
  wrappers.forEach(w => {
    w.addEventListener('click', quoteHandler);
  });
  document.addEventListener('keydown', keyHandler);
}

          <div style="width:28px;height:28px;border-radius:50%;background:var(--bg-tertiary);
            display:flex;align-items:center;justify-content:center;font-size:12px;">
            ${escapeHTML(agent.avatar)}
          </div>
          <div>
            <div style="font-size:14px;">${escapeHTML(agent.name)}</div>
            <div style="font-size:11px;color:var(--text-weak);">
              ${m.role === 'host' ? '群主' : m.role === 'admin' ? '管理员' : '成员'}
              ${m.isMuted ? ' · 禁言中' : ''}
            </div>
          </div>
        </div>
        <div style="display:flex;gap:4px;">
          ${m.role !== 'host' ? `<button class="btn small" onclick="promoteMember('${group.id}','${m.agentId}','host')">升群主</button>` : ''}
          ${m.role === 'member' ? `<button class="btn small" onclick="promoteMember('${group.id}','${m.agentId}','admin')">设管理</button>` : ''}
          ${m.role === 'admin' ? `<button class="btn small" onclick="demoteMember('${group.id}','${m.agentId}')">降级</button>` : ''}
          ${!m.isMuted ? `<button class="btn small" onclick="muteMemberFromPanel('${group.id}','${m.agentId}')">禁言</button>` : ''}
          ${m.isMuted ? `<button class="btn small" onclick="unmuteMemberFromPanel('${group.id}','${m.agentId}')">解除</button>` : ''}
          ${m.role !== 'host' ? `<button class="btn small danger" onclick="kickMember('${group.id}','${m.agentId}')">踢出</button>` : ''}
        </div>
      </div>`;
  }).join('');
}

function promoteMember(groupId, agentId, role) {
  const group = getGroup(groupId);
  if (!group) return;
  if (role === 'host') {
    group.members.forEach(m => { if (m.role === 'host') m.role = 'member'; });
  }
  const member = group.members.find(m => m.agentId === agentId);
  if (member) member.role = role;
  saveGroup(group);
  const agent = getAgentFriend(agentId);
  addSystemMessage(groupId, `[系统] ${agent?.name || '成员'} 被任命为${role === 'host' ? '群主' : '管理员'}`);
  openGroupSettingsPanel(groupId);
  renderChatMessages();
}

function demoteMember(groupId, agentId) {
  const group = getGroup(groupId);
  if (!group) return;
  const member = group.members.find(m => m.agentId === agentId);
  if (member) member.role = 'member';
  saveGroup(group);
  const agent = getAgentFriend(agentId);
  addSystemMessage(groupId, `[系统] ${agent?.name || '成员'} 被降级为普通成员`);
  openGroupSettingsPanel(groupId);
  renderChatMessages();
}

function kickMember(groupId, agentId) {
  const group = getGroup(groupId);
  const agent = getAgentFriend(agentId);
  if (!group || !agent) return;
  if (!confirm(`确认将 ${agent.name} 踢出群聊?`)) return;
  group.members = group.members.filter(m => m.agentId !== agentId);
  saveGroup(group);
  addSystemMessage(groupId, `[系统] ${agent.name} 已被移出群聊`);
  openGroupSettingsPanel(groupId);
  renderChatMessages();
}

function showInviteMemberSelector(groupId) {
  const group = getGroup(groupId);
  if (!group) return;
  
  const allFriends = getAllAgentFriends();
  const activeMemberIds = new Set(group.members.map(m => m.agentId));
  const available = allFriends.filter(a => !activeMemberIds.has(a.id));
  
  if (available.length === 0) {
    alert('没有可邀请的好友（所有好友已在群内）');
    return;
  }
  
  const dialog = document.createElement('div');
  dialog.style.cssText = `
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.7);z-index:400;
    display:flex;align-items:center;justify-content:center;
  `;
  dialog.id = 'inviteMemberDialog';
  
  const selectedIds = new Set();
  
  const toggleSelect = (agentId, el) => {
    if (selectedIds.has(agentId)) {
      selectedIds.delete(agentId);
      el.style.background = 'transparent';
      el.style.outline = '';
    } else {
      selectedIds.add(agentId);
      el.style.background = 'rgba(68,136,255,0.15)';
      el.style.outline = '1px solid var(--accent-blue)';
    }
    const btn = dialog.querySelector('#inviteConfirmBtn');
    if (btn) btn.textContent = `拉入群聊 (${selectedIds.size})`;
  };
  
  dialog.innerHTML = `
    <div style="background:var(--bg-secondary);border:1px solid var(--border-color);
      border-radius:var(--radius-lg);width:400px;max-width:90vw;max-height:70vh;
      display:flex;flex-direction:column;">
      <div style="padding:14px 16px;border-bottom:1px solid var(--border-color);
        display:flex;justify-content:space-between;align-items:center;">
        <span style="font-weight:600;">拉人进群 · ${escapeHTML(group.name)}</span>
        <button class="hamburger-btn" id="inviteDialogClose">[×]</button>
      </div>
      <div style="flex:1;overflow-y:auto;padding:8px;">
        ${available.map(a => `
          <div class="invite-candidate" data-agent-id="${a.id}"
            style="display:flex;align-items:center;gap:10px;padding:10px 12px;
              cursor:pointer;border-radius:var(--radius-sm);margin:2px 0;
              transition:background 0.1s;">
            <div style="width:32px;height:32px;border-radius:50%;background:var(--bg-tertiary);
              display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;
              flex-shrink:0;">${escapeHTML(a.avatar)}</div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:14px;">${escapeHTML(a.name)}</div>
              <div style="font-size:11px;color:var(--text-weak);">${escapeHTML(a.model)} ${(a.tags||[]).join(' · ')}</div>
            </div>
          </div>
        `).join('')}
        ${available.length === 0 ? '<div style="text-align:center;color:var(--text-weak);padding:24px;">没有可邀请的好友</div>' : ''}
      </div>
      <div style="padding:12px 16px;border-top:1px solid var(--border-color);
        display:flex;gap:8px;justify-content:flex-end;">
        <button class="btn" id="inviteCancelBtn">取消</button>
        <button class="btn primary" id="inviteConfirmBtn">拉入群聊</button>
      </div>
    </div>`;
  
  document.body.appendChild(dialog);
  
  // 绑定候选人点击事件
  dialog.querySelectorAll('.invite-candidate').forEach(el => {
    el.addEventListener('mouseenter', () => {
      if (!selectedIds.has(el.dataset.agentId)) el.style.background = 'rgba(255,255,255,0.03)';
    });
    el.addEventListener('mouseleave', () => {
      if (!selectedIds.has(el.dataset.agentId)) el.style.background = 'transparent';
    });
    el.addEventListener('click', () => toggleSelect(el.dataset.agentId, el));
  });
  
  // 关闭按钮
  dialog.querySelector('#inviteDialogClose').addEventListener('click', () => dialog.remove());
  dialog.querySelector('#inviteCancelBtn').addEventListener('click', () => dialog.remove());
  
  // 点击遮罩关闭
  dialog.addEventListener('click', (e) => {
    if (e.target === dialog) dialog.remove();
  });
  
  // 确认按钮
  dialog.querySelector('#inviteConfirmBtn').addEventListener('click', () => {
    if (selectedIds.size === 0) return;
    for (const agentId of selectedIds) {
      inviteMemberToGroup(groupId, agentId);
    }
    dialog.remove();
    openGroupSettingsPanel(groupId);
    renderChatMessages();
  });
}

function inviteMemberToGroup(groupId, agentId) {
  const group = getGroup(groupId);
  const agent = getAgentFriend(agentId);
  if (!group || !agent) return;
  
  if (group.members.some(m => m.agentId === agentId)) return;
  
  group.members.push({
    agentId: agentId,
    overrides: {},
    role: 'member',
    isMuted: false,
    muteUntilCount: null,
    joinedAt: Date.now()
  });
  saveGroup(group);
  addSystemMessage(groupId, `[加入] ${agent.name} 被邀请加入群聊`);
}

function muteMemberFromPanel(groupId, agentId) {
  const group = getGroup(groupId);
  const agent = getAgentFriend(agentId);
  if (!group || !agent) return;
  const rounds = parseInt(prompt(`禁言 ${agent.name} 几轮?`, '3'));
  if (!rounds || rounds <= 0 || isNaN(rounds)) return;
  const member = group.members.find(m => m.agentId === agentId);
  if (member) {
    member.isMuted = true;
    const scheduler = getWakeScheduler(groupId);
    member.muteUntilCount = scheduler.messageCount + rounds;
    saveGroup(group);
    addSystemMessage(groupId, `[系统] ${agent.name} 被禁言 ${rounds} 轮`);
    openGroupSettingsPanel(groupId);
    renderChatMessages();
  }
}

function unmuteMemberFromPanel(groupId, agentId) {
  const group = getGroup(groupId);
  const agent = getAgentFriend(agentId);
  if (!group || !agent) return;
  const member = group.members.find(m => m.agentId === agentId);
  if (member) {
    member.isMuted = false;
    member.muteUntilCount = null;
    saveGroup(group);
    addSystemMessage(groupId, `[系统] ${agent.name} 被解除禁言`);
    openGroupSettingsPanel(groupId);
    renderChatMessages();
  }
}

function renderMuteManagement(group) {
  const mutedMembers = group.members.filter(m => m.isMuted);
  if (mutedMembers.length === 0) {
    return '<div style="font-size:13px;color:var(--text-weak);">当前无禁言成员</div>';
  }
  const scheduler = getWakeScheduler(group.id);
  return `
    <div style="margin-bottom:8px;">
      ${mutedMembers.map(m => {
        const agent = getAgentFriend(m.agentId);
        const remaining = m.muteUntilCount !== null && m.muteUntilCount !== undefined
          ? Math.max(0, m.muteUntilCount - scheduler.messageCount)
          : '?';
        return `<div style="font-size:13px;padding:4px 0;display:flex;justify-content:space-between;">
          <span>${agent?.name || '未知'} <span style="color:var(--accent-red);">(剩余${remaining}轮)</span></span>
          <button class="btn small" onclick="unmuteMemberFromPanel('${group.id}','${m.agentId}')">解除</button>
        </div>`;
      }).join('')}
    </div>
    <button class="btn small danger" onclick="unmuteAllMembers('${group.id}')">批量解除所有禁言</button>`;
}

function unmuteAllMembers(groupId) {
  const group = getGroup(groupId);
  if (!group) return;
  group.members.forEach(m => { m.isMuted = false; m.muteUntilCount = null; });
  saveGroup(group);
  addSystemMessage(groupId, '[系统] 所有禁言已解除');
  openGroupSettingsPanel(groupId);
  renderChatMessages();
}

function resetChat(groupId) {
  if (!confirm('确认重置聊天? 所有消息和摘要将被清空。')) return;
  saveMessages(groupId, []);
  const group = getGroup(groupId);
  if (group) {
    group.summaries = [];
    saveGroup(group);
    const scheduler = wakeSchedulers.get(groupId);
    if (scheduler) scheduler.reset();
  }
  addSystemMessage(groupId, '[系统] 聊天记录已重置');
  renderChatMessages();
}

function disbandGroup(groupId) {
  const group = getGroup(groupId);
  if (!group) return;
  if (!confirm(`确认解散群聊 "${group.name}"? 此操作不可恢复。`)) return;
  if (!confirm(`再次确认解散 "${group.name}"?`)) return;
  deleteGroup(groupId);
  if (activeGroupId === groupId) {
    activeGroupId = null;
    const settings = getAppSettings();
    settings.activeGroupId = null;
    saveAppSettings(settings);
  }
  closePanel();
  switchView('groups');
  renderGroupList();
}

function closeCreateGroupDialog() {
  document.getElementById('createGroupDialog').style.display = 'none';
}

function createNewGroup() {
  const name = document.getElementById('newGroupName').value.trim();
  if (!name) { alert('请输入群名称'); return; }
  
  const topic = document.getElementById('newGroupTopic').value.trim();
  const hostId = document.querySelector('input[name="hostSelect"]:checked')?.value;
  if (!hostId) { alert('请选择群主'); return; }
  
  const memberIds = [...document.querySelectorAll('input[name="memberSelect"]:checked')]
    .map(el => el.value);
  const concurrency = parseInt(document.getElementById('newGroupConcurrency').value) || 3;
  const breakArmor = document.getElementById('newGroupBreakArmor').classList.contains('on');
  
  const groupId = generateUUID();
  const group = {
    id: groupId,
    name,
    topic,
    createdAt: Date.now(),
    members: [],
    settings: {
      concurrencyLimit: Math.max(1, Math.min(10, concurrency)),
      globalBreakArmor: breakArmor,
      hostContextMultiplier: 2,
      maxHistoryRounds: 15
    },
    summaries: []
  };
  
  group.members.push({
    agentId: hostId,
    overrides: {},
    role: 'host',
    isMuted: false,
    muteUntilCount: null,
    joinedAt: Date.now()
  });
  
  for (const id of memberIds) {
    if (id === hostId) continue;
    group.members.push({
      agentId: id,
      overrides: {},
      role: 'member',
      isMuted: false,
      muteUntilCount: null,
      joinedAt: Date.now()
    });
  }
  
  // 【AI话题检测】强制添加话题偏离检测Agent到每个群
  // Watcher作为系统哨兵，不占用用户选择的成员名额
  const DRIFT_WATCHER_ID = 'builtin-watchdog-drift';
  if (!group.members.some(m => m.agentId === DRIFT_WATCHER_ID)) {
    const watcher = getAgentFriend(DRIFT_WATCHER_ID);
    if (watcher) {
      group.members.push({
        agentId: DRIFT_WATCHER_ID,
        overrides: {},
        role: 'member',
        isMuted: false,
        muteUntilCount: null,
        joinedAt: Date.now()
      });
    }
  }
  
  saveGroup(group);
  
  getWakeScheduler(groupId);
  
  const hostAgent = getAgentFriend(hostId);
  // 构建成员列表供初始显示
  const memberIntro = group.members.map(m => {
    const a = getAgentFriend(m.agentId);
    const role = m.role === 'host' ? '群主' : '成员';
    return `  • ${a?.name || '未知'} (${role})`;
  }).join('\n');
  addSystemMessage(groupId, `[系统] 群聊 "${name}" 已创建!\n\n当前成员(${group.members.length}人):\n${memberIntro}\n\n请 @${hostAgent?.name || '群主'} 并描述您的话题或项目，群主会开始引导讨论并分配任务。`);
  
  closeCreateGroupDialog();
  openChat(groupId);
}

function renderAgentCards(agents) {

  }
  
  return agents.map(a => {
    const testResult = APITester.results[a.id];

    const latencyInfo = testResult ? getLatencyDisplay(testResult) : '';
    
        return `
      <div style="margin-bottom:6px;background:var(--bg-secondary);
        border:1px solid var(--border-color);border-radius:var(--radius-md);
        cursor:pointer;transition:background 0.15s;overflow:hidden;"

        onclick="openFriendDetail('${a.id}')"
        onmouseenter="this.style.background='var(--bg-tertiary)'"
        onmouseleave="this.style.background='var(--bg-secondary)'">
        
        <div style="display:flex;align-items:center;padding:10px 12px;gap:10px;">
          <div style="width:32px;height:32px;border-radius:50%;background:var(--bg-tertiary);
            border:1px solid var(--border-color);display:flex;align-items:center;
            justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;">
            ${escapeHTML(a.avatar)}
          </div>
          
          <div style="flex:1;min-width:0;">
            <div style="font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px;">
              ${escapeHTML(a.name)}
              ${statusBadge}
            </div>
            <div style="font-size:11px;color:var(--text-weak);margin-top:1px;
              display:flex;gap:10px;flex-wrap:wrap;">
              <span>${a.model}</span>
              <span>唤醒:${a.wakeInterval === 0 ? '仅@' : '每'+a.wakeInterval+'条'}</span>
              ${!a.apiKey ? '<span style="color:var(--accent-red);">未配置Key</span>' : ''}
              ${latencyInfo ? `<span>${latencyInfo}</span>` : ''}
            </div>
          </div>
          
          <span style="color:var(--text-weak);font-size:16px;flex-shrink:0;">[>]</span>
        </div>
        
        ${testResult && testResult.status !== 'ok' && testResult.status !== 'skipped' ? `
        <div style="padding:6px 12px 10px 54px;font-size:11px;color:var(--accent-red);
          background:rgba(255,68,68,0.05);border-top:1px solid rgba(255,68,68,0.1);">
          ${escapeHTML(testResult.error || '未知错误')}
        </div>` : ''}
      </div>`;
  }).join('');
}

function getTestStatusBadge(agent, testResult) {
  if (!agent.apiKey || !agent.apiKey.trim()) {
    return '<span style="font-size:10px;padding:1px 6px;border-radius:3px;background:rgba(255,255,255,0.05);color:var(--text-weak);">未配置Key</span>';
  }
  
  if (!testResult) {
    return '<span style="font-size:10px;padding:1px 6px;border-radius:3px;background:rgba(255,255,255,0.05);color:var(--text-weak);">未测试</span>';
  }
  
  const badgeMap = {
    'ok':              { bg: 'rgba(68,255,68,0.15)', color: 'var(--accent-green)', text: '连通' },
    'model_not_found': { bg: 'rgba(255,215,0,0.15)', color: 'var(--accent-gold)',  text: '模型未找到' },
    'auth_error':      { bg: 'rgba(255,68,68,0.15)',  color: 'var(--accent-red)',   text: '认证失败' },
    'timeout':         { bg: 'rgba(255,68,68,0.15)',  color: 'var(--accent-red)',   text: '超时' },
    'network_error':   { bg: 'rgba(255,68,68,0.15)',  color: 'var(--accent-red)',   text: '网络错误' },
    'rate_limited':    { bg: 'rgba(255,215,0,0.15)', color: 'var(--accent-gold)',  text: '限流429' },
    'bad_request':     { bg: 'rgba(255,68,68,0.15)',  color: 'var(--accent-red)',   text: '请求错误' },
    'unexpected':      { bg: 'rgba(255,68,68,0.15)',  color: 'var(--accent-red)',   text: '异常响应' }
  };
  
  const b = badgeMap[testResult.status] || badgeMap['unexpected'];
  return `<span style="font-size:10px;padding:1px 6px;border-radius:3px;
    background:${b.bg};color:${b.color};">${b.text}</span>`;
}

function getLatencyDisplay(testResult) {
  if (!testResult || testResult.status === 'skipped') return '';
  const ms = testResult.latency;
  const color = ms < 1000 ? 'var(--accent-green)' : ms < 3000 ? 'var(--accent-gold)' : 'var(--accent-red)';
  return `<span style="color:${color};">${ms}ms</span>`;
}

function showFriendHamburgerMenu(event) {

      input.onchange = async (e) => {

}

function deleteAgentConfirm(agentId) {
  const agent = getAgentFriend(agentId);
  if (!agent) return;
  if (!confirm(`确认删除Agent "${agent.name}"? \n此操作会将TA从所有群聊中移除。`)) return;
  
  const groups = getAllGroups();
  for (const group of groups) {
    const wasMember = group.members.some(m => m.agentId === agentId);
    group.members = group.members.filter(m => m.agentId !== agentId);
    if (wasMember) {
      saveGroup(group);
      DebugLogger.info('group', `从群 ${group.name} 移除已删除的Agent: ${agent.name}`);
    }
  }
  
  deleteAgentFriend(agentId);
  closePanel();
  renderFriendList();
  renderGroupList();
  if (activeGroupId) renderChatMessages();
}

// ===== 命令处理 =====
function handleCommand(commandBlock, groupId, senderAgentId) {
  const group = getGroup(groupId);
  if (!group) return;
  
  const senderMember = group.members.find(m => m.agentId === senderAgentId);
  const senderAgent = getAgentFriend(senderAgentId);
  
  DebugLogger.info('command', `${senderAgent?.name || '未知'} 执行 ${commandBlock.command}`, commandBlock);
  
  switch (commandBlock.command) {
    case 'propose': {
      const proposalId = commandBlock.proposalId || generateUUID();
      ProposalStateMachine.create(
        proposalId, 
        commandBlock.content, 
        senderAgentId, 
        groupId
      );
      addSystemMessage(groupId, 
        `[提议] ${senderAgent?.name || 'Agent'} 提议: ${commandBlock.content} (ID: ${proposalId.substring(0, 8)})`);
      
      // 【Bug2修复】提案创建后强制唤醒全体非禁言成员参与表决
      // 不使用runChatRound（避免计数唤醒的随机性），直接构造表决任务
      const group = getGroup(groupId);
      if (!group) break;
      
      setTimeout(async () => {
        try {
          const allMessages = getMessages(groupId);
          const concurrency = getConcurrencyController(groupId);
          
          // 强制唤醒所有非禁言、有API Key的成员
          const allMemberIds = group.members
            .filter(m => !m.isMuted)
            .map(m => m.agentId)
            .filter(id => {
              const agent = getAgentFriend(id);
              return agent && agent.apiKey && agent.apiKey.trim();
            });
          
          if (allMemberIds.length === 0) return;
          
          const votingPrompt = `[系统表决请求] 群内有一个新提议需要表决:\n  提议ID: ${proposalId}\n  提议内容: ${commandBlock.content}\n  提议人: ${senderAgent?.name || 'Agent'}\n  请各成员使用 vote 命令进行表决: {\"command\":\"vote\",\"proposalId\":\"${proposalId}\",\"vote\":\"agree或disagree\",\"reason\":\"表决理由\"}`;
          
          const tasks = allMemberIds.map(agentId => {
            return async () => {
              const member = group.members.find(m => m.agentId === agentId);
              const agent = getAgentFriend(agentId);
              if (!member || !agent) return;
              
              const context = buildAgentContext(group, agentId, allMessages);
              try {
                const response = await callAgentAPI(
                  agent, member, group,
                  votingPrompt,
                  context.messages,
                  false
                );
                
                let fullResponse = '';
                let thinkingResponse = '';
                const msgElement = createMessageBubble(agent.name, agent.avatar, member);
                
                await streamAgentResponse(
                  response,
                  (chunk, full, isThinking) => {
                    if (isThinking) {
                      thinkingResponse += chunk;
                      updateThinkingBlock(msgElement, thinkingResponse);
                    } else {
                      fullResponse += chunk;
                      updateMessageContent(msgElement, fullResponse);
                    }
                  },
                  (fullText, thinkingText) => {
                    const parsed = parseAgentResponse(fullText);
                    const msg = {
                      id: generateUUID(),
                      groupId,
                      roundIndex: getNextRoundIndex(groupId),
                      senderType: 'agent',
                      senderId: agentId,
                      senderName: agent.name,
                      content: parsed.cleanContent || parsed.displayContent,
                      cleanContent: parsed.cleanContent,
                      thinkingContent: thinkingText || parsed.thinkingContent,
                      commandBlock: parsed.commandBlock,
                      commandResult: null,
                      quotedMessageId: null,
                      mentions: extractMentionsFromContent(parsed.cleanContent, group),
                      timestamp: Date.now()
                    };
                    saveMessage(groupId, msg);
                    
                    if (parsed.commandBlock) {
                      handleCommand(parsed.commandBlock, groupId, agentId);
                    }
                    
                    // 【Bug4修复】消息生成完成后递增messageCount
                    const scheduler = getWakeScheduler(groupId);
                    scheduler.incrementMessageCount();
                    
                    finalizeMessageBubble(msgElement, parsed, msg);
                  },
                  (error) => {
                    showErrorMessage(msgElement, error.message);
                  }
                );
              } catch (error) {
                DebugLogger.error(`agent:${agent.name}`, `表决响应失败: ${error.message}`);
              }
            };
          });
          
          await concurrency.executeAll(tasks);
          renderChatMessages();
          renderGroupList();
        } catch(e) {
          DebugLogger.error('command', `提案表决轮触发失败: ${e.message}`);
        }
      }, 500);
      break;
    }
    
    case 'vote': {
      // 【Bug1修复】如果没有指定proposalId，尝试对当前群唯一活跃提议投票
      if (!commandBlock.proposalId) {
        const openProposals = ProposalStateMachine.getOpenProposalsForGroup(groupId);
        if (openProposals.length === 1) {
          commandBlock.proposalId = openProposals[0].id;
        } else if (openProposals.length === 0) {
          addSystemMessage(groupId, `[系统] 当前没有进行中的提议可以表决`);
          break;
        } else {
          const proposalList = openProposals.map(p => 
            `  - ID: ${p.id.substring(0, 8)}... 内容: ${(p.content || '').substring(0, 40)}`
          ).join('\n');
          addSystemMessage(groupId, `[系统] 当前有多个进行中的提议，请指定proposalId：\n${proposalList}`);
          break;
        }
      }
      
      const voterId = senderAgentId || '__user__';
      const result = ProposalStateMachine.castVote(
        commandBlock.proposalId,
        voterId,
        commandBlock.vote,
        commandBlock.reason || ''
      );
      
      if (result) {
        const voteLabel = commandBlock.vote === 'agree' ? '同意' : '反对';
        const voterName = senderAgent?.name || '你';
        addSystemMessage(groupId, 
          `[表决] ${voterName} ${voteLabel}了提议 (${commandBlock.proposalId.substring(0, 8)}): ${commandBlock.reason || ''}`);
      } else {
        // 【Bug1修复】投票失败时给出明确提示
        const p = ProposalStateMachine.proposals.get(commandBlock.proposalId);
        if (!p) {
          addSystemMessage(groupId, `[系统] 未找到提议 (ID: ${(commandBlock.proposalId || '').substring(0, 8)}...)，可能已过期或不存在`);
        } else if (p.status !== 'open') {
          addSystemMessage(groupId, `[系统] 提议 "${(p.content || '').substring(0, 40)}" 已${p.status === 'passed' ? '通过' : p.status === 'rejected' ? '被否决' : '超时'}，无法再表决`);
        }
      }
      break;
    }
    
    case 'mute': {
      if (!senderMember || (senderMember.role !== 'host' && senderMember.role !== 'admin')) {
        DebugLogger.warn('command', `${senderAgent?.name} 无权执行禁言`);
        return;
      }
      const targetMember = group.members.find(m => {
        const agent = getAgentFriend(m.agentId);
        return agent && agent.name === commandBlock.target;
      });
      if (targetMember && targetMember.role !== 'host') {
        targetMember.isMuted = true;
        const scheduler = getWakeScheduler(groupId);
        // 【Bug4修复】禁言N条消息（而非N轮），messageCount现在是按消息递增
        targetMember.muteUntilCount = scheduler.messageCount + (commandBlock.rounds || 3);
        saveGroup(group);
        const targetAgent = getAgentFriend(targetMember.agentId);
        addSystemMessage(groupId, 
          `[禁言] ${senderAgent?.name || 'Agent'} 禁言了 ${targetAgent?.name || commandBlock.target}，持续 ${commandBlock.rounds || 3} 条消息`);
      }
      break;
    }
    
    case 'unmute': {
      if (!senderMember || (senderMember.role !== 'host' && senderMember.role !== 'admin')) return;
      const targetMember = group.members.find(m => {
        const agent = getAgentFriend(m.agentId);
        return agent && agent.name === commandBlock.target;
      });
      if (targetMember && targetMember.isMuted) {
        targetMember.isMuted = false;
        targetMember.muteUntilCount = null;
        saveGroup(group);
        const targetAgent = getAgentFriend(targetMember.agentId);
        addSystemMessage(groupId, `[解除禁言] ${senderAgent?.name || 'Agent'} 解除了 ${targetAgent?.name || commandBlock.target} 的禁言`);
      }
      break;
    }
    
    case 'invite': {
      if (!senderMember || senderMember.role !== 'host') return;
      // 【Bug2修复】支持逗号分隔的批量拉人: "AgentA, AgentB, AgentC"
      const targets = commandBlock.target.split(/[,，、\s]+/).map(s => s.trim()).filter(Boolean);
      const invited = [];
      const notFound = [];
      const alreadyIn = [];
      
      for (const targetName of targets) {
        const friend = findAgentByName(targetName);
        if (!friend) {
          notFound.push(targetName);
          continue;
        }
        if (group.members.some(m => m.agentId === friend.id)) {
          alreadyIn.push(friend.name);
          continue;
        }
        group.members.push({
          agentId: friend.id,
          overrides: {},
          role: 'member',
          isMuted: false,
          muteUntilCount: null,
          joinedAt: Date.now()
        });
        invited.push(friend.name);
      }
      
      saveGroup(group);
      if (invited.length > 0) {
        addSystemMessage(groupId, `[加入] ${senderAgent?.name || '群主'} 邀请了 ${invited.join(', ')} 加入群聊`);
      }
      if (notFound.length > 0) {
        addSystemMessage(groupId, `[系统] 未找到好友: ${notFound.join(', ')}`);
      }
      if (alreadyIn.length > 0) {
        addSystemMessage(groupId, `[系统] ${alreadyIn.join(', ')} 已在群中，跳过`);
      }
      break;
    }
    
    case 'remove': {
      if (!senderMember || senderMember.role !== 'host') return;
      const targetMember = group.members.find(m => {
        const agent = getAgentFriend(m.agentId);
        return agent && agent.name === commandBlock.target;
      });
      if (targetMember && targetMember.role !== 'host') {
        const targetAgent = getAgentFriend(targetMember.agentId);
        group.members = group.members.filter(m => m.agentId !== targetMember.agentId);
        saveGroup(group);
        addSystemMessage(groupId, `[移出] ${senderAgent?.name || '群主'} 将 ${targetAgent?.name || commandBlock.target} 移出群聊`);
      }
      break;
    }
    
    case 'listFriends': {
      if (!senderMember || senderMember.role !== 'host') return;
      const allFriends = getAllAgentFriends();
      const activeMembers = new Set(group.members.map(m => m.agentId));
      const available = allFriends.filter(a => !activeMembers.has(a.id));
      
      const friendList = available.length > 0 
        ? available.map(a => `${a.name} (${(a.tags||[]).join(',') || a.model})`).join('; ')
        : '无可邀请的好友';
      
      addSystemMessage(groupId, `[好友列表] 可邀请: ${friendList}`);
      
      // 【Bug3修复】好友列表生成后自动触发新对话轮。
      // 系统消息[好友列表]已通过addSystemMessage写入上下文。
      // 群主作为host始终在wakeList中，新一轮自然会看到列表并决定下一步。
      // 不传userMessage参数，避免虚假的"用户发言"污染聊天记录。
      setTimeout(async () => {
        try {
          await runChatRound(groupId, null);
        } catch(e) {
          DebugLogger.error('command', `listFriends后触发新对话轮失败: ${e.message}`);
        }
      }, 500);
      break;
    }

  }
  
  renderChatMessages();
}

// ===== 调试面板 =====
const DebugLogger = {
  logs: [],
  maxEntries: 500,
  errorCount: 0,
  warnCount: 0,
  
  _add(level, tag, message, data) {
    const entry = {
      id: generateUUID().substring(0, 8),
      time: Date.now(),
      level,
      tag,
      message,
      data: data || null
    };
    this.logs.push(entry);
    if (level === 'error') this.errorCount++;
    if (level === 'warn') this.warnCount++;
    
    while (this.logs.length > this.maxEntries) {
      const removed = this.logs.shift();
      if (removed.level === 'error') this.errorCount = Math.max(0, this.errorCount - 1);
      if (removed.level === 'warn') this.warnCount = Math.max(0, this.warnCount - 1);
    }
    
    this._updateBadge();
    return entry;
  },
  
  info(tag, message, data)  { return this._add('info', tag, message, data); },
  warn(tag, message, data)  { return this._add('warn', tag, message, data); },
  error(tag, message, data) { return this._add('error', tag, message, data); },
  debug(tag, message, data) { return this._add('debug', tag, message, data); },
  api(tag, message, data)   { return this._add('api', tag, message, data); },
  
  _updateBadge() {
    const badges = document.querySelectorAll('#debugBadgeDesktop, #debugBadgeMobile');
    badges.forEach(badge => {
      badge.textContent = `日志:${this.logs.length} 错误:${this.errorCount}`;
      const trigger = badge.closest('#debugTrigger, #debugTriggerMobile');
      if (trigger) {
        if (this.errorCount > 0) {
          badge.style.color = 'var(--accent-red)';
          trigger.classList.add('debug-has-error');
        } else if (this.warnCount > 0) {
          badge.style.color = 'var(--accent-gold)';
          trigger.classList.remove('debug-has-error');
        } else {
          badge.style.color = 'var(--text-weak)';
          trigger.classList.remove('debug-has-error');
        }
      }
    });
  }
};

function openDebugPanel() {
  const panel = document.getElementById('panelOverlay');
  
  const logLevels = ['all', 'info', 'warn', 'error', 'debug', 'api'];
  const logTags = [...new Set(DebugLogger.logs.map(l => l.tag))];
  
  panel.innerHTML = `
    <div class="panel-header">
      <span style="font-weight:600;">调试面板</span>
      <button class="hamburger-btn" onclick="closePanel()">[×]</button>
    </div>
    <div class="panel-content">
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;">
        <span style="font-size:12px;color:var(--text-weak);">筛选:</span>
        <select id="debugLevelFilter" onchange="renderDebugLogs()">
          ${logLevels.map(l => `<option value="${l}">${l}</option>`).join('')}
        </select>
        <select id="debugTagFilter" onchange="renderDebugLogs()">
          <option value="all">全部标签</option>
          ${logTags.map(t => `<option value="${t}">${t}</option>`).join('')}
        </select>
        <span style="font-size:11px;color:var(--text-weak);margin-left:auto;">
          总计:${DebugLogger.logs.length} | 错误:${DebugLogger.errorCount} | 警告:${DebugLogger.warnCount}
        </span>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <button class="btn small" onclick="exportDebugLogs()">导出日志</button>
        <button class="btn small danger" onclick="clearDebugLogs()">清空日志</button>
      </div>
      <div id="debugLogContainer" style="max-height:60vh;overflow-y:auto;font-family:var(--font-mono);"></div>
    </div>`;
  
  panel.classList.add('open');
  renderDebugLogs();
}

function renderDebugLogs() {
  const container = document.getElementById('debugLogContainer');
  if (!container) return;
  
  const levelFilter = document.getElementById('debugLevelFilter')?.value || 'all';
  const tagFilter = document.getElementById('debugTagFilter')?.value || 'all';
  
  let filtered = DebugLogger.logs;
  if (levelFilter !== 'all') filtered = filtered.filter(l => l.level === levelFilter);
  if (tagFilter !== 'all') filtered = filtered.filter(l => l.tag === tagFilter);
  
  container.innerHTML = filtered.slice(-200).reverse().map(l => {
    const time = new Date(l.time).toLocaleTimeString('zh-CN', {hour12: false});
    const dataStr = l.data ? ' ' + JSON.stringify(l.data).substring(0, 200) : '';
    return `<div class="debug-log-entry ${l.level}">
      <span style="color:var(--text-weak);">${time}</span>
      <span style="color:${l.level==='error'?'var(--accent-red)':l.level==='warn'?'var(--accent-gold)':'var(--accent-blue)'};">[${l.level.toUpperCase()}]</span>
      <span style="color:var(--accent-green);">[${l.tag}]</span>
      ${escapeHTML(l.message)}${escapeHTML(dataStr)}
    </div>`;
  }).join('');
}

function exportDebugLogs() {
  const exportData = {
    exportedAt: new Date().toISOString(),
    summary: {
      total: DebugLogger.logs.length,
      errors: DebugLogger.errorCount,
      warnings: DebugLogger.warnCount
    },
    logs: DebugLogger.logs
  };
  
  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `debug_logs_${new Date().toISOString().slice(0,10)}.json`;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 60000);
}

function clearDebugLogs() {
  if (!confirm('确认清空所有调试日志?')) return;
  DebugLogger.logs = [];
  DebugLogger.errorCount = 0;
  DebugLogger.warnCount = 0;
  DebugLogger._updateBadge();
  renderDebugLogs();
}

// ===== 批量API连通性测试 =====
const APITester = {
  results: {},
  isRunning: false,
  abortControllers: [],
  
  async runAll(agents) {
    this.isRunning = true;
    this.results = {};
    this.abortControllers = [];
    
    const testableAgents = agents.filter(a => a.apiKey && a.apiKey.trim());
    if (testableAgents.length === 0) {
      this.isRunning = false;
      return;
    }
    
    const total = testableAgents.length;
    let completed = 0;
    
    renderFriendList();
    
    const updateProgress = () => {
      const fill = document.getElementById('testProgressFill');
      const text = document.getElementById('testProgressText');
      if (fill) fill.style.width = ((completed / total) * 100) + '%';
      if (text) text.textContent = `测试中: ${completed}/${total}`;
    };
    
    const testOne = async (agent) => {
      const controller = new AbortController();
      this.abortControllers.push(controller);
      const timeoutId = setTimeout(() => controller.abort(), 15000);
      
      const startTime = performance.now();
      
      try {
        const response = await fetch(`${agent.baseURL}/v1/chat/completions`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${agent.apiKey}`
          },
          body: JSON.stringify({
            model: agent.model,
            messages: [{ role: 'user', content: 'ping' }],
            max_tokens: 5,
            stream: false
          }),
          signal: controller.signal
        });
        
        clearTimeout(timeoutId);
        const latency = Math.round(performance.now() - startTime);
        
        // 【Bug2修复】先解析响应体。即使HTTP 200，body中也可能含错误
        let respBody = null;
        let respText = '';
        try {
          respText = await response.text();
          respBody = JSON.parse(respText);
        } catch (e) {
          respBody = null;
          respText = respText || '';
        }
        
        if (response.ok && respBody && !respBody.error) {
          // 验证响应体确实包含合法内容（choices数组）
          const hasValidContent = respBody.choices &&
            Array.isArray(respBody.choices) &&
            respBody.choices.length > 0;
          
          if (hasValidContent) {
            this.results[agent.id] = { status: 'ok', latency };
          } else {
            this.results[agent.id] = {
              status: 'unexpected',
              latency,
              error: `响应不含有效内容: ${respText.substring(0, 80)}`
            };
            DebugLogger.warn('apitest', `${agent.name}: 200但响应体异常`);
          }
        } else if (response.ok && respBody && respBody.error) {
          // HTTP 200但body中有error字段（某些API的行为）
          const errMsg = typeof respBody.error === 'string'
            ? respBody.error
            : (respBody.error.message || JSON.stringify(respBody.error));
          this.results[agent.id] = {
            status: 'unexpected',
            latency,
            error: `API返回错误: ${errMsg.substring(0, 100)}`
          };
          DebugLogger.warn('apitest', `${agent.name}: 200但body含错误`);
        } else if (response.status === 401 || response.status === 403) {
          this.results[agent.id] = { status: 'auth_error', latency, error: `HTTP ${response.status}` };
          DebugLogger.warn('apitest', `${agent.name}: 认证失败 (${response.status})`);
        } else if (response.status === 404) {
          this.results[agent.id] = { status: 'model_not_found', latency, error: '模型或端点未找到' };
          DebugLogger.warn('apitest', `${agent.name}: 模型未找到`);
        } else if (response.status === 429) {
          const retryAfter = respBody?.retry_after || '未知';
          this.results[agent.id] = { status: 'rate_limited', latency, error: `频率限制(重试:${retryAfter})` };
          DebugLogger.warn('apitest', `${agent.name}: 429限流`);
        } else if (response.status === 400) {
          const errMsg = respBody?.error?.message || respText.substring(0, 100) || `HTTP 400`;
          this.results[agent.id] = { status: 'bad_request', latency, error: errMsg };
          DebugLogger.warn('apitest', `${agent.name}: 400请求错误`);
        } else {
          this.results[agent.id] = {
            status: 'unexpected',
            latency,
            error: `HTTP ${response.status}: ${respText.substring(0, 100)}`
          };
          DebugLogger.warn('apitest', `${agent.name}: 异常响应 ${response.status}`);
        }
      } catch (error) {
        clearTimeout(timeoutId);
        const latency = Math.round(performance.now() - startTime);
        
        if (error.name === 'AbortError') {
          this.results[agent.id] = { status: 'timeout', latency, error: '超时(15s)' };
          DebugLogger.warn('apitest', `${agent.name}: 超时`);
        } else {
          this.results[agent.id] = { status: 'network_error', latency, error: error.message.substring(0, 100) };
          DebugLogger.warn('apitest', `${agent.name}: 网络错误 - ${error.message}`);
        }
      }
      
      completed++;
      updateProgress();
      renderFriendList();
    };
    
    // 顺序测试避免429
    for (const agent of testableAgents) {
      if (!this.isRunning) break;
      await testOne(agent);
    }
    
    this.isRunning = false;
    DebugLogger.info('apitest', `批量测试完成: ${completed}/${total}`);
    renderFriendList();
  },
  
  cancel() {
    this.isRunning = false;
    for (const ctrl of this.abortControllers) {
      ctrl.abort();
    }
    this.abortControllers = [];
    DebugLogger.info('apitest', '批量测试已取消');
    renderFriendList();
  }
};

function startBatchAPITest() {
  const agents = getAllAgentFriends();
  APITester.runAll(agents);
}

function cancelBatchTest() {
  APITester.cancel();
}
</script>
