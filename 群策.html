⑤ 创建新文件：
{"createFile":"新文件名.txt","content":"文件内容"}
只能创建纯文本文件。同名文件会被覆盖（自动备份旧版本）。不能用此命令删除文件。

规则：
- 每条命令独占一行，同一轮可发多条
- 读改创结果都在下一轮注入，其他Agent不可见
- 读写循环直到满意，最后一次不再发JSON即为最终回复
- 修改文件前必须先读取确认当前内容
- 屏蔽文件: readFile返回"已被屏蔽"错误，writeFile/createFile对屏蔽文件无效
`);
  }

  // ═══════════════════════════════════════════════════════════
  // 【身份锚点·第二道锁】prompt末尾再次确认 — 对抗"近因效应"。
  // 模型更容易记住prompt末尾内容，做最后兜底。
  // 同样根据群内真实成员动态生成"你不是谁"列表。
  // ═══════════════════════════════════════════════════════════
  parts.push(`═════════════════════════════════════
[IDENTITY REAFFIRMED · 身份重申]
  再次确认：
  你是【${myName}】（ID: ${agent.id}）。
  本群群主: ${hostName}${isHost ? ' ← 就是你' : ''}
  群内其他成员: ${otherNamesStr}
  以上名字属于别人——你不是他们中的任何一个。
  你只以【${myName}】的身份完成本职工作。
═════════════════════════════════════`);
  
  return parts.join('\n\n---\n\n');
}

// ===== JSON命令块协议 =====
function parseAgentResponse(rawText) {
  let thinkingContent = null;
  let mainContent = rawText;

  // 【强化】先剥离所有可能的包装格式，拿到"纯净"文本用于JSON提取：
  //   1) Markdown代码块 ```...``` → 提取内部内容而非丢弃（Agent常在```json```内输出命令）
  //   2) DeepSeek/Claude思考标签 <thinking>...</thinking> 或 ...
  const strippedForJson = mainContent
    .replace(/```[\s\S]*?```/g, (match) => {
      // 去掉开头的 ```json 或 ``` 和结尾的 ```
      const inner = match.replace(/^```[a-z]*\s*/i, '').replace(/\s*```$/i, '');
      return ' ' + inner + ' ';
    })
    .replace(/<\s*thinking\s*>[\s\S]*?<\/\s*thinking\s*>/gi, ' ')
    .replace(/<\s*think\s*>[\s\S]*?<\/\s*think\s*>/gi, ' ');

  let commandBlock = null;
  let cleanContent = mainContent;
  let searchCommands = [];
  let jsonMatchText = null;

  // 【彻底重写JSON提取】不再依赖正则匹配JSON边界。
  // 改为从后往前扫描所有 { } 配对，逐个尝试JSON.parse，取第一个含"command"字段的成功结果。
  // 这彻底规避了：嵌套花括号、content内含}、多行JSON、空格/引号边界 等正则无法覆盖的角落。
  const braces = [];           // 栈：记录 { 在 strippedForJson 中的位置
  const candidates = [];      // 收集所有 { ... } 候选片段

  for (let i = 0; i < strippedForJson.length; i++) {
    const ch = strippedForJson[i];
    if (ch === '{') {
      // 在字符串内部的花括号不计数（简化处理：JSON字符串内的花括号不常见）
      braces.push(i);
    } else if (ch === '}') {
      if (braces.length > 0) {
        const start = braces.pop();
        if (braces.length === 0) {
          // 找到一个顶层闭合的 { ... } 片段
          candidates.push(strippedForJson.substring(start, i + 1));
        }
      }
    }
  }

  // 从后往前尝试，因为JSON命令块通常出现在响应末尾
  for (let idx = candidates.length - 1; idx >= 0; idx--) {
    const candidate = candidates[idx].trim();
    // 必须包含 "command" 关键字
    if (candidate.indexOf('"command"') === -1 && candidate.indexOf('"command') === -1) continue;

    // 尝试1：直接JSON.parse
    try {
      const parsed = JSON.parse(candidate);
      if (parsed.command) {
        commandBlock = parsed;
        jsonMatchText = candidate;
        break;
      }
    } catch(e) {
      // 尝试2：修复 content 字段内的裸换行
      try {
        const fixed = candidate.replace(
          /(?<="content"\s*:\s*")[^"]*?(?=")/g,
          (m) => m.replace(/\n/g, '\\n').replace(/\r/g, '')
        );
        const parsed = JSON.parse(fixed);
        if (parsed.command) {
          commandBlock = parsed;
          jsonMatchText = candidate;
          break;
        }
      } catch(e2) {
        // 尝试3：修复target字段（与content同理）
        try {
          const fixed2 = candidate.replace(
            /(?<="target"\s*:\s*")[^"]*?(?=")/g,
            (m) => m.replace(/\n/g, '\\n').replace(/\r/g, '')
          );
          const parsed = JSON.parse(fixed2);
          if (parsed.command) {
            commandBlock = parsed;
            jsonMatchText = candidate;
            break;
          }
        } catch(e3) {
          // 尝试4：同时修复content和target
          try {
            let fixed3 = candidate;
            fixed3 = fixed3.replace(
              /(?<="content"\s*:\s*")[^"]*?(?=")/g,
              (m) => m.replace(/\n/g, '\\n').replace(/\r/g, '')
            );
            fixed3 = fixed3.replace(
              /(?<="target"\s*:\s*")[^"]*?(?=")/g,
              (m) => m.replace(/\n/g, '\\n').replace(/\r/g, '')
            );
            const parsed = JSON.parse(fixed3);
            if (parsed.command) {
              commandBlock = parsed;
              jsonMatchText = candidate;
              break;
            }
          } catch(e4) {
            // 此候选无效，继续下一个
          }
        }
      }
    }
  }

  // ===== 搜索命令提取 =====
  // 格式: {"search":"查询内容","searchDepth":"advanced|basic","maxResults":5}
  for (let idx = candidates.length - 1; idx >= 0; idx--) {
    const candidate = candidates[idx].trim();
    if (candidate.indexOf('"search"') === -1 && candidate.indexOf('"search') === -1) continue;

    try {
      const parsed = JSON.parse(candidate);
      if (parsed.search && typeof parsed.search === 'string' && parsed.search.trim()) {
        searchCommands.push({
          query: parsed.search.trim(),
          searchDepth: parsed.searchDepth || 'advanced',
          maxResults: parsed.maxResults || 5,
          _raw: candidate     // ← 记下原始文本用于精确移除
        });
      }
    } catch(e) {
      try {
        const fixed = candidate.replace(
          /(?<="search"\s*:\s*")[^"]*?(?=")/g,
          (m) => m.replace(/\n/g, '\\n').replace(/\r/g, '')
        );
        const parsed = JSON.parse(fixed);
        if (parsed.search && typeof parsed.search === 'string' && parsed.search.trim()) {
          searchCommands.push({
            query: parsed.search.trim(),
            searchDepth: parsed.searchDepth || 'advanced',
            maxResults: parsed.maxResults || 5,
            _raw: candidate
          });
        }
      } catch(e2) {}
    }
  }
  // 用原始候选文本精确移除搜索JSON块
  for (const sc of searchCommands) {
    if (sc._raw) {
      cleanContent = cleanContent.replace(sc._raw, '').trim();
      cleanContent = cleanContent.split('\n').filter(l => l.trim() !== sc._raw.trim()).join('\n');
    }
  }
  cleanContent = cleanContent.replace(/\n{3,}/g, '\n\n');

  // [v5] 文件命令提取 (读/写/创建)
  let readFileCommands = [];
  for (let idx = candidates.length - 1; idx >= 0; idx--) {
    const candidate = candidates[idx].trim();
    try {
      const parsed = JSON.parse(candidate);
      if (parsed.readFile && typeof parsed.readFile === 'string') {
        readFileCommands.push({ action: 'readFile', filename: parsed.readFile.trim(), lineFrom: parsed.lineFrom || null, lineTo: parsed.lineTo || null, _raw: candidate });
      }
      if (parsed.writeFile && typeof parsed.writeFile === 'string' && typeof parsed.content === 'string') {
        readFileCommands.push({ action: 'writeFile', filename: parsed.writeFile.trim(), lineFrom: parsed.lineFrom || 1, lineTo: parsed.lineTo || 1, content: parsed.content, _raw: candidate });
      }
      if (parsed.createFile && typeof parsed.createFile === 'string' && typeof parsed.content === 'string') {
        readFileCommands.push({ action: 'createFile', filename: parsed.createFile.trim(), content: parsed.content, _raw: candidate });
      }
      if (parsed.listFiles === true) {
        readFileCommands.push({ action: 'listFiles', _raw: candidate });
      }
    } catch(e) {
      try {
        const fixed = candidate.replace(/\n/g, '\\n');
        const parsed = JSON.parse(fixed);
        if (parsed.readFile && typeof parsed.readFile === 'string') {
          readFileCommands.push({ action: 'readFile', filename: parsed.readFile.trim(), lineFrom: parsed.lineFrom || null, lineTo: parsed.lineTo || null, _raw: candidate });
        }
        if (parsed.writeFile && typeof parsed.writeFile === 'string' && typeof parsed.content === 'string') {
          readFileCommands.push({ action: 'writeFile', filename: parsed.writeFile.trim(), lineFrom: parsed.lineFrom || 1, lineTo: parsed.lineTo || 1, content: parsed.content, _raw: candidate });
        }
        if (parsed.createFile && typeof parsed.createFile === 'string' && typeof parsed.content === 'string') {
          readFileCommands.push({ action: 'createFile', filename: parsed.createFile.trim(), content: parsed.content, _raw: candidate });
        }
        if (parsed.listFiles === true) {
          readFileCommands.push({ action: 'listFiles', _raw: candidate });
        }
      } catch(e2) {}
    }
  }
  // 用原始候选文本精确移除文件命令JSON块
  for (const rfc of readFileCommands) {
    if (rfc._raw) {
      cleanContent = cleanContent.replace(rfc._raw, '').trim();
      cleanContent = cleanContent.split('\n').filter(l => l.trim() !== rfc._raw.trim()).join('\n');
    }
  }

  if (jsonMatchText) {
    // 从原始 mainContent 中移除JSON块（用原始文本确保精确匹配）
    cleanContent = mainContent.replace(jsonMatchText, '').trim();
    // 同时尝试去除可能的转义版本
    if (cleanContent === mainContent) {
      // 备用：如果在mainContent中没找到（可能mainContent与strippedForJson不同），
      // 尝试用 strippedForJson 中的候选项来移除
      cleanContent = strippedForJson.replace(jsonMatchText, '').trim();
    }
    cleanContent = cleanContent.replace(/\n{3,}/g, '\n\n');
  }

  // 【Bug1修复】提取引用标记 [引用:消息ID] 或 [引用:msg:短ID]
  let quotedMessageId = null;
  const quoteRegex = /\[引用:(?:msg:)?([^\]]+)\]/;
  const quoteMatch = cleanContent.match(quoteRegex);
  if (quoteMatch) {
    quotedMessageId = quoteMatch[1].trim();
    // 从cleanContent中移除引用标记（含后续可选空格），避免被其他Agent看到
    cleanContent = cleanContent.replace(/\[引用:(?:msg:)?[^\]]+\]\s*/g, '').trim();
  }

  // 【v3修复】剥离可能残留在content字段中的thinking标签（某些API/模型配置下会发生），并统一trim
  cleanContent = cleanContent
    .replace(/<\s*thinking\s*>[\s\S]*?<\/\s*thinking\s*>/gi, '')
    .replace(/<\s*think\s*>[\s\S]*?<\/\s*think\s*>/gi, '')
    .trim();

  // 当Agent仅输出JSON命令无纯文本时，cleanContent为空
  const finalCleanContent = cleanContent || (commandBlock ? `[已执行命令: ${commandBlock.command}]` : '');
  return {
    cleanContent: finalCleanContent,
    thinkingContent,
    commandBlock,
    searchCommands,
    readFileCommands,
    quotedMessageId,
    displayContent: mainContent
  };

}


// 【Bug1修复】消息ID查找：支持精确匹配 + 前缀匹配（短ID）
function findMessageById(messages, idOrPrefix) {
  // 精确匹配
  let found = messages.find(m => m.id === idOrPrefix);
  if (found) return found;
  // 前缀匹配（支持 msg:短ID 格式）
  found = messages.find(m => m.id.startsWith(idOrPrefix));
  return found || null;
}

// ===== 提议与表决状态机 =====
const ProposalStateMachine = {

  proposals: new Map(),
  
  create(proposalId, content, proposerId, groupId) {
    const proposal = {
      id: proposalId,
      content,
      proposerId,
      groupId,
      status: 'open',
      votes: {},
      createdAt: Date.now(),
      timeoutMinutes: 5
    };
    // 【Bug2修复】提议者自动投同意票
    proposal.votes[proposerId] = { 
      vote: 'agree', 
      reason: '提议者自动同意', 
      timestamp: Date.now() 
    };
    this.proposals.set(proposalId, proposal);
    this._scheduleTimeout(proposalId, groupId);
    return proposal;
  },
  
  castVote(proposalId, voterId, vote, reason) {
    const p = this.proposals.get(proposalId);
    if (!p || p.status !== 'open') return null;
    p.votes[voterId] = { vote, reason, timestamp: Date.now() };
    this._checkResolution(proposalId);
    return p;
  },
  
  // 【Bug1修复】获取指定群中所有状态为open的提议
  getOpenProposalsForGroup(groupId) {
    const result = [];
    for (const [id, p] of this.proposals) {
      if (p.groupId === groupId && p.status === 'open') {
        result.push({ id, content: p.content, proposerId: p.proposerId, votes: p.votes });
      }
    }
    return result;
  },
  
  // 【Bug1修复】为用户投票提供便捷方法：自动查找当前群唯一活跃提议并投票
  voteOnCurrentProposal(groupId, vote, reason) {
    const openProposals = this.getOpenProposalsForGroup(groupId);
    if (openProposals.length === 0) {
      addSystemMessage(groupId, `[系统] 当前没有进行中的提议可以表决`);
      return null;
    }
    if (openProposals.length > 1) {
      const proposalList = openProposals.map(p => 
        `  - ID: ${p.id.substring(0, 8)}... 内容: ${(p.content || '').substring(0, 40)}`
      ).join('\n');
      addSystemMessage(groupId, `[系统] 当前有多个进行中的提议，请指定proposalId：\n${proposalList}`);
      return null;
    }
    const target = openProposals[0];
    return this.castVote(target.id, '__user__', vote, reason);
  },
  
  _checkResolution(proposalId) {
    const p = this.proposals.get(proposalId);
    if (!p) return;
    if (p.status !== 'open') return;
    
    const group = getGroup(p.groupId);
    if (!group) return;
    
    // 【修复】允许群主参与投票，只排除禁言成员
    const totalVoters = group.members.filter(m => 
      !m.isMuted
    ).length;
    
    if (totalVoters === 0) return;
    
    const votes = Object.values(p.votes);
    const agrees = votes.filter(v => v.vote === 'agree').length;
    const disagrees = votes.filter(v => v.vote === 'disagree').length;
    
    // 【修复】降低决议门槛：需超过1/3而非1/2参与，只要有≥1票且同意>反对即可通过
    // 对于2人场景（群主+1成员），1票即可决议
    const quorum = Math.max(1, Math.ceil(totalVoters * 0.33));
    if (agrees + disagrees >= quorum) {
      if (agrees > disagrees) {
        p.status = 'passed';
        addSystemMessage(p.groupId, `[决议通过] 提议 "${p.content}" 已获多数同意 (${agrees}同意/${disagrees}反对，共${totalVoters}人有表决权)`);
      } else if (disagrees > agrees) {
        p.status = 'rejected';
        addSystemMessage(p.groupId, `[决议否决] 提议 "${p.content}" 已被多数反对 (${agrees}同意/${disagrees}反对，共${totalVoters}人有表决权)`);
      } else {
        // 【Bug2修复】平票时群主（host）拥有决胜票
        const hostMember = group.members.find(m => m.role === 'host');
        if (hostMember && p.votes[hostMember.agentId]) {
          const hostVote = p.votes[hostMember.agentId].vote;
          if (hostVote === 'agree') {
            p.status = 'passed';
            addSystemMessage(p.groupId, `[决议通过·群主决胜] 提议 "${p.content}" 平票(${agrees}:${disagrees})，群主投同意，决议通过`);
          } else if (hostVote === 'disagree') {
            p.status = 'rejected';
            addSystemMessage(p.groupId, `[决议否决·群主决胜] 提议 "${p.content}" 平票(${agrees}:${disagrees})，群主投反对，决议否决`);
          }
          // 群主未投票则维持open状态
        } else if (agrees + disagrees >= totalVoters) {
          // 所有人都投了票但平票，且群主未投票时：默认通过（避免死锁）
          p.status = 'passed';
          addSystemMessage(p.groupId, `[决议通过·默认] 提议 "${p.content}" 全员表决平票(${agrees}:${disagrees})，群主未投票，默认通过`);
        }
        // 否则维持open等待更多投票
      }
    }
  },
  
  _scheduleTimeout(proposalId, groupId) {
    setTimeout(() => {
      const p = this.proposals.get(proposalId);
      if (p && p.status === 'open') {
        p.status = 'timeout';
        if (activeGroupId === groupId) {
          addSystemMessage(groupId, `[提议超时] 提议 "${p.content}" 在5分钟内未完成表决，已自动关闭`);
          renderChatMessages();
        } else {
          addSystemMessage(groupId, `[提议超时] 提议 "${p.content}" 在5分钟内未完成表决，已自动关闭`);
        }
      }
    }, 5 * 60 * 1000);
  }
};

// ===== 上下文拼接 =====
function buildAgentContext(group, agentId, messages) {
  const member = group.members.find(m => m.agentId === agentId);
  if (!member) return { systemPrompt: '', messages: [] };
  
  const agent = getAgentFriend(agentId);
  if (!agent) return { systemPrompt: '', messages: [] };
  
  const systemPrompt = assembleSystemPrompt(agent, member, group, false);
  
  const contextMessages = [];
  
  if (group.summaries.length > 0) {
    const latestSummary = group.summaries[group.summaries.length - 1];
    contextMessages.push({
      role: 'system',
      content: `[历史摘要 - 第${latestSummary.roundRange[0]}~${latestSummary.roundRange[1]}轮]\n${latestSummary.summary}\n\n[以下为最近讨论]`
    });
  }
  
  // 【新增】注入当前群成员列表（含ID），让每个Agent都知道本群有谁及其精确ID
  // 【隐藏哨兵过滤】系统哨兵（如偏离检测）不对普通Agent暴露
  const memberListText = group.members
    .filter(m => !HIDDEN_AGENT_IDS.has(m.agentId))
    .map(m => {
      const memberAgent = getAgentFriend(m.agentId);
      const name = memberAgent ? memberAgent.name : '未知';
      const agentIdShort = m.agentId ? m.agentId.substring(0, 12) + '...' : '?';
      const roleLabel = m.role === 'host' ? '[群主]' 
        : m.role === 'admin' ? '[管理员]' 
        : '[成员]';
      const mutedLabel = m.isMuted ? ' [禁言中]' : '';
      return `${roleLabel} ${name} (ID: ${m.agentId})${mutedLabel}`;
    }).join('\n');
  contextMessages.push({
    role: 'system',
    content: `[当前群成员列表 — 管理命令必须使用精确ID]\n${memberListText}\n[提示: 使用 @名称 提及特定成员; 群主/管理员使用mute/unmute/remove时必须用上方列表中的精确ID作为target参数; 群主使用invite前必须先listFriends获取可邀请好友ID]`
  });
  
  // 【Bug2修复】明确告知Agent自己的身份与权限边界，防止成员/管理员越权以为自己是群主
  const myRoleLabel = member.role === 'host' ? '群主'
    : member.role === 'admin' ? '管理员'
    : '成员';
  let roleBoundaryText = '';
  if (member.role === 'host') {
    roleBoundaryText = '你是本群的最高管理者。你可以禁言、解除禁言、拉人、删人、发起提议。群主的提案在平票时拥有决胜权。所有管理命令的target必须使用精确的agent ID。';
  } else if (member.role === 'admin') {
    roleBoundaryText = '你是群主的辅助执行者，不是群主。你可以禁言、解除禁言、发起提议、投票表决。但你不能拉人、不能删人、不能解散群。对群主已做的决定，你只能执行不能推翻。所有管理命令的target必须使用精确的agent ID。';
  } else {
    roleBoundaryText = '你是本群的普通成员，不是群主也不是管理员。你没有管理权限（不能禁言、不能拉人、不能删人）。你可以参与讨论、被@时回应、发起提议、投票表决。请专注你的专业领域发言，不要试图执行管理命令。';
  }
  // 【身份锚点·第三道锁】动态生成 — 运行时最后一次身份告知，
  // 列出群内所有其他成员名字，明确禁止Agent自称别人名字。
  const ctxOtherNames = group.members
    .filter(m => m.agentId !== agent.id && !HIDDEN_AGENT_IDS.has(m.agentId))
    .map(m => {
      const a = getAgentFriend(m.agentId);
      return a ? a.name : '未知';
    });
  const ctxOtherNamesStr = ctxOtherNames.length > 0
    ? ctxOtherNames.join('、')
    : '无';
  
  // [v3] 如果当前Agent是偏离检测哨兵，注入群话题基准
  if (agent.id === 'builtin-watchdog-drift') {
    const groupTopic = group.topic || '';
    if (groupTopic) {
      contextMessages.push({
        role: 'system',
        content: `[偏离检测基准] 本群讨论话题：「${groupTopic}」。请以上述话题为偏离判断基准。偏离=持续讨论与该话题不相关的内容且未拉回。`
      });
    } else {
      contextMessages.push({
        role: 'system',
        content: `[偏离检测基准] 本群未设定讨论话题。请以用户（senderType: 'user'）的消息内容和意图为偏离判断基准。偏离=持续讨论与用户初始意图不相关的内容且未拉回。`
      });
    }
    // 注入群主身份信息，确保Watcher知道该@谁
    const hostMember = group.members.find(m => m.role === 'host');
    const hostAgent = hostMember ? getAgentFriend(hostMember.agentId) : null;
    contextMessages.push({
      role: 'system',
      content: `[@目标] 本群群主是「${hostAgent?.name || '未知'}」（ID: ${hostMember?.agentId || '?'}）。你只能@群主，不能@任何其他人。`
    });
  }

  contextMessages.push({
    role: 'system',
    content: `[身份确认·第三道锁] ⚠️ 你是【${agent.name}】（ID: ${agent.id}），担任本群【${myRoleLabel}】。${roleBoundaryText}\\n\\n🚫 禁止身份混淆：群内除你外还有——${ctxOtherNamesStr}。这些名字属于别人，与你无关。不要在回复中自称或扮演别人的名字。你只是【${agent.name}】。\\n\\n在下方消息流中：\\n- 你之前的发言会以系统标注 \\"[历史: 你在HH:MM:SS的发言]\\" 的形式呈现。这是系统给你看的备忘，不要模仿此格式。\\n- 别人的消息以 \\"[别人名字](HH:MM:SS):\\" 开头，让你知道是谁在什么时间说的。\\n- 【输出格式铁律】你的输出必须是纯文本消息内容。绝对不要在输出开头添加 \\"[名字](时间):\\"、\\"[名字→某人](时间):\\" 或任何类似前缀——系统会自动替你添加这些格式标记。你只管输出你想说的文本本身。\\n\\n【防复读铁律】绝对不要复读自己已说过的内容！每次发言必须带来新信息或新角度。如果你发现自己即将重复之前的内容，改为简短引用（1句话）并补充新观点，或直接保持沉默。复读会导致你被禁言。绝对不要照抄其他Agent的发言。\\n\\n【迭代讨论铁律】这是一个多轮迭代讨论，不是你一句我一句就结束的回合制问答！群主分配任务后，你应该：①先给出自己的专业意见；②如果不同意其他成员的观点，用 @名称 点名反驳并说明理由；③如果你希望某个特定成员回应你的疑问，用 @名称 明确点名；④讨论应该持续多轮交锋直到形成共识，最后由群主总结。不要在一条消息里试图说完所有话——留一些给后续回合！`
  });


  
  // 【修复】注入当前开放提案，让每个Agent都知道有提案需要表决
  const openProposals = [];
  ProposalStateMachine.proposals.forEach((p, id) => {
    if (p.status === 'open' && p.groupId === group.id) {
      const proposerAgent = getAgentFriend(p.proposerId);
      const votes = Object.values(p.votes || {});
      const agrees = votes.filter(v => v.vote === 'agree').length;
      const disagrees = votes.filter(v => v.vote === 'disagree').length;
      openProposals.push(
        `  • 提案ID: ${id.substring(0, 8)} | 内容: ${p.content} | 提议人: ${proposerAgent?.name || '未知'} | 已表决: ${agrees}同意/${disagrees}反对`
      );
    }
  });
  if (openProposals.length > 0) {
    contextMessages.push({
      role: 'system',
      content: `[待表决提案 - 请使用vote命令表决]\n${openProposals.join('\n')}\n表决命令格式: {"command":"vote","proposalId":"<提案ID完整UUID>","vote":"agree或disagree","reason":"理由"}`
    });
  }
  
  const startRound = group.summaries.length > 0 
    ? group.summaries[group.summaries.length - 1].roundRange[1] + 1 
    : 0;

  const recentMessages = messages.filter(m => m.roundIndex >= startRound);

  // 【Bug1@过期修复】在循环前扫描：找到最后一条@了该Agent的消息索引，以及该Agent最后发言的索引
  // 只有"最后一条@消息的索引 > 该Agent最后发言的索引"时，@才是活跃的
  let lastMentionIndex = -1;
  let lastOwnMessageIndex = -1;
  for (let i = 0; i < recentMessages.length; i++) {
    const m = recentMessages[i];
    if (m.senderType !== 'system') {
      if (m.senderId === agentId) {
        lastOwnMessageIndex = i;
      }
      if (m.mentions && m.mentions.includes(agentId)) {
        lastMentionIndex = i;
      }
    }
  }
  const hasActiveMention = lastMentionIndex > lastOwnMessageIndex;

  // 所有系统反馈消息必须注入上下文——确保任何Agent发出命令后都能看到执行结果
  // 包括命令执行成功/失败的所有反馈类型
  const COMMAND_FEEDBACK_PREFIXES = [
    '[好友列表]',
    '[加入]',
    '[移出]',
    '[禁言]',
    '[解除禁言]',
    '[系统]',
    '[防退化]',
    '[提议]',
    '[表决]',
    '[决议通过]',
    '[决议否决]',
    '[提议超时]',
    '[错误]',
    '[命令失败]',
    '[命令格式提醒]'
  ];

  for (let msgIdx = 0; msgIdx < recentMessages.length; msgIdx++) {
    const msg = recentMessages[msgIdx];
    if (msg.senderType === 'system') {
      // 命令反馈类的system消息需要注入到Agent上下文中
      const isCommandFeedback = COMMAND_FEEDBACK_PREFIXES.some(
        prefix => msg.content && msg.content.startsWith(prefix)
      );
      if (!isCommandFeedback) continue;
      // 命令反馈消息作为system角色注入
      contextMessages.push({
        role: 'system',
        content: `[系统通知 - 请关注此反馈] ${msg.content}`
      });
      continue;
    }

    const isMentioned = msg.mentions && msg.mentions.includes(agentId);
    const isOwnMessage = msg.senderId === agentId;

    // 【Bug4修复】为每条消息附上时间戳，帮助Agent判断消息时效
    const msgTimeStr = msg.timestamp 
      ? new Date(msg.timestamp).toLocaleTimeString('zh-CN', {hour12: false})
      : '未知时间';

    // 【重复注入修复】去掉 [用户消息] 前缀。所有消息统一使用
    // [发送者名称](时间戳): 内容 的格式。用户历史消息和Agent消息
    // 通过 role (user/assistant) 区分，LLM通过时间戳判断时效。
    let prefix = '';
    if (msg.quotedMessageId) {
      const quoted = findMessageById(messages, msg.quotedMessageId);
      if (quoted) {
        const quotedTimeStr = quoted.timestamp
          ? new Date(quoted.timestamp).toLocaleTimeString('zh-CN', {hour12: false})
          : '未知时间';
        prefix += `[引用 msg:${msg.quotedMessageId.substring(0, 8)} ← ${quoted.senderName}(${quotedTimeStr}): "${(quoted.cleanContent || quoted.content || '').substring(0, 80)}"] `;
      }
    }

    // 【Bug2修复】对于非@目标的Agent，剥离消息中的@名称原文，防止LLM看到@文本后抢答
    let displayContent = msg.cleanContent || msg.content;

    // [v5] 搜索内容隔离：仅消息发送者本人能看到搜索结果
    if (isOwnMessage && msg.searchResult && msg.searchResult.length > 0) {
      // 该Agent自己的搜索 → 注入搜索结果作为system消息（在下文循环中会自然加入contextMessages）
      // 先标记，在displayContent后面不追加（搜索结果单独作为system消息注入）
    }
    // 非本人 → 看不到搜索结果，只看到cleanContent（displayContent不变）
    if (!isMentioned && !isOwnMessage) {
      // 移除@提及文本，替换为[提及别人]
      displayContent = displayContent.replace(/@[^\s,，。！？、；：""''\]\)】》\n!?,.;:'"\)\]]+/g, '[提及他人]');
    }

    // 【Bug1彻底修复】@标记不再作为独立system消息插入（会被LLM复读），
    // 改为发送者名称后追加"→你"标记。这是LLM不会自然照抄的格式，
    // 且协议中用逻辑描述了标记含义但不泄露其精确原文。
    // 仅在"该消息@了此Agent且@仍活跃（未过期）"时生效。
    const mentionMarker = (isMentioned && hasActiveMention && msgIdx === lastMentionIndex) ? '→你' : '';

    // 【唯一路径修复】所有消息统一通过 context 注入，不再有独立的
    // latestUserMsg 路径。
    //
    // 【防复读核心修复】Agent自己的历史消息使用 system 角色 + 明确标注格式，
    // 杜绝Agent把 "[名字](时间):" 当成输出模板来模仿。
    // 他人的消息保留 "[名字](时间):" 格式——Agent需要知道谁在什么时间说了什么，
    // 但绝不应在自己的输出中重现此格式。
    // 【Bug1修复】每条消息暴露短ID (msg:xxxxxxxx)，让Agent有精确的引用目标
    const msgShortId = msg.id ? msg.id.substring(0, 8) : 'unknown';
    if (isOwnMessage) {
      contextMessages.push({
        role: 'system',
        content: `[你之前说的 — ${msgTimeStr} — msg:${msgShortId}] ${displayContent}`
      });
      // [v5] 搜索结果注入：仅对该Agent本人可见
      if (msg.searchResult && msg.searchResult.length > 0) {
        contextMessages.push({
          role: 'system',
          content: `[你的搜索结果 — 仅你可见] 以下是你在本轮中执行的搜索返回的结果：\n${msg.searchResult.map((sr, si) =>
            `--- 搜索 #${si+1}: ${sr.query} ---\n${(sr.results || []).map((r, ri) =>
              `[${ri+1}] ${r.title || ''}\n    URL: ${r.url || ''}\n    ${(r.content || r.snippet || '').substring(0, 300)}`
            ).join('\n')}\n${sr.answer ? 'AI摘要: ' + sr.answer.substring(0, 500) : ''}`
          ).join('\n\n')}\n\n请基于以上搜索结果，在后续发言中引用相关信息。不要复读原始结果全文，提炼关键信息并用你自己的话表达。`
        });
      }
    } else {
      // 【Bug B修复】其他 Agent 的消息统一用 user 角色，禁止用 assistant。
      // 在 LLM API 协议中 assistant = 模型自己的历史输出。把别人的发言标成
      // assistant 会导致模型认为那是自己说过的话，从而：
      //   1) 不自洽——无法区分"我说的"和"别人说的"
      //   2) 插话——以为自己是最后一个发言的人，不顾他人正在对话
      //   3) 角色混淆——把别人的观点当成自己的立场
      // 改为全部 user 角色 + 明确身份前缀（用户/群主/管理员/成员），模型像读群聊记录一样阅读。
      let roleTag = '';
      if (msg.senderType !== 'user' && msg.senderId && group && group.members) {
        const senderMember = group.members.find(m => m.agentId === msg.senderId);
        if (senderMember?.role === 'host') roleTag = '群主 ';
        else if (senderMember?.role === 'admin') roleTag = '管理员 ';
      }
      const senderLabel = msg.senderType === 'user' 
        ? `用户 ${msg.senderName}`
        : `${roleTag}成员 ${msg.senderName}`;
      contextMessages.push({
        role: 'user',
        content: `${prefix}[${senderLabel}${mentionMarker}](${msgTimeStr} msg:${msgShortId}): ${displayContent}`
      });
    }


  }

  return {
    systemPrompt,
    messages: contextMessages
  };
}

// ===== @机制与唤醒调度 =====
const wakeSchedulers = new Map();

function getWakeScheduler(groupId) {
  let scheduler = wakeSchedulers.get(groupId);
  if (!scheduler) {
    scheduler = new WakeScheduler(groupId);
    wakeSchedulers.set(groupId, scheduler);
  }
  return scheduler;
}

class WakeScheduler {
  constructor(groupId) {
    this.groupId = groupId;
    this.messageCount = 0;
    // [v3] 记录每个成员"上次被唤醒时的messageCount"，用于冷却期判断
    this.lastWakeCount = new Map();
  }
  
  incrementMessageCount() {
    this.messageCount++;
  }
  
  // [v3] 当成员因@被唤醒时更新冷却计时
  _onMentionWake(agentId) {
    this.lastWakeCount.set(agentId, this.messageCount);
  }
  
  // [v3] 当成员被pickNextBatch选中时更新冷却计时
  _onBatchWake(agentId) {
    this.lastWakeCount.set(agentId, this.messageCount);
  }
  
  // [v3] 已废弃：整除触发机制已完全移除，统一使用 pickNextBatch 打分调度。
  // 保留空壳以兼容旧调用点，永远返回空数组。
  determineWakeList(recentMessages, allMessages, alreadyWokenIds) {
    return [];
  }

  // ===== [v3] 纯打分动态调度 =====
  // 完全抛弃整除限制。每个Agent根据：@优先级 + 群主身份 + 活跃度 + 沉默补偿 综合打分。
  // cooldownMap: Map<agentId, lastWakeMsgCount> — 冷却期内跳过，冷却期满正常参选。
  pickNextBatch(allMessages, cooldownMap, batchSize) {
    const group = getGroup(this.groupId);
    if (!group) return [];

    const candidates = [];
    // 冷却消息数：至少2条，最多半批大小
    const cooldownMsgs = Math.max(Math.ceil(batchSize / 2), 2);

    // 聚合最近消息中的 @提及（用于优先级判断）
    const aggregatedMentionedIds = new Set();
    const recentWindow = Math.max(batchSize * 2, 6);
    const recentMessages = allMessages.slice(-recentWindow);
    for (const msg of recentMessages) {
      if (!msg.mentions || msg.mentions.length === 0) continue;
      for (const mid of msg.mentions) {
        aggregatedMentionedIds.add(mid);
      }
    }

    for (const member of group.members) {
      // [v3] Watcher排除：偏离检测哨兵不参与正常打分调度，完全隔离。
      // 它只在后面的沉默专用通道中触发。
      const agent = getAgentFriend(member.agentId);
      if (agent && agent.id === 'builtin-watchdog-drift') continue;

      // [v3] 冷却期检查：距离上次唤醒不足 cooldownMsgs 条消息 → 跳过
      const lastWake = cooldownMap.get(member.agentId);
      if (lastWake !== undefined && (this.messageCount - lastWake) < cooldownMsgs) {
        continue;
      }

      // 禁言处理
      if (member.isMuted) {
        if (member.muteUntilCount !== null &&
            member.muteUntilCount !== undefined &&
            this.messageCount >= member.muteUntilCount) {
          member.isMuted = false;
          member.muteUntilCount = null;
          saveGroup(group);
          DebugLogger.info('wake', `${getAgentFriend(member.agentId)?.name} 禁言到期自动解除 (messageCount=${this.messageCount})`);
        } else {
          continue;
        }
      }

      if (!agent || !agent.apiKey || !agent.apiKey.trim()) continue;

      let score = 0;

      // 规则1: @提及 — 最高优先级（10000分）
      if (aggregatedMentionedIds.has(member.agentId)) {
        // 检查@是否已过期（该Agent已回应过）
        let lastMentionIdx = -1;
        let lastOwnIdx = -1;
        for (let i = 0; i < allMessages.length; i++) {
          const m = allMessages[i];
          if (m.senderId === member.agentId && m.senderType === 'agent') lastOwnIdx = i;
          if (m.mentions && m.mentions.includes(member.agentId)) lastMentionIdx = i;
        }
        if (lastMentionIdx > lastOwnIdx) {
          score += 10000;  // @仍活跃，绝对优先
          DebugLogger.info('wake', `${agent.name} 因活跃@提及获得最高优先级`);
        }
      }

      // 规则2: 群主 — 高优先级（5000分）
      if (member.role === 'host') {
        score += 5000;
      }

      // [v3] 规则3: 活跃度加成 — 完全替代旧的整除/间隔门控。
      // wakeInterval 重新定义为"活跃度"：0=仅@唤醒，1~100=越活跃越高频。
      // 无门控！每个Agent都无条件获得活跃度加成，值越大越容易被选中。
      const activity = member.overrides?.wakeInterval
        || (agent ? agent.wakeInterval : 5)
        || 5;
      if (activity > 0) {
        score += activity * 50;  // 最高 100*50 = 5000分
      }

      // [v3] @活跃时非目标降分 — 避免抢答，但比例放宽（0.5而非旧版0.4）
      if (aggregatedMentionedIds.size > 0 &&
          !aggregatedMentionedIds.has(member.agentId) &&
          member.role !== 'host') {
        score = Math.floor(score * 0.5);
      }

      // 规则4: 沉默时长 — 越久没说话越优先
      let lastMsgIndex = -1;
      for (let i = allMessages.length - 1; i >= 0; i--) {
        if (allMessages[i].senderId === member.agentId && allMessages[i].senderType !== 'system') {
          lastMsgIndex = i;
          break;
        }
      }
      if (lastMsgIndex >= 0) {
        const silenceLength = allMessages.length - lastMsgIndex;
        score += silenceLength * 50;
      } else {
        score += 1000;  // 从未说过话
      }

      if (score > 0) {
        candidates.push({ agentId: member.agentId, score });
      }
    }

    // [v3] Watcher 沉默专用通道：偏离检测哨兵不参与正常打分。
    // 纯粹由沉默时长触发——只有当它至少12条新消息没说过话时才被唤醒。
    // 它永远不被@、永远没有活跃度加成、永远不被冷却期管制（自身是低频哨兵）。
    const WATCHER_ID = 'builtin-watchdog-drift';
    const watcherMember = group.members.find(m => m.agentId === WATCHER_ID);
    if (watcherMember && !watcherMember.isMuted) {
      const watcherAgent = getAgentFriend(WATCHER_ID);
      if (watcherAgent && watcherAgent.apiKey && watcherAgent.apiKey.trim()) {
        const watcherLastWake = cooldownMap.get(WATCHER_ID);
        const watcherCooldownOk = watcherLastWake === undefined || (this.messageCount - watcherLastWake) >= 8;
        if (watcherCooldownOk) {
          let watcherLastMsg = -1;
          for (let i = allMessages.length - 1; i >= 0; i--) {
            if (allMessages[i].senderId === WATCHER_ID) { watcherLastMsg = i; break; }
          }
          const watcherSilence = watcherLastMsg >= 0 ? (allMessages.length - watcherLastMsg) : allMessages.length;
          // 沉默≥15条 → 触发；群刚创建(allMessages.length>0且从未说话)也触发
          if (watcherSilence >= 15) {
            candidates.push({ agentId: WATCHER_ID, score: watcherSilence * 100 });
          }
        }
      }
    }

    // 按分数降序
    candidates.sort((a, b) => b.score - a.score);

    // 取前 batchSize 个（二次安检冷却期，防止边缘情况）
    const selected = [];
    for (const c of candidates) {
      if (selected.length >= batchSize) break;
      const lastWake = cooldownMap.get(c.agentId);
      if (lastWake !== undefined && (this.messageCount - lastWake) < cooldownMsgs) continue;
      selected.push(c.agentId);
    }

    if (selected.length > 0) {
      DebugLogger.info('wake',
        `pickNextBatch 选中 ${selected.map(id => {
          const a = getAgentFriend(id);
          const c = candidates.find(x => x.agentId === id);
          return `${a?.name || id}(${c?.score || '?'})`;
        }).join(', ')}`);
    }

    return selected;
  }

  _extractMentions(content, group) {
    if (!content) return [];
    
    const mentionRegex = /@([^\s,，。！？、；：""''\]\)】》\n!?,.;:'"\)\]]+)/g;
    const mentionedNames = [];
    let match;
    while ((match = mentionRegex.exec(content)) !== null) {
      mentionedNames.push(match[1]);
    }
    
    return mentionedNames.map(name => {
      const member = group.members.find(m => {
        const agent = getAgentFriend(m.agentId);
        return agent && agent.name === name;
      });
      return member ? member.agentId : null;
    }).filter(Boolean);
  }
  
  // [v3] 强制下轮唤醒 — 将冷却计数设为很久以前
  forceWakeNextRound(agentId) {
    this.lastWakeCount.set(agentId, -9999);
    DebugLogger.info('wake', `强制下轮唤醒: ${getAgentFriend(agentId)?.name}`);
  }
  
  reset() {
    this.messageCount = 0;
    this.lastWakeCount.clear();
  }
}

// ===== @选择器UI =====
function showMentionSelector(inputElement, groupId) {
  // 清理上一次可能残留的@选择器弹窗
  const existingPopups = document.querySelectorAll('.mention-selector');
  existingPopups.forEach(p => p.remove());
  
  const group = getGroup(groupId);
  if (!group) return;
  
  const popup = document.createElement('div');
  popup.className = 'mention-selector';
  popup.style.cssText = `
    position: absolute;
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 8px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 1000;
    width: 220px;
    color: #fff;
  `;
  
  group.members.forEach(member => {
    const agent = getAgentFriend(member.agentId);
    if (!agent) return;
    
    const item = document.createElement('div');
    item.style.cssText = 'padding:8px 12px;cursor:pointer;display:flex;align-items:center;';
    item.innerHTML = `
      <span style="
        width:28px;height:28px;border-radius:50%;background:#333;
        display:flex;align-items:center;justify-content:center;margin-right:8px;
        font-size:12px;
      ">${escapeHTML(agent.avatar)}</span>
      <span>${escapeHTML(agent.name)}</span>
      ${member.role === 'host' ? '<span style="color:#ffd700;margin-left:auto;font-size:11px;">群主</span>' : ''}
      ${member.isMuted ? '<span style="color:#ff4444;margin-left:4px;font-size:11px;">[禁言]</span>' : ''}
    `;
    item.addEventListener('click', () => {
      insertMention(inputElement, agent.name);
      popup.remove();
    });
    item.addEventListener('mouseenter', () => item.style.background = '#333');
    item.addEventListener('mouseleave', () => item.style.background = 'transparent');
    popup.appendChild(item);
  });
  
  const rect = inputElement.getBoundingClientRect();
  popup.style.left = rect.left + 'px';
  popup.style.bottom = (window.innerHeight - rect.top + 10) + 'px';
  
  document.body.appendChild(popup);
  
  const closeHandler = (e) => {
    if (!popup.contains(e.target) && e.target !== inputElement) {
      popup.remove();
      document.removeEventListener('click', closeHandler);
    }
  };
  setTimeout(() => document.addEventListener('click', closeHandler), 100);
  
  return popup;
}

function insertMention(inputElement, agentName) {
  const cursorPos = inputElement.selectionStart;
  const textBefore = inputElement.value.substring(0, cursorPos);
  const textAfter = inputElement.value.substring(cursorPos);
  
  const lastAtIndex = textBefore.lastIndexOf('@');
  const newBefore = textBefore.substring(0, lastAtIndex) + '@' + agentName + ' ';
  
  inputElement.value = newBefore + textAfter;
  inputElement.focus();
  const newPos = newBefore.length;
  inputElement.setSelectionRange(newPos, newPos);
}

// ===== 历史压缩 =====
function checkCompressionNeed(group, messages) {
  const hostMember = group.members.find(m => m.role === 'host');
  if (!hostMember) return { needed: false, severity: 0 };
  
  const hostAgent = getAgentFriend(hostMember.agentId);
  if (!hostAgent) return { needed: false, severity: 0 };
  
  // 【修改】直接使用群主的maxTokens作为上下文上限（不再乘以hostContextMultiplier）
  // 达到群主token上限的90%时触发压缩，动态跟随群主实际token配置
  const hostTokenLimit = hostMember.overrides?.maxTokens || hostAgent.maxTokens;
  
  const contextTokens = estimateTokens(messages, group);
  
  if (contextTokens > hostTokenLimit * 0.90) {
    return { needed: true, severity: contextTokens / hostTokenLimit };
  }
  return { needed: false, severity: 0 };
}

function estimateTokens(messages, group) {
  let totalChars = 0;
  const startRound = group.summaries.length > 0 
    ? group.summaries[group.summaries.length - 1].roundRange[1] + 1 
    : 0;
  
  for (const msg of messages) {
    if (msg.roundIndex >= startRound && msg.senderType !== 'system') {
      totalChars += (msg.cleanContent || msg.content || '').length;
    }
  }
  return Math.ceil(totalChars / 2);
}

async function executeCompression(groupId) {
  const group = getGroup(groupId);
  if (!group) return null;
  
  const messages = getMessages(groupId);
  const hostMember = group.members.find(m => m.role === 'host');
  if (!hostMember) return null;
  
  const hostAgent = getAgentFriend(hostMember.agentId);
  if (!hostAgent) return null;
  
  DebugLogger.info('compression', `群 ${groupId} 开始历史压缩 (消息数:${messages.length})`);
  
  const unsummarizedMessages = messages.filter(m => {
    if (group.summaries.length === 0) return true;
    return m.roundIndex > group.summaries[group.summaries.length - 1].roundRange[1];
  });
  
  if (unsummarizedMessages.length === 0) return null;
  
  const compressionPrompt = `[系统指令 - 历史压缩]
请将以下群聊讨论内容总结为结构化摘要。要求：
1. 保留所有关键决策、结论、分歧点
2. 保留每个Agent的核心观点和表决结果
3. 压缩到500字以内
4. 使用以下格式：
   - 话题脉络: ...
   - 关键决策: ...
   - 各成员立场: ...
   - 待解决问题: ...
5. 只输出纯文本摘要，不要输出JSON命令块

以下为需要压缩的讨论内容：
${unsummarizedMessages.map(m => `[${m.senderName}]: ${m.cleanContent || m.content}`).join('\n')}`;
  
  const response = await callAgentAPI(
    hostAgent, 
    hostMember, 
    group, 
    compressionPrompt,
    [],
    true
  );
  
  // 消费流式响应体，提取纯文本摘要
  let summary = '';
  let thinkingText = '';
  try {
    await streamAgentResponse(
      response,
      (chunk, full, isThinking) => { /* 压缩无需实时渲染 */ },
      (fullText, thinking) => {
        summary = fullText;
        thinkingText = thinking || '';
      },
      (error) => {
        throw new Error('压缩摘要生成失败: ' + error.message);
      }
    );
  } catch (streamError) {
    DebugLogger.error('compression', `流式读取压缩摘要失败: ${streamError.message}`);
    throw streamError;
  }
  
  group.summaries.push({
    roundRange: [
      unsummarizedMessages[0].roundIndex,
      unsummarizedMessages[unsummarizedMessages.length - 1].roundIndex
    ],
    summary,
    createdAt: Date.now()
  });
  saveGroup(group);
  
  DebugLogger.info('compression', `压缩完成，摘要长度:${summary.length}字，覆盖第${unsummarizedMessages[0].roundIndex}~${unsummarizedMessages[unsummarizedMessages.length - 1].roundIndex}轮`);
  
  addSystemMessage(groupId, `[历史压缩完成] 第${unsummarizedMessages[0].roundIndex}~${unsummarizedMessages[unsummarizedMessages.length - 1].roundIndex}轮已压缩为摘要，后续Agent将基于摘要继续讨论。`);
  
  return summary;
}

// ===== API调用层 =====
async function callAgentAPI(agent, memberConfig, group, 
  userMessage = null, contextMessages = [], skipInteractionProtocol = false) {
  
  const systemPrompt = assembleSystemPrompt(agent, memberConfig, group, skipInteractionProtocol);
  
  const messages = [
    { role: 'system', content: systemPrompt }
  ];
  
  for (const ctxMsg of contextMessages) {
    messages.push({
      role: ctxMsg.role,
      content: ctxMsg.content
    });
  }
  
  if (userMessage) {
    messages.push({
      role: 'user',
      content: userMessage
    });
  }
  
  if (messages.length === 1) {
    messages.push({
      role: 'user',
      content: '[系统唤醒]'
    });
  }
  
  const requestBody = {
    model: memberConfig.overrides?.model || agent.model,
    messages: messages,
    temperature: memberConfig.overrides?.temperature ?? agent.temperature,
    max_tokens: memberConfig.overrides?.maxTokens || agent.maxTokens,
    top_p: agent.topP || 0.95,
    stream: true
  };
  
  if (agent.deepThinking && !skipInteractionProtocol) {
    requestBody.thinking = { type: 'enabled' };
    requestBody.reasoning_effort = agent.effortLevel || 'high';
  }
  
  if (skipInteractionProtocol) {
    requestBody.thinking = { type: 'disabled' };
  }
  
  DebugLogger.api(`agent:${agent.name}`, `开始调用 → 模型:${requestBody.model} tokens:${requestBody.max_tokens} 消息数:${messages.length}`);
  const startTime = performance.now();
  
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 60000);
  
  // 注册到全局中断系统
  registerRequestController(group.id, controller);
  
  // 检查全局中断信号
  const globalCtrl = groupAbortControllers.get(group.id);
  if (globalCtrl && globalCtrl.signal.aborted) {
    clearTimeout(timeoutId);
    unregisterRequestController(group.id, controller);
    throw new Error('讨论已被终止');
  }
  
  // 监听全局中断
  const onGlobalAbort = () => { controller.abort(); };
  if (globalCtrl) {
    globalCtrl.signal.addEventListener('abort', onGlobalAbort);
  }
  
  try {
    const response = await fetch(
      `${agent.baseURL.replace(/\/+$/, '')}/v1/chat/completions`,
      {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${agent.apiKey}`
        },
        body: JSON.stringify(requestBody),
        signal: controller.signal
      }
    );
    
    clearTimeout(timeoutId);
    const elapsed = Math.round(performance.now() - startTime);
    
    if (!response.ok) {
      const errorText = await response.text().catch(() => '');
      DebugLogger.error(`agent:${agent.name}`, `API错误 HTTP ${response.status}`, { body: errorText.substring(0, 200) });
      throw new Error(`API Error: ${response.status} ${response.statusText}${errorText ? ' - ' + errorText.substring(0, 100) : ''}`);
    }
    
    clearTimeout(timeoutId);
    unregisterRequestController(group.id, controller);
    if (globalCtrl) {
      globalCtrl.signal.removeEventListener('abort', onGlobalAbort);
    }
    
    DebugLogger.api(`agent:${agent.name}`, `响应成功 (${elapsed}ms, status:${response.status})`);
    return response;
  } catch (error) {
    clearTimeout(timeoutId);
    unregisterRequestController(group.id, controller);
    if (globalCtrl) {
      globalCtrl.signal.removeEventListener('abort', onGlobalAbort);
    }
    const elapsed = Math.round(performance.now() - startTime);
    
    if (error.name === 'AbortError') {
      // 区分超时中断和用户手动中断
      const isManualAbort = globalCtrl && globalCtrl.signal.aborted;
      if (isManualAbort) {
        DebugLogger.info(`agent:${agent.name}`, `被用户手动终止`);
        throw new Error('讨论已被终止');
      }
      DebugLogger.error(`agent:${agent.name}`, `请求超时 (>60s)`, { elapsed });
      throw new Error('请求超时(60秒)');
    }
    
    DebugLogger.error(`agent:${agent.name}`, `调用失败: ${error.message}`, { elapsed });
    throw error;
  }
}

// ===== Tavily 搜索API调用 =====
async function callTavilySearch(agent, query, options = {}) {
  const searchDepth = options.searchDepth || 'advanced';
  const maxResults = options.maxResults || 5;
  const includeDomains = options.includeDomains || [];
  const excludeDomains = options.excludeDomains || [];

  if (!agent || !agent.tavilyApiKey || !agent.tavilyApiKey.trim()) {
    throw new Error('Tavily API Key未配置');
  }

  DebugLogger.api(`agent:${agent.name}`, `Tavily搜索 → query:"${query.substring(0, 80)}" depth:${searchDepth}`);

  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 30000);

  try {
    const response = await fetch('https://api.tavily.com/search', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${agent.tavilyApiKey}`
      },
      body: JSON.stringify({
        query,
        search_depth: searchDepth,
        max_results: maxResults,
        include_domains: includeDomains.length > 0 ? includeDomains : undefined,
        exclude_domains: excludeDomains.length > 0 ? excludeDomains : undefined
      }),
      signal: controller.signal
    });

    clearTimeout(timeoutId);

    if (!response.ok) {
      const errText = await response.text().catch(() => '');
      throw new Error(`Tavily API Error: HTTP ${response.status} ${errText.substring(0, 100)}`);
    }

    const data = await response.json();
    DebugLogger.api(`agent:${agent.name}`, `Tavily搜索完成 → ${data.results?.length || 0}条结果`);

    return {
      query,
      results: data.results || [],
      answer: data.answer || null,
      images: data.images || [],
      responseTime: data.response_time || 0
    };
  } catch (error) {
    clearTimeout(timeoutId);
    if (error.name === 'AbortError') {
      throw new Error('Tavily搜索超时(30s)');
    }
    throw error;
  }
}

// ===== 流式响应处理 =====
async function streamAgentResponse(response, onChunk, onComplete, onError, abortSignal = null) {
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let fullText = '';
  let thinkingText = '';
  let buffer = '';

  const cancelReader = () => { try { reader.cancel(); } catch(e) {} };
  if (abortSignal) {
    if (abortSignal.aborted) { cancelReader(); return; }
    abortSignal.addEventListener('abort', cancelReader, { once: true });
  }

  try {
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      if (abortSignal && abortSignal.aborted) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || !trimmed.startsWith('data: ')) continue;

        const data = trimmed.slice(6).trim();
        if (data === '[DONE]') {
          if (abortSignal && abortSignal.aborted) return;
          await onComplete(fullText, thinkingText);
          return;
        }

        try {
          const parsed = JSON.parse(data);
          const delta = parsed.choices?.[0]?.delta;

          if (delta?.reasoning_content) {
            thinkingText += delta.reasoning_content;
            onChunk(delta.reasoning_content, fullText, true);
          }

          if (delta?.content) {
            fullText += delta.content;
            onChunk(delta.content, fullText, false);
          }
        } catch(e) {}
      }
    }

    if (abortSignal && abortSignal.aborted) return;
    await onComplete(fullText, thinkingText);
  } catch (error) {
    if (abortSignal && abortSignal.aborted) return;
    onError(error);
  } finally {
    if (abortSignal) abortSignal.removeEventListener('abort', cancelReader);
  }
}

// ===== 并发控制 =====
class ConcurrencyController {
  constructor(limit = 1) {
    this.limit = limit;
    this.running = 0;
    this.queue = [];
  }
  
  async enqueue(taskFn) {
    DebugLogger.debug('concurrency', `排队中 (运行:${this.running}/${this.limit}, 队列:${this.queue.length})`);
    
    while (this.running >= this.limit) {
      await new Promise(resolve => this.queue.push(resolve));
    }
    
    this.running++;
    try {
      return await taskFn();
    } finally {
      this.running--;
      const next = this.queue.shift();
      if (next) next();
    }
  }
  
  async executeAll(tasks) {
    return Promise.all(tasks.map(task => this.enqueue(task)));
  }
}

const concurrencyControllers = new Map();

// ===== 全局讨论中断控制 =====
const groupAbortControllers = new Map(); // groupId -> AbortController

function abortGroupDiscussion(groupId, reason = '用户手动终止') {
  const ctrl = groupAbortControllers.get(groupId);
  if (ctrl) {
    ctrl.abort();
    DebugLogger.info('chat', `群 ${groupId} 讨论中断: ${reason}`);
  }
  // 遍历所有该群的正在进行的fetch AbortController，统一中断
  const extraControllers = groupAbortControllers.get(groupId + '_requests') || [];
  for (const c of extraControllers) {
    try { c.abort(); } catch(e) {}
  }
  groupAbortControllers.set(groupId + '_requests', []);
}

function registerRequestController(groupId, controller) {
  let arr = groupAbortControllers.get(groupId + '_requests');
  if (!arr) {
    arr = [];
    groupAbortControllers.set(groupId + '_requests', arr);
  }
  arr.push(controller);
}

function unregisterRequestController(groupId, controller) {
  const arr = groupAbortControllers.get(groupId + '_requests');
  if (arr) {
    const idx = arr.indexOf(controller);
    if (idx >= 0) arr.splice(idx, 1);
  }
}

function getConcurrencyController(groupId) {
  const group = getGroup(groupId);
  const limit = group ? group.settings.concurrencyLimit : 3;
  
  let controller = concurrencyControllers.get(groupId);
  if (!controller || controller.limit !== limit) {
    controller = new ConcurrencyController(limit);
    concurrencyControllers.set(groupId, controller);
  }
  return controller;
}

// ===== 防退化机制 =====
function detectRepetition(messages, agentId, windowSize = 3) {
  const agentMessages = messages
    .filter(m => m.senderId === agentId && m.senderType === 'agent')
    .slice(-windowSize);
  
  if (agentMessages.length < windowSize) return { repeated: false, similarity: 0 };
  
  const contents = agentMessages.map(m => m.cleanContent || m.content || '');
  
  let similarPairs = 0;
  let totalPairs = 0;
  for (let i = 0; i < contents.length; i++) {
    for (let j = i + 1; j < contents.length; j++) {
      const similarity = levenshteinSimilarity(contents[i], contents[j]);
      if (similarity > 0.85) similarPairs++;
      totalPairs++;
    }
  }
  
  const avgSimilarity = totalPairs > 0 ? similarPairs / totalPairs : 0;
  
  return {
    repeated: similarPairs >= windowSize - 1,
    similarity: avgSimilarity
  };
}

function levenshteinSimilarity(a, b) {
  const na = a.replace(/\s+/g, '').toLowerCase();
  const nb = b.replace(/\s+/g, '').toLowerCase();
  
  if (na.length === 0 || nb.length === 0) return 0;
  if (na === nb) return 1;
  
  const maxLen = Math.max(na.length, nb.length);
  const distance = levenshteinDistance(na, nb);
  
  return 1 - distance / maxLen;
}

function levenshteinDistance(a, b) {
  const m = a.length, n = b.length;
  if (m === 0) return n;
  if (n === 0) return m;
  
  const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = a[i-1] === b[j-1] 
        ? dp[i-1][j-1] 
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}


function runAntiDegradationChecks(groupId) {
  const group = getGroup(groupId);
  if (!group) return [];
  
  const messages = getMessages(groupId);
  const interventions = [];
  
  for (const member of group.members) {
    if (member.isMuted) continue;
    
    const agent = getAgentFriend(member.agentId);
    if (!agent) continue;
    
    const agentMessages = messages.filter(m => 
      m.senderId === member.agentId && 
      m.senderType === 'agent'
    );
    
    if (agentMessages.length < 3) continue;
    
    const repetition = detectRepetition(messages, member.agentId);
    if (repetition.repeated) {
      interventions.push({
        type: 'repetition',
        agentId: member.agentId,
        agentName: agent.name,
        action: 'skip_round',
        message: `${agent.name} 检测到重复输出(相似度${(repetition.similarity*100).toFixed(0)}%)，跳过本轮调用`
      });
      // 【复读@群主】检测到复读时，额外生成alert_host请求群主禁言该Agent
      interventions.push({
        type: 'repetition_alert_host',
        agentId: member.agentId,
        agentName: agent.name,
        action: 'alert_host',
        message: `⚠️ 复读警告: ${agent.name} 连续输出高度相似内容(相似度${(repetition.similarity*100).toFixed(0)}%)，建议群主使用 {\"command\":\"mute\",\"target\":\"${member.agentId}\",\"rounds\":5} 禁言该Agent以防止污染上下文`
      });
    }
    
    const lastMsg = agentMessages[agentMessages.length - 1];
    if (lastMsg) {
      const len = (lastMsg.cleanContent || lastMsg.content || '').length;
      if (len > 2000) {
        interventions.push({
          type: 'overlength',
          agentId: member.agentId,
          agentName: agent.name,
          action: 'truncate',
          message: `${agent.name} 输出过长(${len}字)，后续将被截断`
        });
      }
    }
    
    const recentAgentMsgs = agentMessages.slice(-5);
    if (recentAgentMsgs.length >= 3 && 
        recentAgentMsgs.every(m => (m.cleanContent || m.content || '').length < 20)) {
      interventions.push({
        type: 'silence',
        agentId: member.agentId,
        agentName: agent.name,
        action: 'reduce_frequency',
        message: `${agent.name} 连续低质量输出，建议降低活跃度或检查prompt`
      });
    }
  }
  
  if (interventions.length > 0) {
    for (const iv of interventions) {
      DebugLogger.warn('antideg', `${iv.agentName}: ${iv.type} → ${iv.action}`, iv);
    }
  }
  
  return interventions;
}

// ===== 群聊主循环 =====
async function runChatRound(groupId, userMessage = null, manualMentions = []) {
  const group = getGroup(groupId);
  if (!group) return;
  
  // 创建本轮讨论的 AbortController
  const roundAbortCtrl = new AbortController();
  // 先中止上一轮残留的controller（如果有）
  const oldCtrl = groupAbortControllers.get(groupId);
  if (oldCtrl) { try { oldCtrl.abort(); } catch(e) {} }
  groupAbortControllers.set(groupId, roundAbortCtrl);
  
  let allMessages = getMessages(groupId);
  
  // 1. 保存用户消息
  if (userMessage) {
    // 【Bug1修复】解析用户消息中的命令块
    const parsedUser = parseAgentResponse(userMessage);
    const mentions = extractMentionsFromContent(parsedUser.cleanContent, group);
    
    // 如果用户发出了vote命令但没有指定proposalId，自动查找当前群的活动提议
    if (parsedUser.commandBlock && parsedUser.commandBlock.command === 'vote' && !parsedUser.commandBlock.proposalId) {
      const openProposals = ProposalStateMachine.getOpenProposalsForGroup(groupId);
      if (openProposals.length === 1) {
        parsedUser.commandBlock.proposalId = openProposals[0].id;
      }
    }
    
    const msg = {
      id: generateUUID(),
      groupId,
      roundIndex: getNextRoundIndex(groupId),
      senderType: 'user',
      senderId: null,
      senderName: '用户',
      content: userMessage,
      cleanContent: parsedUser.cleanContent,
      thinkingContent: null,
      commandBlock: parsedUser.commandBlock,
      commandResult: null,
      searchResult: null,
      quotedMessageId: parsedUser.quotedMessageId || null,
      mentions: mentions,
      timestamp: Date.now()
    };
    allMessages.push(msg);
    saveMessages(groupId, allMessages);
    renderChatMessages();
    
    // 【Bug1修复】执行用户消息中的命令
    if (parsedUser.commandBlock) {
      handleCommand(parsedUser.commandBlock, groupId, '__user__');
    }
  }
  
  // [v3] 2. 初始化调度器（纯打分调度，已移除整除预筛选）
  const scheduler = getWakeScheduler(groupId);
  scheduler.incrementMessageCount();
  // manualMentions 在 while 循环的收敛检测中自然处理

  // [v3] 3. 防退化检查 — agentCooldown(Map) 替代旧版 alreadyWokenThisTurn(Set)
  const agentCooldown = new Map();
  const interventions = runAntiDegradationChecks(groupId);
  for (const iv of interventions) {
    if (iv.action === 'skip_round') {
      agentCooldown.set(iv.agentId, scheduler.messageCount);
      addSystemMessage(groupId, `[防退化] ${iv.message}`);
    }
    if (iv.action === 'alert_host') {
      const hostMember = group.members.find(m => m.role === 'host');
      const hostAgent = hostMember ? getAgentFriend(hostMember.agentId) : null;
      const hostName = hostAgent ? hostAgent.name : '群主';
      addSystemMessage(groupId, `[防退化] ${iv.message}`);
      addSystemMessage(groupId, `[系统] @${hostName} 请关注上述防退化警告。如确认Agent存在复读行为，请使用禁言命令: {\"command\":\"mute\",\"target\":\"${iv.agentId}\",\"rounds\":5}`);
      if (hostMember && hostAgent && hostAgent.apiKey && hostAgent.apiKey.trim()) {
        scheduler.forceWakeNextRound(hostMember.agentId);
        agentCooldown.delete(hostMember.agentId);
      }
      // [v3] Watcher不再随防退化事件强制唤醒，它只走沉默专用通道
    }
    if (iv.action === 'mute_drifter') {
      addSystemMessage(groupId, `[防退化] ${iv.message}`);
    }
    if (iv.action === 'truncate') {
      addSystemMessage(groupId, `[防退化] ${iv.message}`);
    }
  }

  // [v3] 4. 历史压缩检查
  const compressionCheck = checkCompressionNeed(group, allMessages);
  if (compressionCheck.needed) {
    try {
      await executeCompression(groupId);
      allMessages = getMessages(groupId);
      const hostId = group.members.find(m => m.role === 'host')?.agentId;
      if (hostId) {
        scheduler.forceWakeNextRound(hostId);
        agentCooldown.delete(hostId);
      }
    } catch (compressionError) {
      DebugLogger.error('compression', `压缩失败，跳过本轮压缩: ${compressionError.message}`);
      addSystemMessage(groupId, `[系统] 历史压缩失败(${compressionError.message})，将在下轮重试。`);
    }
  }

  // [v3] 不再需要旧版 wakeList 预筛选+过滤逻辑。所有Agent统一由 while 循环 pickNextBatch 调度。

  // ===== [v3] 6. 纯打分动态调度 =====
  // 整除预筛选已完全移除。统一由 pickNextBatch 打分制 + agentCooldown 冷却制 调度。
  const concurrency = getConcurrencyController(groupId);
  const MIN_COOLDOWN_ADVANCE = Math.max(Math.ceil(concurrency.limit / 2), 2) + 1;

  let batchRound = 0;
  let consecutiveEmptyBatches = 0;
  const MAX_CONSECUTIVE_EMPTY_BATCHES = 10;

  while (true) {
    if (roundAbortCtrl.signal.aborted) {
      DebugLogger.info('chat', `群 ${group.name}: 讨论被中断`);
      addSystemMessage(groupId, '[系统] ⏹ 讨论已被终止');
      break;
    }
    
    batchRound++;
    let batchHadOutput = false;

    const currentMessages = getMessages(groupId);

    const nextBatch = scheduler.pickNextBatch(
      currentMessages,
      agentCooldown,
      concurrency.limit
    );

    if (nextBatch.length === 0) {
      // [v3] 收敛检测：检查是否有未回应的@提及
      const recentMsgs = currentMessages.slice(-Math.max(concurrency.limit * 2, 4));
      const agentsToUnblock = [];
      for (const msg of recentMsgs) {
        if (!msg.mentions || msg.mentions.length === 0) continue;
        for (const mentionedId of msg.mentions) {
          let responded = false;
          const msgIdx = currentMessages.indexOf(msg);
          for (let i = msgIdx + 1; i < currentMessages.length; i++) {
            if (currentMessages[i].senderId === mentionedId && currentMessages[i].senderType === 'agent') {
              responded = true;
              break;
            }
          }
          if (!responded) {
            agentsToUnblock.push(mentionedId);
          }
        }
      }

      if (agentsToUnblock.length > 0) {
        for (const id of agentsToUnblock) {
          agentCooldown.delete(id);
        }
        DebugLogger.info('chat', `群 ${group.name}: 检测到${agentsToUnblock.length}个未回应的@提及(${agentsToUnblock.map(id => getAgentFriend(id)?.name || id).join(',')})，解除冷却继续迭代`);
        continue;
      }

      DebugLogger.info('chat', `群 ${group.name}: 微批次第${batchRound}批无人需要唤醒且无未回应@提及，收敛终止`);
      break;
    }

    // [v3] 被选中的Agent进入冷却期
    for (const id of nextBatch) {
      agentCooldown.set(id, scheduler.messageCount);
    }

    DebugLogger.info('chat',
      `群 ${group.name}: 微批次第${batchRound}批 → ${nextBatch.map(id => getAgentFriend(id)?.name || id).join(', ')} (并发的${concurrency.limit}选${nextBatch.length})`);

    // 为这批人构造任务 — [v5] 搜索-响应循环：Agent发搜索命令后等待结果注入再唤醒
    const MAX_SEARCH_ROUNDS = 3; // 每个Agent最多搜索-响应循环3次，防止无限循环

    const tasks = nextBatch.map(agentId => {
      return async () => {
        const member = group.members.find(m => m.agentId === agentId);
        const agent = getAgentFriend(agentId);
        if (!member || !agent) return;

        let agentHadOutput = false; // 该Agent在本轮是否至少输出过一次（用于batchHadOutput）

        // [v5] 搜索-响应循环
        for (let searchRound = 0; searchRound < MAX_SEARCH_ROUNDS; searchRound++) {
          if (roundAbortCtrl.signal.aborted) break;

          // 每次循环重新读消息，确保看到自己上一轮的搜索结果
          const msgs = getMessages(groupId);
          const context = buildAgentContext(group, agentId, msgs);

          let hadSearchCommands = false; // 本轮是否发出了搜索命令（决定是否继续循环）

          try {
            const response = await callAgentAPI(
              agent, member, group,
              null,
              context.messages,
              false
            );

            let fullResponse = '';
            let thinkingResponse = '';
            const msgElement = createMessageBubble(agent.name, agent.avatar, member);

            // [v5] 如果是搜索后续轮次，在气泡头部标记"基于搜索结果回复"
            if (searchRound > 0) {
              const timeEl = msgElement.querySelector('.message-header .time');
              if (timeEl) {
                timeEl.textContent = '生成中 (基于搜索)...';
              }
            }

            await streamAgentResponse(
              response,
              (chunk, full, isThinking) => {
                if (isThinking) {
                  thinkingResponse += chunk;
                  updateThinkingBlock(msgElement, thinkingResponse);
                } else {
                  fullResponse += chunk;
                  updateMessageContent(msgElement, fullResponse);
                }
              },
              async (fullText, thinkingText) => {
                if (roundAbortCtrl.signal.aborted) return;
                const parsed = parseAgentResponse(fullText);

                const hasContent = parsed.cleanContent && parsed.cleanContent.trim();
                if (!hasContent) {
                  if (msgElement && msgElement.parentNode) {
                    msgElement.remove();
                  }
                  DebugLogger.info('chat', `${agent.name} 空输出已过滤（静默）`);
                  scheduler.incrementMessageCount();
                  return;
                }

                const msg = {
                  id: generateUUID(),
                  groupId,
                  roundIndex: getNextRoundIndex(groupId),
                  senderType: 'agent',
                  senderId: agentId,
                  senderName: agent.name,
                  content: parsed.cleanContent || parsed.displayContent,
                  cleanContent: parsed.cleanContent,
                  thinkingContent: thinkingText || parsed.thinkingContent,
                  commandBlock: parsed.commandBlock,
                  commandResult: null,
                  searchResult: null,
                  quotedMessageId: parsed.quotedMessageId || null,
                  mentions: extractMentionsFromContent(parsed.cleanContent, group),
                  timestamp: Date.now()
                };

                // [v5] 搜索可视化：用户端可见的搜索过程
                if (parsed.searchCommands && parsed.searchCommands.length > 0 && agent.enableSearchTool) {
                  // 在气泡底部插入搜索状态指示器
                  const searchIndicator = document.createElement('div');
                  searchIndicator.className = 'search-indicator';
                  searchIndicator.style.cssText = 'margin-top:8px;padding:6px 10px;border-radius:6px;background:rgba(68,136,255,0.1);border:1px solid rgba(68,136,255,0.25);font-size:12px;color:var(--accent-blue);';
                  searchIndicator.innerHTML = `⚡ 工具调用中 (0/${parsed.searchCommands.length})...`;
                  const bubble = msgElement.querySelector('.message-bubble');
                  if (bubble) bubble.appendChild(searchIndicator);

                  msg.searchResult = [];
                  for (let si = 0; si < parsed.searchCommands.length; si++) {
                    const sc = parsed.searchCommands[si];
                    // 更新指示器：当前正在搜什么
                  searchIndicator.innerHTML = `⚡ 工具调用中 (${si}/${parsed.searchCommands.length}): "${escapeHTML(sc.query.substring(0, 40))}${sc.query.length > 40 ? '...' : ''}"`;
                  try {

                      const result = await callTavilySearch(agent, sc.query, {
                        searchDepth: sc.searchDepth,
                        maxResults: sc.maxResults
                      });
                      msg.searchResult.push(result);
                      DebugLogger.info('chat', `${agent.name} 搜索完成: "${sc.query}" → ${result.results?.length || 0}条结果`);
                    } catch (searchErr) {
                      DebugLogger.error(`agent:${agent.name}`, `搜索失败 "${sc.query}": ${searchErr.message}`);
                      msg.searchResult.push({
                        query: sc.query,
                        results: [],
                        answer: null,
                        error: searchErr.message
                      });
                    }
                  }

                  // 搜索全部完成后更新指示器
                  const successCount = msg.searchResult.filter(r => !r.error).length;
                  const failCount = msg.searchResult.filter(r => r.error).length;
                  const totalResults = msg.searchResult.reduce((sum, r) => sum + (r.results?.length || 0), 0);
                  let statusColor = successCount > 0 ? 'var(--accent-green)' : 'var(--accent-red)';
                  searchIndicator.style.background = successCount > 0 ? 'rgba(68,255,68,0.1)' : 'rgba(255,68,68,0.1)';
                  searchIndicator.style.borderColor = successCount > 0 ? 'rgba(68,255,68,0.25)' : 'rgba(255,68,68,0.25)';
                searchIndicator.style.color = statusColor;
                searchIndicator.innerHTML = `⚡ 调用完成: ${successCount}成功${failCount > 0 ? ` ${failCount}失败` : ''}，共${totalResults}条结果`;
                searchIndicator.style.cursor = 'pointer';

                  searchIndicator.title = '点击查看搜索详情（仅你可见）';
                  searchIndicator.onclick = () => {
                    if (searchIndicator.classList.contains('expanded')) {
                      searchIndicator.classList.remove('expanded');
                    searchIndicator.innerHTML = `⚡ 调用完成: ${successCount}成功${failCount > 0 ? ` ${failCount}失败` : ''}，共${totalResults}条结果`;
                    searchIndicator.style.cursor = 'pointer';

                      searchIndicator.title = '点击查看搜索详情（仅你可见）';
                      searchIndicator.onclick = searchIndicator.onclick;
                      return;
                    }
                    searchIndicator.classList.add('expanded');
                    let detailHTML = `<div style="font-weight:600;margin-bottom:6px;">⚡ 调用详情（仅你可见）</div>`;
                    msg.searchResult.forEach((sr, si) => {
                      detailHTML += `<div style="margin-bottom:8px;padding:6px;background:rgba(0,0,0,0.2);border-radius:4px;">`;
                      detailHTML += `<div style="font-weight:600;color:var(--accent-gold);">#${si+1}: ${escapeHTML(sr.query)}</div>`;
                      if (sr.error) {
                        detailHTML += `<div style="color:var(--accent-red);">❌ ${escapeHTML(sr.error)}</div>`;
                      } else {
                        detailHTML += `<div style="color:var(--text-weak);">${sr.results?.length || 0}条结果 ${sr.answer ? '| AI摘要可用' : ''}</div>`;
                        (sr.results || []).slice(0, 3).forEach((r, ri) => {
                          detailHTML += `<div style="margin:3px 0 0 8px;font-size:11px;">[${ri+1}] <a href="${escapeHTML(r.url || '#')}" target="_blank" style="color:var(--accent-blue);">${escapeHTML((r.title || '').substring(0, 60))}</a></div>`;
                        });
                        if ((sr.results || []).length > 3) {
                          detailHTML += `<div style="margin:2px 0 0 8px;font-size:11px;color:var(--text-weak);">...还有${sr.results.length - 3}条</div>`;
                        }
                      }
                      detailHTML += `</div>`;
                    });
                    detailHTML += `<div style="font-size:10px;color:var(--text-weak);">搜索结果仅发送给该Agent，其他Agent不可见。文件操作同样仅该Agent可见。</div>`;
                    searchIndicator.innerHTML = detailHTML;
                    searchIndicator.style.cursor = 'default';
                    searchIndicator.title = '';
                  };

                  // 标记需要继续循环（等待搜索结果注入后再次调用Agent）
                  if (msg.searchResult.some(r => !r.error)) {
                    hadSearchCommands = true;
                  }
                }

                // [v5] 文件命令处理 (读/写/创建)
                if (parsed.readFileCommands && parsed.readFileCommands.length > 0 && agent.enableFileTool) {
                  if (!msg.searchResult) msg.searchResult = [];
                  for (const rfc of parsed.readFileCommands) {
                    if (rfc.action === 'listFiles') {
                      const flist = groupFiles[groupId] || [];
                      const visibleFiles = flist.filter(f => f.visible !== false);
                      const hiddenCount = flist.length - visibleFiles.length;
                      const names = visibleFiles.length > 0 ? visibleFiles.map(f => f.filename + ' (' + (f.size/1024).toFixed(1) + 'KB)').join(', ') : '(无文件)';
                      const extra = hiddenCount > 0 ? ' [另有' + hiddenCount + '个文件已被屏蔽,不可见]' : '';
                      msg.searchResult.push({
                        query: '[listFiles]',
                        results: [{ title: '可用文件: ' + names + extra, url: '', content: names + extra }],
                        answer: null
                      });
                    } else if (rfc.action === 'readFile') {
                      const flist = groupFiles[groupId] || [];
                      const found = flist.find(f => f.filename === rfc.filename);
                      if (!found) {
                        msg.searchResult.push({
                          query: '[readFile] ' + rfc.filename,
                          results: [], answer: null,
                          error: '文件 "' + rfc.filename + '" 不存在'
                        });
                      } else if (found.visible === false) {
                        msg.searchResult.push({
                          query: '[readFile] ' + rfc.filename,
                          results: [], answer: null,
                          error: '文件 "' + rfc.filename + '" 已被管理员屏蔽'
                        });
                      } else {
                        let text = found.content;
                        if (rfc.lineFrom != null || rfc.lineTo != null) {
                          const lines = text.split('\n');
                          const lf = Math.max(1, rfc.lineFrom || 1);
                          const lt = Math.min(lines.length, rfc.lineTo || lines.length);
                          text = lines.slice(lf - 1, lt).map((l, i) => 'L' + (lf + i) + ': ' + l).join('\n');
                          if (text.length > 5000) text = text.substring(0, 5000) + '\n...(已截断)';
                          text = '[' + rfc.filename + ' L' + lf + '-L' + lt + ']\n' + text;
                        } else {
                          if (text.length > 5000) text = text.substring(0, 5000) + '\n...(已截断,共' + found.content.length + '字符)';
                        }
                        msg.searchResult.push({
                          query: '[readFile] ' + rfc.filename,
                          results: [{ title: rfc.filename + ' (' + (found.size/1024).toFixed(1) + 'KB)', url: '', content: text }],
                          answer: null
                        });
                      }
                    } else if (rfc.action === 'writeFile') {
                      const flist = groupFiles[groupId] || [];
                      const found = flist.find(f => f.filename === rfc.filename);
                      if (!found) {
                        msg.searchResult.push({
                          query: '[writeFile] ' + rfc.filename,
                          results: [], answer: null,
                          error: '文件 "' + rfc.filename + '" 不存在，无法修改'
                        });
                      } else if (found.visible === false) {
                        msg.searchResult.push({
                          query: '[writeFile] ' + rfc.filename,
                          results: [], answer: null,
                          error: '文件 "' + rfc.filename + '" 已被管理员屏蔽，无法修改'
                        });
                      } else {
                        const lines = found.content.split('\n');
                        const lf = Math.max(1, rfc.lineFrom || 1);
                        const lt = Math.min(lines.length, rfc.lineTo || lines.length);
                        const newLines = (rfc.content || '').split('\n');
                        lines.splice(lf - 1, lt - lf + 1, ...newLines);
                        found.content = lines.join('\n');
                        found.size = new Blob([found.content]).size;
                        found.timestamp = Date.now();
                        saveGroupFiles();
                        const preview = found.content.length > 1000 ? found.content.substring(0, 1000) + '\n...(共' + found.content.length + '字符)' : found.content;
                        msg.searchResult.push({
                          query: '[writeFile] ' + rfc.filename + ' L' + lf + '-L' + lt,
                          results: [{ title: '已修改: ' + rfc.filename + ' (' + (found.size/1024).toFixed(1) + 'KB) [' + found.content.split('\n').length + '行]', url: '', content: preview }],
                          answer: null
                        });
                      }
                    } else if (rfc.action === 'createFile') {
                      if (!groupFiles[groupId]) groupFiles[groupId] = [];
                      const existing = groupFiles[groupId].find(f => f.filename === rfc.filename);
                      if (existing && existing.visible === false) {
                        msg.searchResult.push({
                          query: '[createFile] ' + rfc.filename,
                          results: [], answer: null,
                          error: '文件名 "' + rfc.filename + '" 已被屏蔽占用，无法创建'
                        });
                      } else {
                        if (existing) {
                          existing.content = rfc.content || '';
                          existing.size = new Blob([existing.content]).size;
                          existing.timestamp = Date.now();
                          saveGroupFiles();
                          msg.searchResult.push({
                            query: '[createFile] ' + rfc.filename,
                            results: [{ title: '已覆盖: ' + rfc.filename + ' (' + (existing.size/1024).toFixed(1) + 'KB)', url: '', content: (rfc.content || '').substring(0, 500) }],
                            answer: null
                          });
                        } else {
                          const newFile = {
                            filename: rfc.filename,
                            content: rfc.content || '',
                            size: new Blob([rfc.content || '']).size,
                            timestamp: Date.now(),
                            visible: true
                          };
                          groupFiles[groupId].push(newFile);
                          saveGroupFiles();
                          msg.searchResult.push({
                            query: '[createFile] ' + rfc.filename,
                            results: [{ title: '已创建: ' + rfc.filename + ' (' + (newFile.size/1024).toFixed(1) + 'KB)', url: '', content: (rfc.content || '').substring(0, 500) }],
                            answer: null
                          });
                        }
                      }
                    }
                  }
                  if (msg.searchResult.some(r => !r.error)) {
                    hadSearchCommands = true;
                  }
                }

                saveMessage(groupId, msg);

                agentHadOutput = true;
                batchHadOutput = true;
                scheduler.incrementMessageCount();

                if (parsed.commandBlock) {
                  handleCommand(parsed.commandBlock, groupId, agentId);
                }

                finalizeMessageBubble(msgElement, parsed, msg);
              },
              (error) => {
                showErrorMessage(msgElement, error.message);
              },
              roundAbortCtrl.signal
            );

            if (roundAbortCtrl.signal.aborted) {
              if (msgElement && msgElement.parentNode) msgElement.remove();
              break;
            }

            // [v5] 循环控制：如果本轮没有发出搜索命令，Agent完成本轮发言
            if (!hadSearchCommands) break;
            if (roundAbortCtrl.signal.aborted) break;

            DebugLogger.info('chat', `${agent.name} 搜索完成，等待结果注入后重新调用 (第${searchRound+1}轮)`);

          } catch (error) {
            const errorMsg = {
              id: generateUUID(),
              groupId,
              roundIndex: getNextRoundIndex(groupId),
              senderType: 'system',
              senderId: null,
              senderName: '系统',
              content: `[错误] ${agent.name} 调用失败: ${error.message}`,
              cleanContent: `[错误] ${agent.name} 调用失败: ${error.message}`,
              thinkingContent: null,
              commandBlock: null,
              commandResult: null,
              quotedMessageId: null,
              mentions: [],
              timestamp: Date.now()
            };
            saveMessage(groupId, errorMsg);
            scheduler.incrementMessageCount();
            DebugLogger.error(`agent:${agent.name}`, `调用失败: ${error.message}`);
            break; // 出错时跳出循环，不再重试
          }
        }
      };
    });

    // 并发执行这一批
    const preBatchMsgCount = scheduler.messageCount;
    await concurrency.executeAll(tasks);
    // ← 循环回到顶部，重新 pickNextBatch（@优先级已内化在评分中）

    // [v4] 冷却死锁防护：确保批次推进量足够解除冷却期
    const actualAdvance = scheduler.messageCount - preBatchMsgCount;
    if (actualAdvance < MIN_COOLDOWN_ADVANCE) {
      scheduler.messageCount = preBatchMsgCount + MIN_COOLDOWN_ADVANCE;
      DebugLogger.info('chat', `群 ${group.name}: 批次推进不足(${actualAdvance}<${MIN_COOLDOWN_ADVANCE})，强制推进messageCount至${scheduler.messageCount}以防冷却死锁`);
    }

    // [v4] 停滞检测：连续多轮无有效输出则自动终止（替代硬上限）
    if (!batchHadOutput) {
      consecutiveEmptyBatches++;
      if (consecutiveEmptyBatches >= MAX_CONSECUTIVE_EMPTY_BATCHES) {
        DebugLogger.info('chat', `群 ${group.name}: 连续${MAX_CONSECUTIVE_EMPTY_BATCHES}轮无有效输出，自动终止`);
        addSystemMessage(groupId, '[系统] ⏹ 讨论已自然收敛（多轮无有效回应）');
        break;
      }
    } else {
      consecutiveEmptyBatches = 0;
    }
  }

  // 清理 AbortController
  groupAbortControllers.delete(groupId);
  
  // 最终刷新UI
  renderChatMessages();
  renderGroupList();
}

function extractMentionsFromContent(content, group) {
  if (!content || !group) return [];
  
  const mentionRegex = /@([^\s,，。！？、；：""''\]\)】》\n!?,.;:'")\]]+)/g;
  const mentionedNames = [];
  let match;
  while ((match = mentionRegex.exec(content)) !== null) {
    mentionedNames.push(match[1]);
  }
  
  return mentionedNames.map(name => {
    const member = group.members.find(m => {
      const agent = getAgentFriend(m.agentId);
      return agent && agent.name === name;
    });
    return member ? member.agentId : null;
  }).filter(Boolean);
}

// ===== 导入导出系统 =====
function exportChatHistory(groupId) {
  const group = getGroup(groupId);
  if (!group) return;
  
  const messages = getMessages(groupId);
  
  const exportData = {
    version: '1.0',
    exportedAt: new Date().toISOString(),
    group: {
      name: group.name,
      topic: group.topic,
      settings: group.settings
    },
    members: group.members.map(m => ({

function importChatHistory(file) {

        }

          topic: data.group.topic || '',
          createdAt: Date.now(),
          members: [],
          settings: data.group.settings || {
            concurrencyLimit: 3,
            globalBreakArmor: true,
            hostContextMultiplier: 2,
            maxHistoryRounds: 15
          },
          summaries: data.summaries || []
        };
        
        saveGroup(group);
        
        const messages = data.messages.map((m, idx) => ({
          id: generateUUID(),
          groupId: newGroupId,
          roundIndex: idx,
          senderType: m.senderType || 'agent',
          senderId: null,
          senderName: m.senderName || '未知',
          content: m.content || '',
          cleanContent: m.content || '',
          thinkingContent: m.thinkingContent || null,
          commandBlock: m.commandBlock || null,
          commandResult: m.commandResult || null,
          quotedMessageId: null,
          mentions: [],
          timestamp: m.timestamp ? new Date(m.timestamp).getTime() : Date.now()
        }));
        saveMessages(newGroupId, messages);

        resolve(newGroupId);

      }
    };

    reader.readAsText(file);
  });
}
