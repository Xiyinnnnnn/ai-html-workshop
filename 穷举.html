  <button class="debug-clear-btn" style="
    background:var(--panel);border:1px solid var(--border);color:var(--text-weak);
    padding:2px 8px;font-size:10px;cursor:pointer;border-radius:2px;font-family:inherit;
  ">清空</button>`;
  
  const linesContainer = document.getElementById('debugLogLines');
  let searchText = '';
  
  function refreshDebug() {
    let entries;
    if (activeFilter === 'ERR') {
      entries = logger.entries.filter(e => ['PARSE', 'RETRY', 'THROTTLE'].includes(e.category));
      if (searchText) { const q = searchText.toLowerCase(); entries = entries.filter(e => e.message.toLowerCase().includes(q)); }
    } else {
      entries = logger.filter({ category: activeFilter === 'ALL' ? null : activeFilter, search: searchText || null });
    }
    // Show last 300
    const visible = entries.slice(-300);
    linesContainer.innerHTML = visible.map(e => {
      const elapsed = formatElapsed(e.elapsed);
      const cat = e.category.padEnd(6);
      const lvl = e.level === 'ERROR' ? 'ERR' : e.level === 'WARN' ? 'WRN' : 'INF';
      const agent = e.agentId !== null ? `A#${String(e.agentId).padStart(4,'0')}` : 'SYS   ';
      const colorMap = { API: '#4488ff', PARSE: '#44ff44', RETRY: '#ff8844', STRUCT: '#44ff44', CLUSTER: '#aa66ff', ATTACK: '#ff8844', PROBE: '#aaaaaa', SYS: '#555555', CACHE: '#44ff44', THROTTLE: '#ff4444' };
      const color = e.level === 'ERROR' ? '#ff4444' : e.level === 'WARN' ? '#ff8844' : (colorMap[e.category] || '#999');
      const bg = e.level === 'ERROR' ? 'rgba(255,68,68,0.08)' : e.level === 'WARN' ? 'rgba(255,136,68,0.05)' : 'transparent';
      return `<div class="debug-log-line" style="color:${color};background:${bg};" title="${escHtml(JSON.stringify(e.detail || {}, null, 2))}">${elapsed}  ${cat} ${lvl}  ${agent} ${escHtml(e.message)}</div>`;
    }).join('');
    if (entries.length > 300) {
      linesContainer.innerHTML = `<div style="color:#555;font-size:10px;padding:2px 8px;">... 前 ${entries.length - 300} 条省略（仅显示最后300条）</div>` + linesContainer.innerHTML;
    }
    toolbar.querySelector('.debug-stats').textContent = `共 ${entries.length} 条`;
    linesContainer.scrollTop = linesContainer.scrollHeight;
  }
  
  logger.onUpdate(() => refreshDebug());
  
  toolbar.querySelectorAll('.debug-filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.dataset.cat;
      toolbar.querySelectorAll('.debug-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      refreshDebug();
    });
  });
  
  toolbar.querySelector('.debug-search-input').addEventListener('input', (e) => {
    searchText = e.target.value;
    refreshDebug();
  });
  
  toolbar.querySelector('.debug-export-btn').addEventListener('click', () => {
    const blob = new Blob([logger.export()], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `debug-log-${STATE.sessionId || Date.now()}.json`; a.click();
  });
  
  toolbar.querySelector('.debug-clear-btn').addEventListener('click', () => {
    logger.entries = [];
    refreshDebug();
  });
  
  refreshDebug();
}

function formatElapsed(ms) {
  const min = Math.floor(ms / 60000);
  const sec = Math.floor((ms % 60000) / 1000);
  const msr = Math.floor(ms % 1000);
  return `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}.${String(msr).padStart(3,'0')}`;
}

document.getElementById('debugToggleBtn').addEventListener('click', () => {
  STATE.debugVisible = !STATE.debugVisible;
  const panel = document.getElementById('debugPanel');
  if (STATE.debugVisible) {
    panel.classList.remove('hidden');
  } else {
    panel.classList.add('hidden');
  }
});

// ─── EVENT HANDLERS ──────────────────────────────────────────
document.getElementById('levelSlider').addEventListener('input', function() {
  STATE.currentLevel = parseInt(this.value);
  updateLevelInfo();
});

document.getElementById('runBtn').addEventListener('click', runInference);
document.getElementById('probeBtn').addEventListener('click', runProbe);
document.getElementById('interruptBtn').addEventListener('click', toggleInterrupt);

document.getElementById('upgradeBtn').addEventListener('click', () => {
  if (STATE.currentLevel < 9) {
    STATE.currentLevel++;
    document.getElementById('levelSlider').value = STATE.currentLevel;
    updateLevelInfo();
    runInference();
  }
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const report = {
    timestamp: new Date().toISOString(),
    level: STATE.currentLevel,
    sessionId: STATE.sessionId,
    clusters: STATE.clusters.map(c => ({
      label: c.label,
      size: c.size,
      pct: c.pct,
      angleDiversity: c.angleDiversity,
      structureIntegrity: c.structureIntegrity,
      topPremises: extractPremiseList(c).slice(0, 5).map(p => p.text)
    })),
    forkInfo: STATE.forkInfo,
    debugStats: logger.stats()
  };
  const blob = new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `inference-report-${STATE.sessionId || Date.now()}.json`;
  a.click();
  logger.sys('报告已导出');
});

// Mobile tab switching
document.querySelectorAll('.tab-bar button').forEach(btn => {
  btn.addEventListener('click', function() {
    const tab = this.dataset.tab;
    document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    const sidebar = document.getElementById('sidebar');
    const mainArea = document.getElementById('mainArea');
    if (tab === 'input') {
      sidebar.classList.remove('mobile-hidden');
      mainArea.classList.add('mobile-hidden');
    } else {
      sidebar.classList.add('mobile-hidden');
      mainArea.classList.remove('mobile-hidden');
    }
  });
});
// Before unload - save snapshot
window.addEventListener('beforeunload', () => {
  if (STATE.running && STATE.sessionId) {
    saveProgressSnapshot(STATE.completedAgents, STATE.totalAgents);
  }
});

// ─── INIT ─────────────────────────────────────────────────────
async function init() {
  // Load DB
  try {
    await DB.open();
    const savedSettings = await DB.getSettings();
    if (savedSettings) {
      STATE.settings = { ...STATE.settings, ...savedSettings };
      document.getElementById('baseUrlInput').value = STATE.settings.baseUrl;
      document.getElementById('apiKeyInput').value = STATE.settings.apiKey;
      document.getElementById('modelSelect').value = STATE.settings.model;
      document.getElementById('customModelInput').value = STATE.settings.customModel || '';
      document.getElementById('reasoningSelect').value = STATE.settings.reasoningEffort;
      document.getElementById('concurrencySelect').value = STATE.settings.concurrencyMode;
      document.getElementById('maxTokensInput').value = STATE.settings.maxTokens || 382000;
      if (STATE.settings.model === '__custom__') {
        document.getElementById('customModelInput').classList.remove('hidden');
      }
    }
  } catch (e) {
    console.warn('IndexedDB init failed:', e);
  }

  // Render UI
  renderDimensions();
  renderConstraints();
  updateLevelInfo();
  initDebugPanel();

  // Check for interrupted session
  if (DB._db) {
    const snap = await DB.getSnapshot(STATE.sessionId || '');
    if (snap && snap.status === 'paused') {
      const resume = confirm('发现中断的会话。是否继续？');
      if (resume) {
        STATE.sessionId = snap.sessionId;
        STATE.currentLevel = snap.level;
        STATE.completedAgents = snap.completed;
        document.getElementById('levelSlider').value = STATE.currentLevel;
        updateLevelInfo();
        setStatus('正在恢复中断的会话...');
        runInference();
      }
    }
  }

  // Load session history
  if (DB._db) {
    const sessions = await DB.listSessions();
    const select = document.getElementById('sessionHistorySelect');
    const deleteBtn = document.getElementById('deleteSessionBtn');
    select.innerHTML = '<option value="">-- 选择历史会话 (' + sessions.length + '条) --</option>';
    for (const s of sessions) {
      const date = new Date(s.timestamp).toLocaleString('zh-CN');
      const sit = (s.situation || '').substring(0, 30);
      const label = escHtml('L' + s.level + ' | ' + sit + (s.situation && s.situation.length > 30 ? '...' : '') + ' | ' + date + ' | ' + (s.clusters ? s.clusters.length : 0) + '簇');
      select.innerHTML += '<option value="' + s.id + '">' + label + '</option>';
    }
    select.addEventListener('change', () => {
      const sid = select.value;
      deleteBtn.disabled = !sid;
      if (!sid) return;
      const s = sessions.find(x => x.id === sid);
      if (!s) return;
      // Restore state
      STATE.sessionId = s.id;
      STATE.currentLevel = s.level;
      hardConstraints = s.constraints || [];
      document.getElementById('situationInput').value = s.situation || '';
      document.getElementById('levelSlider').value = s.level;
      STATE.clusters = s.clusters || [];
      STATE.forkInfo = s.forkInfo || null;
      STATE._attackResults = s.attackResults || null;
      updateLevelInfo();
      renderConstraints();
      // Render results
      if (s.clusters && s.clusters.length > 0) {
        renderResults(s.clusters, s.forkInfo, s.attackResults, s.counts);
      } else {
        document.getElementById('resultContent').classList.add('hidden');
        document.getElementById('resultEmpty').classList.remove('hidden');
      }
      setStatus('已加载历史会话 L' + s.level);
    });
    deleteBtn.addEventListener('click', async () => {
      const sid = select.value;
      if (!sid) return;
      const s = sessions.find(x => x.id === sid);
      if (!s) return;
      const sit = (s.situation || '').substring(0, 40);
      if (!confirm('删除会话：L' + s.level + ' | ' + sit + (s.situation && s.situation.length > 40 ? '...' : '') + '？')) return;
      await DB.deleteSession(sid);
      const idx = sessions.findIndex(x => x.id === sid);
      if (idx >= 0) sessions.splice(idx, 1);
      select.value = '';
      deleteBtn.disabled = true;
      // Rebuild options
      select.innerHTML = '<option value="">-- 选择历史会话 (' + sessions.length + '条) --</option>';
      for (const ss of sessions) {
        const date = new Date(ss.timestamp).toLocaleString('zh-CN');
        const sit2 = (ss.situation || '').substring(0, 30);
        const label = escHtml('L' + ss.level + ' | ' + sit2 + (ss.situation && ss.situation.length > 30 ? '...' : '') + ' | ' + date + ' | ' + (ss.clusters ? ss.clusters.length : 0) + '簇');
        select.innerHTML += '<option value="' + ss.id + '">' + label + '</option>';
      }
      // If current session was deleted, clear main area
      if (STATE.sessionId === sid) {
        STATE.sessionId = null;
        STATE.clusters = [];
        STATE.forkInfo = null;
        STATE._attackResults = null;
        document.getElementById('resultContent').classList.add('hidden');
        document.getElementById('resultEmpty').classList.remove('hidden');
        setStatus('就绪');
      }
      logger.sys('已删除会话 ' + sid);
    });
  }

  // Mobile/Tablet: default to input tab
  if (window.innerWidth <= 1279) {
    const sidebar = document.getElementById('sidebar');
    const mainArea = document.getElementById('mainArea');
    sidebar.classList.remove('mobile-hidden');
    mainArea.classList.add('mobile-hidden');
    const inputTab = document.querySelector('.tab-bar button[data-tab="input"]');
    const resultTab = document.querySelector('.tab-bar button[data-tab="result"]');
    if (inputTab) inputTab.classList.add('active');
    if (resultTab) resultTab.classList.remove('active');
  }

  setStatus('就绪');
  logger.sys('系统初始化完成');
}


init();
</script>
</body>
