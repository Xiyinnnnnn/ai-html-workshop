<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovelCraft vFINAL+</title>
<script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
<style>
:root {
    --bg-primary: #ffffff; --bg-secondary: #f5f5f5; --bg-tertiary: #e8e8e8;
    --bg-hover: #e0e0e0; --bg-overlay: rgba(255,255,255,0.85);
    --text-primary: #1a1a1a; --text-secondary: #555555; --text-muted: #888888;
    --border-default: #cccccc; --border-light: #e0e0e0; --border-accent: #000000;
    --accent: #000000; --accent-strong: #333333;
    --bubble-user: #eeeeee; --bubble-editor: #ffffff; --bubble-system: #fafafa; --bubble-warn: #fff8e1;
    --success: #2e7d32; --danger: #c62828; --warning: #f9a825;
    --header-height: 44px; --sidebar-width: 220px; --workflow-height: 36px;
    --radius-sm: 6px; --radius-md: 12px; --radius-lg: 16px;
}
@media (prefers-color-scheme: dark) {
    :root {
        --bg-primary: #1a1a1a; --bg-secondary: #252525; --bg-tertiary: #333333;
        --bg-hover: #3a3a3a; --bg-overlay: rgba(0,0,0,0.75);
        --text-primary: #e0e0e0; --text-secondary: #aaaaaa; --text-muted: #777777;
        --border-default: #444444; --border-light: #333333; --border-accent: #ffffff;
        --accent: #ffffff; --accent-strong: #cccccc;
        --bubble-user: #333333; --bubble-editor: #2a2a2a; --bubble-system: #222222; --bubble-warn: #3e3520;
        --success: #66bb6a; --danger: #ef5350; --warning: #ffc107;
    }
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',system-ui,sans-serif;font-size:14px;line-height:1.6;color:var(--text-primary);background:var(--bg-primary);-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden}
header{display:flex;align-items:center;gap:8px;padding:4px 12px;height:var(--header-height);background:var(--bg-secondary);border-bottom:1px solid var(--border-default);flex-shrink:0;font-size:13px}
header .logo{font-weight:700;font-size:15px;white-space:nowrap;color:var(--accent)}
header select,header button{font-size:12px;padding:3px 8px;border:1px solid var(--border-default);border-radius:var(--radius-sm);background:var(--bg-primary);color:var(--text-primary);cursor:pointer}
header button:hover{background:var(--bg-hover)}
header .phase-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--bg-tertiary);color:var(--text-secondary);white-space:nowrap}
header .api-status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-left:2px}
header .api-status-dot.ok{background:var(--success)}header .api-status-dot.missing{background:var(--danger)}
.main-container{display:flex;flex:1;height:calc(100vh - var(--header-height) - var(--workflow-height));overflow:hidden}
.workflow-bar{display:flex;align-items:center;gap:0;padding:4px 16px;background:var(--bg-secondary);border-bottom:1px solid var(--border-default);overflow-x:auto;overflow-y:hidden;flex-shrink:0;height:var(--workflow-height);scroll-behavior:smooth}
.workflow-step{display:flex;align-items:center;gap:4px;padding:4px 10px;font-size:11px;white-space:nowrap;color:var(--text-muted);cursor:default;transition:color 0.2s}
.workflow-step::after{content:'';display:inline-block;width:16px;height:1px;background:var(--border-default);margin-left:8px;flex-shrink:0}
.workflow-step:last-child::after{display:none}
.workflow-step.done{color:var(--success)}.workflow-step.active{color:var(--accent);font-weight:700;font-size:12px}
.workflow-step.active::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.sidebar{width:var(--sidebar-width);background:var(--bg-secondary);border-right:1px solid var(--border-default);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.tree-section{padding:4px 0}.tree-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);padding:8px 12px 4px}
.tree-item{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;cursor:pointer;font-size:13px;color:var(--text-secondary);transition:background 0.1s;border-left:2px solid transparent}
.tree-item:hover{background:var(--bg-hover);color:var(--text-primary)}
.tree-item.active{background:var(--bg-tertiary);color:var(--accent);font-weight:600;border-left-color:var(--accent)}
.tree-item .badge{font-size:10px;background:var(--bg-tertiary);color:var(--text-muted);padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.chat-container{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat-msg{display:flex;flex-direction:column;max-width:70%;animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.chat-msg.user{align-self:flex-end}.chat-msg.assistant{align-self:flex-start}.chat-msg.system{align-self:center;max-width:85%}
.msg-bubble{padding:10px 14px;border-radius:var(--radius-md);line-height:1.5;word-break:break-word}
.chat-msg.user .msg-bubble{background:var(--bubble-user);border-radius:var(--radius-md) var(--radius-md) 0 var(--radius-md)}
.chat-msg.assistant .msg-bubble{background:var(--bubble-editor);border:1px solid var(--border-default);border-radius:var(--radius-md) var(--radius-md) var(--radius-md) 0}
.chat-msg.system .msg-bubble{background:var(--bubble-system);border:1px dashed var(--border-light);font-size:12px;color:var(--text-secondary);text-align:center}
.chat-msg.warn .msg-bubble{background:var(--bubble-warn);border:1px solid var(--warning);font-size:12px}
.msg-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:2px;padding-left:2px}
.chat-msg.assistant .msg-label{color:var(--accent)}
.chapter-preview{border-left:3px solid var(--accent);background:var(--bg-secondary);padding:12px 16px;margin:8px 0;border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.chapter-preview .cp-title{font-weight:700;font-size:15px;margin-bottom:8px;color:var(--accent)}
.chapter-preview .cp-content{max-height:300px;overflow-y:auto;font-family:'PingFang SC','Microsoft YaHei',serif;font-size:14px;line-height:1.8;color:var(--text-primary);white-space:pre-wrap}
.chapter-preview .cp-stats{font-size:11px;color:var(--text-muted);margin-top:8px;text-align:right}
.input-area{display:flex;gap:8px;padding:12px;background:var(--bg-secondary);border-top:1px solid var(--border-default)}
.input-area textarea{flex:1;padding:10px 14px;border:1px solid var(--border-default);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-primary);font-family:inherit;font-size:14px;line-height:1.5;resize:none;min-height:40px;max-height:150px;outline:none;transition:border-color 0.2s}
.input-area textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,0,0,0.1)}
.input-area textarea::placeholder{color:var(--text-muted);font-style:italic}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:6px 14px;border:1px solid var(--border-default);border-radius:var(--radius-sm);background:var(--bg-primary);color:var(--text-primary);font-size:13px;cursor:pointer;transition:all 0.15s ease;white-space:nowrap;user-select:none}
.btn:hover{background:var(--bg-hover)}.btn:active{transform:scale(0.97)}.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-primary{background:var(--accent);color:var(--bg-primary);border-color:var(--accent)}.btn-primary:hover{opacity:0.85}
.btn-danger{border-color:var(--danger);color:var(--danger)}.btn-danger:hover{background:var(--danger);color:#fff}
.btn-sm{padding:3px 8px;font-size:11px}.btn-lg{padding:10px 20px;font-size:15px}
.tab-content{flex:1;overflow-y:auto;padding:16px;display:none}.tab-content.active{display:block}
.dashboard{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px}
.dash-card{background:var(--bg-secondary);border:1px solid var(--border-default);border-radius:var(--radius-sm);padding:14px;text-align:center}
.dash-card .card-value{font-size:28px;font-weight:700;color:var(--accent)}
.dash-card .card-label{font-size:11px;color:var(--text-muted);margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}
.progress-bar-container{grid-column:1/-1}.progress-bar{height:8px;background:var(--bg-tertiary);border-radius:4px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width 0.5s ease}
.loading-overlay{position:fixed;inset:0;background:var(--bg-overlay);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(2px)}
.loading-box{background:var(--bg-primary);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:24px 32px;display:flex;flex-direction:column;align-items:center;gap:16px;box-shadow:0 8px 32px rgba(0,0,0,0.12)}
.spinner{width:32px;height:32px;border:3px solid var(--border-light);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--text-secondary)}
.debug-panel{padding:12px;height:100%;display:flex;flex-direction:column}
.debug-filters{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.debug-filter-btn{padding:3px 10px;border:1px solid var(--border-default);border-radius:12px;font-size:11px;cursor:pointer;background:var(--bg-primary);color:var(--text-secondary)}
.debug-filter-btn.active{background:var(--accent);color:var(--bg-primary)}
.debug-log-list{flex:1;overflow-y:auto;font-family:monospace;font-size:11px;line-height:1.5}
.debug-log-entry{padding:3px 6px;border-bottom:1px solid var(--border-light);display:flex;gap:8px}
.debug-log-entry.INFO{color:var(--text-secondary)}.debug-log-entry.WARN{color:var(--warning)}
.debug-log-entry.ERROR{color:var(--danger)}.debug-log-entry.API{color:#1565c0}.debug-log-entry.CMD{color:#6a1b9a}
.checkpoint-list{display:flex;flex-direction:column;gap:8px;padding:12px}
.checkpoint-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg-secondary);border:1px solid var(--border-default);border-radius:var(--radius-sm)}
.checkpoint-info{display:flex;flex-direction:column;gap:2px}
.checkpoint-id{font-size:12px;font-weight:600}.checkpoint-detail{font-size:11px;color:var(--text-muted)}
.section-card{background:var(--bg-secondary);border:1px solid var(--border-default);border-radius:var(--radius-sm);padding:12px;margin-bottom:12px}
.section-card h3{font-size:14px;margin-bottom:8px;color:var(--accent)}
.chapter-content{font-family:'PingFang SC','Microsoft YaHei','Noto Serif SC',serif;font-size:15px;line-height:1.8;text-align:justify;white-space:pre-wrap}
.modal-overlay{position:fixed;inset:0;background:var(--bg-overlay);display:flex;align-items:center;justify-content:center;z-index:10000;backdrop-filter:blur(2px)}
.modal-box{background:var(--bg-primary);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:24px;width:420px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,0.15);display:flex;flex-direction:column;gap:16px}
.modal-box h3{font-size:16px;color:var(--accent);margin:0}
.modal-box label{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px}
.modal-box input[type="password"],.modal-box input[type="text"]{width:100%;padding:10px 12px;border:1px solid var(--border-default);border-radius:var(--radius-sm);background:var(--bg-secondary);color:var(--text-primary);font-family:monospace;font-size:13px;outline:none}
.modal-box input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,0,0,0.08)}
.modal-box .api-status{display:flex;align-items:center;gap:8px;font-size:12px}
.modal-box .api-status .status-icon{width:10px;height:10px;border-radius:50%}
.modal-box .api-status .status-icon.valid{background:var(--success)}
.modal-box .api-status .status-icon.invalid{background:var(--danger)}
.modal-box .api-hint{font-size:11px;color:var(--text-muted);line-height:1.5}
.modal-box .api-hint a{color:var(--accent);text-decoration:underline}
.modal-box .btn-row{display:flex;gap:8px;justify-content:flex-end}
/* 调试日志悬浮面板（移动端友好） */
.debug-overlay{position:fixed;inset:0;z-index:9998;display:none;flex-direction:column;background:var(--bg-overlay);backdrop-filter:blur(2px)}
.debug-overlay.open{display:flex}
.debug-overlay .debug-panel-mobile{flex:1;margin:40px 8px 80px 8px;background:var(--bg-primary);border:1px solid var(--border-default);border-radius:var(--radius-lg);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.2)}
.debug-overlay .debug-panel-mobile .debug-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border-default);font-weight:600;font-size:14px;flex-shrink:0}
.debug-overlay .debug-panel-mobile .debug-body{flex:1;overflow-y:auto;padding:8px}
@media(max-width:768px){
    body{font-size:13px}
    header{height:auto;min-height:36px;padding:4px 6px;gap:2px;flex-wrap:wrap;font-size:11px}
    header .logo{font-size:12px;margin-right:4px}
    header select{min-width:100px!important;max-width:130px;font-size:10px;padding:2px 4px}
    header button{font-size:10px;padding:2px 5px}
    header .phase-badge{font-size:9px;padding:1px 6px;order:10}
    /* 小屏隐藏次要按钮，显示"更多"菜单按钮 */
    #btnDeleteProject,#btnCreateCheckpoint,#btnExportTXT,#btnExportJSON,#btnImport{display:none}
    #btnMoreMenu{display:inline-flex!important}
    .header-more-menu{display:none;position:fixed;top:38px;right:6px;z-index:10001;background:var(--bg-primary);border:1px solid var(--border-default);border-radius:var(--radius-sm);box-shadow:0 4px 16px rgba(0,0,0,0.2);flex-direction:column;min-width:140px;padding:4px 0}
    .header-more-menu.open{display:flex}
    .header-more-menu button{display:block;width:100%;text-align:left;padding:8px 14px;border:none;border-radius:0;font-size:12px;background:transparent;color:var(--text-primary)}
    .header-more-menu button:hover{background:var(--bg-hover)}
    .workflow-bar{height:28px;padding:2px 6px}.workflow-step{font-size:8px;padding:1px 4px}
    .sidebar{width:100%;max-height:96px;flex-direction:row;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;border-right:none;border-bottom:1px solid var(--border-default);-webkit-overflow-scrolling:touch}
    .tree-section{display:flex;flex-wrap:nowrap;gap:0;padding:2px 4px}.tree-section-title{display:none}
    .tree-item{font-size:10px;padding:6px 10px;border-left:none;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
    .tree-item.active{border-left-color:transparent;border-bottom-color:var(--accent)}
    .tree-item .badge{font-size:9px;padding:0 5px;min-width:14px}
    .main-container{flex-direction:column}
    .chat-msg{max-width:92%}.chat-msg .msg-bubble{font-size:13px;padding:8px 10px}.msg-label{font-size:9px}
    .input-area{padding:6px 8px;gap:6px}.input-area textarea{font-size:14px;min-height:36px;padding:8px 10px}
    #btnSend{padding:6px 12px;font-size:14px}
    .dashboard{grid-template-columns:repeat(2,1fr);gap:6px;padding:6px}.dash-card{padding:8px}.dash-card .card-value{font-size:20px}
    .chapter-preview .cp-content{max-height:200px;font-size:13px}
    .loading-box{padding:16px 20px}.tab-content{padding:6px}
    .checkpoint-item{flex-direction:column;gap:8px;align-items:flex-start}
    .modal-box{width:95vw;padding:16px}
    .debug-panel{padding:8px}.debug-filters{gap:4px}.debug-filter-btn{font-size:10px;padding:2px 6px}
    .debug-log-list{font-size:10px}
}
</style>
</head>
<body>
<header>
    <span class="logo">NovelCraft</span>
    <select id="projectSelect" style="min-width:180px"><option value="">-- 选择项目 --</option></select>
    <button id="btnNewProject" title="新建项目">+新</button>
    <button id="btnDeleteProject" title="删除项目" class="btn-danger btn-sm">删</button>
    <span style="flex:1"></span>
    <span id="apiStatusDot" class="api-status-dot missing" title="API Key状态"></span>
    <button id="btnApiSettings" class="btn-sm" title="API设置"> Key</button>
    <span id="phaseBadge" class="phase-badge">IDLE</span>
    <button id="btnDebugToggle" class="btn-sm" title="调试日志" style="background:var(--bg-tertiary);color:var(--accent);font-weight:bold;">DBG</button>
    <button id="btnCreateCheckpoint" class="btn-sm" title="创建检查点">存点</button>
    <button id="btnExportTXT" class="btn-sm">导出TXT</button>
    <button id="btnExportJSON" class="btn-sm">导出JSON</button>
    <input type="file" id="importFileInput" accept=".json" style="display:none">
    <button id="btnImport" class="btn-sm">导入</button>
    <!-- 移动端"更多"菜单 -->
    <button id="btnMoreMenu" class="btn-sm" title="更多操作" style="display:none">☰</button>
    <div class="header-more-menu" id="headerMoreMenu">
        <button onclick="document.getElementById('btnDeleteProject').click()">🗑 删除项目</button>
        <button onclick="document.getElementById('btnCreateCheckpoint').click()">💾 创建检查点</button>
        <button onclick="document.getElementById('btnExportTXT').click()">📄 导出TXT</button>
        <button onclick="document.getElementById('btnExportJSON').click()">📦 导出JSON</button>
        <button onclick="document.getElementById('importFileInput').click()">📥 导入项目</button>
    </div>
</header>
<div class="workflow-bar" id="workflowBar">
    <span class="workflow-step" data-phase="IDLE">种子</span>
    <span class="workflow-step" data-phase="REQUIREMENT_ALIGNMENT">需求对齐</span>
    <span class="workflow-step" data-phase="WORLDVIEW_CREATION">世界观</span>
    <span class="workflow-step" data-phase="CHARACTER_CREATION">角色</span>
    <span class="workflow-step" data-phase="OUTLINE_CREATION">大纲</span>
    <span class="workflow-step" data-phase="OUTLINE_USER_REVIEW">大纲审阅</span>
    <span class="workflow-step" data-phase="CHAPTER_WRITING">写作</span>
    <span class="workflow-step" data-phase="CHAPTER_REVIEW">评审</span>
    <span class="workflow-step" data-phase="FINISHED">完成</span>
</div>
<div class="main-container">
<div class="sidebar" id="sidebar">
    <div class="tree-section">
        <div class="tree-section-title">项目</div>
        <div class="tree-item active" data-tab="chat"><span>对话</span></div>
        <div class="tree-item" data-tab="dashboard"><span>仪表盘</span><span class="badge" id="badgeDashboard">-</span></div>
        <div class="tree-item" data-tab="worldview"><span>世界观</span></div>
        <div class="tree-item" data-tab="characters"><span>角色</span><span class="badge" id="badgeCharacters">0</span></div>
        <div class="tree-item" data-tab="outline"><span>大纲</span></div>
        <div class="tree-item" data-tab="chapters"><span>章节</span><span class="badge" id="badgeChapters">0</span></div>
        <div class="tree-item" data-tab="export"><span>导出</span></div>
        <div class="tree-item" data-tab="checkpoints"><span>检查点</span></div>
        <div class="tree-item" data-tab="debug"><span>调试日志</span></div>
    </div>
</div>
<div class="chat-container" id="chatContainer">
    <div class="chat-messages" id="chatMessages"></div>
    <div class="input-area">
        <textarea id="userInput" placeholder="输入你的创作种子，开始一段故事..." rows="2"></textarea>
        <button class="btn btn-primary btn-lg" id="btnSend">发送</button>
    </div>
</div>
<div class="tab-content" id="tabDashboard"><div class="dashboard" id="dashboardContent"></div></div>
<div class="tab-content" id="tabWorldview"><div id="worldviewContent"></div></div>
<div class="tab-content" id="tabCharacters"><div id="charactersContent"></div></div>
<div class="tab-content" id="tabOutline"><div id="outlineContent"></div></div>
<div class="tab-content" id="tabChapters"><div id="chaptersContent"></div></div>
<div class="tab-content" id="tabExport"><div id="exportContent" style="padding:16px"></div></div>
<div class="tab-content" id="tabCheckpoints"><div class="checkpoint-list" id="checkpointList"></div></div>

async function importProject(f){try{if(f.size<=2)throw new Error('文件过小');if(f.size>100*1024*1024)throw new Error('文件超过100MB');const t=await f.text();let d;try{d=JSON.parse(t);}catch(e){throw new Error('JSON解析失败: '+e.message);}if(!d.state)throw new Error('缺少state字段');if(d.version&&d.version!=='vFINAL+')addDebugLog('WARN','导入版本不匹配: '+d.version);for(const r of['userProfile','characters','chapters','phase'])if(!(r in d.state))throw new Error('缺少必要字段: '+r);if(!Array.isArray(d.state.chapters))throw new Error('chapters必须是数组');for(const c of d.state.chapters)if(!c.chapterNumber&&c.chapterNumber!==0)throw new Error('章节缺少chapterNumber');const js=JSON.stringify(d.state);if(js.includes('__proto__')||js.includes('constructor')||js.includes('prototype'))throw new Error('检测到不安全的内容注入');const s=d.state;s.itemRegistry=s.itemRegistry||{};s.resourceState=s.resourceState||{};s.foreshadowingRegister=s.foreshadowingRegister||[];s.chapters=s.chapters.filter(c=>c!=null);s.pendingChapter=null;s.retryCounts=s.retryCounts||{};s.masterDerelictionCount=0;s.callLog=s.callLog||[];s.checkpoints=s.checkpoints||[];s.wordCheckMilestones=s.wordCheckMilestones||{'0.25':false,'0.5':false,'0.75':false};s.paused=false;s.awaitingUserInput=true;if(!CPid)await createProject(s.userProfile.core_theme||'导入项目',s.userProfile.seed||'');AppState=s;Msgs=[{role:'system',content:'[项目已导入成功。包含'+AppState.chapters.length+'章，'+getTotalWords()+'字。]',timestamp:Date.now(),source:'system'}];SubagentHistory=[];LpMsg=0;LpLog=0;DirtyFlags={state:true};for(const c of AppState.chapters)DirtyChapters[c.chapterNumber]=true;await persist();updateAll();replayAllMessages();addDebugLog('INFO','项目导入成功: '+AppState.chapters.length+'章');alert('导入成功！');}catch(e){addDebugLog('ERROR','导入失败: '+e.message);alert('导入失败: '+e.message);}}

function shouldCompress(){let t=0;for(const m of Msgs)t+=(m.content||'').length;return t>MAX_CONTEXT_CHARS;}
function compressMessages(){if(Msgs.length<=300)return;let si=-1;for(let i=0;i<Msgs.length;i++){if(Msgs[i].role==='system'){si=i;break;}}const kf=Msgs.length-300,p=[];if(si>=0&&si<kf)p.push(Msgs[si]);Msgs=[...p,{role:'system',content:'[早期对话已压缩。项目关键数据在state中完整保存。当前进度: '+AppState.chapters.length+'/'+getTotalOutlineNodes()+'章。]',timestamp:Date.now(),source:'system'},...Msgs.slice(kf)];LpMsg=0;markDirty('msgs');addDebugLog('INFO','消息已压缩，保留最近'+Msgs.length+'条');}
function buildSnapshot(){const tw=AppState.userProfile.target_word_count||50000,cw=getTotalWords(),tn=getTotalOutlineNodes(),dc=AppState.chapters.length,nn=getNextOutlineNode(),rn=tn-dc,rw=tw-cw,pc=rn>0?Math.round(rw/rn):2000;let cs='';for(const c of AppState.characters)cs+=c.name+' | '+(c.current_location||'未知')+' | '+(c.status||'未知')+' | 弧光:'+((c.arc_progress||0)*100).toFixed(0)+'%\n';const pl=AppState.foreshadowingRegister.filter(f=>!f.resolved).length,rs=AppState.foreshadowingRegister.filter(f=>f.resolved).length,ic=Object.keys(AppState.itemRegistry).length;let s='======== 项目快照 ========\n';s+='阶段: '+AppState.phase+'\n已完成章节: '+dc+'/'+tn+'\n总字数: '+cw+'/'+tw+' ('+(tw>0?(cw/tw*100).toFixed(1):0)+'%)\n';s+='────────────────────────\n角色状态:\n'+(cs||'  暂无角色\n');s+='────────────────────────\n伏笔状态: '+pl+'个未收 / '+rs+'个已收\n物品注册: '+ic+'件\n────────────────────────\n';if(nn)s+='下一大纲节点: '+nn.event_description+' (预估'+(nn.estimated_word_count||2000)+'字)\n';else if(dc>=tn&&tn>0)s+='大纲节点已全部完成\n';s+='剩余: '+rw+'字 / '+rn+'章\n建议: 每章约'+pc+'字\n========================';if(MILESTONE_CHAPTERS.includes(dc))s+='\n\n[里程碑提醒: 第'+dc+'章]\n建议调用A17(剧情诊断)或A20(项目审计)进行全局审视。';return s;}
function midCheck(){const tw=AppState.userProfile.target_word_count,cw=getTotalWords(),p=cw/tw,ms=[{ratio:0.25,key:'0.25',label:'25%'},{ratio:0.50,key:'0.5',label:'50%'},{ratio:0.75,key:'0.75',label:'75%'}];for(const m of ms){if(p>=m.ratio-0.05&&p<=m.ratio+0.10){if(!AppState.wordCheckMilestones[m.key]){AppState.wordCheckMilestones[m.key]=true;markDirty('state');const ew=tw*m.ratio,dev=((cw-ew)/ew)*100;if(Math.abs(dev)>20){Msgs.push({role:'system',content:'[字数检查 - '+m.label+'里程碑] 当前字数: '+cw+' | 预期: '+Math.round(ew)+' | 偏差: '+(dev>0?'+':'')+dev.toFixed(1)+'%\n偏差超过20%，请评估是否需要调整计划。',timestamp:Date.now(),source:'system'});addDebugLog('WARN','字数偏差超20%: '+dev.toFixed(1)+'%');}}}}}

function execSync(sp){if(!sp)return;if(sp.character_updates)for(const u of sp.character_updates){const c=AppState.characters.find(x=>x.character_id===u.character_id);if(!c){addDebugLog('WARN','A12 sync: character not found: '+u.character_id);continue;}if(u.field_updates)Object.assign(c,u.field_updates);if(u.relationship_updates)for(const ru of u.relationship_updates){const er=(c.relationships||[]).find(r=>r.with_character_id===ru.with_character_id);if(er)er.dynamics=ru.new_dynamics||er.dynamics;else{if(!c.relationships)c.relationships=[];c.relationships.push({with_character_id:ru.with_character_id,dynamics:ru.new_dynamics,event_trigger:ru.event_trigger});}}if(u.key_possessions_changes){if(u.key_possessions_changes.added)c.key_possessions=[...new Set([...(c.key_possessions||[]),...u.key_possessions_changes.added])];if(u.key_possessions_changes.removed)c.key_possessions=(c.key_possessions||[]).filter(x=>!u.key_possessions_changes.removed.includes(x));}}if(sp.new_characters)for(const nc of sp.new_characters){if(AppState.characters.find(x=>x.character_id===nc.character_id)){addDebugLog('WARN','A12 sync: duplicate character: '+nc.character_id);continue;}AppState.characters.push({character_id:nc.character_id,name:nc.name,role:nc.role,importance:'次要',status:'存活',current_location:'',emotional_state:'',physical_state:'',current_goal:'',arc_progress:0,key_possessions:[],relationships:[],secrets:[],personality:{traits:[],strengths:[],flaws:[],quirks:[],speech_style:''},motivation:{core_drive:'',short_term_goal:'',long_term_goal:'',internal_conflict:''},arc:{arc_type:'',starting_point:'',ending_point:'',key_turning_points:[]},abilities:{type:'',skills:[],limitations:'',growth_potential:''}});}if(sp.item_updates){const iu=sp.item_updates;if(iu.added)for(const i of iu.added)if(!AppState.itemRegistry[i.item_name])AppState.itemRegistry[i.item_name]={...i,quantity:i.quantity||1};if(iu.consumed)for(const i of iu.consumed)if(AppState.itemRegistry[i.item_name]){const it=AppState.itemRegistry[i.item_name];it.quantity=Math.max(0,(it.quantity||1)-(i.amount||1));if(it.quantity<=0)delete AppState.itemRegistry[i.item_name];}if(iu.transferred)for(const t of iu.transferred)if(AppState.itemRegistry[t.item_name])AppState.itemRegistry[t.item_name].owner_character_id=t.to_character_id;if(iu.quantity_changes)for(const qc of iu.quantity_changes)if(AppState.itemRegistry[qc.item_name])AppState.itemRegistry[qc.item_name].quantity=qc.new_quantity;}if(sp.outline_updates){if(sp.outline_updates.add_nodes)for(const an of sp.outline_updates.add_nodes){const a=AppState.outline.acts.find(x=>x.act_number===an.new_node.act_number);if(a)a.nodes.push(an.new_node);else addDebugLog('WARN','A12 sync: act not found: act_number='+(an.new_node.act_number||'?'));}if(sp.outline_updates.remove_nodes)for(const rn of sp.outline_updates.remove_nodes)for(const a of AppState.outline.acts)a.nodes=a.nodes.filter(n=>n.node_id!==rn);if(sp.outline_updates.update_nodes)for(const un of sp.outline_updates.update_nodes){let f=false;for(const a of AppState.outline.acts){const n=a.nodes.find(x=>x.node_id===un.node_id);if(n){Object.assign(n,un.field_updates||{});f=true;break;}}if(!f)addDebugLog('WARN','A12 sync: node not found: '+un.node_id);}}if(sp.resource_updates)for(const ru of sp.resource_updates){if(!AppState.resourceState[ru.character_id])AppState.resourceState[ru.character_id]={};AppState.resourceState[ru.character_id][ru.resource_type]=ru.new_value;}if(sp.worldview_updates){if(sp.worldview_updates.new_rules)for(const nr of sp.worldview_updates.new_rules){const ex=(AppState.worldview.system.rules||[]).find(r=>r.rule_id===nr.rule_id||r.rule===nr.rule);if(!ex)AppState.worldview.system.rules.push(nr);}if(sp.worldview_updates.new_locations)for(const nl of sp.worldview_updates.new_locations){const ex=(AppState.worldview.geography.key_locations||[]).find(l=>l.location_id===nl.location_id||l.name===nl.name);if(!ex)AppState.worldview.geography.key_locations.push(nl);}}if(sp.foreshadowing_updates){if(sp.foreshadowing_updates.plant)for(const fp of sp.foreshadowing_updates.plant){const ex=AppState.foreshadowingRegister.find(f=>f.description===fp.description);if(!ex)AppState.foreshadowingRegister.push({...fp,resolved:false,resolved_in_chapter:null});}if(sp.foreshadowing_updates.resolve)for(const fr of sp.foreshadowing_updates.resolve){const f=AppState.foreshadowingRegister.find(x=>x.foreshadowing_id===fr);if(f){f.resolved=true;f.resolved_in_chapter=AppState.chapters.length;}}if(sp.foreshadowing_updates.progress)for(const fp of sp.foreshadowing_updates.progress){const f=AppState.foreshadowingRegister.find(x=>x.foreshadowing_id===fp.foreshadowing_id||x.description===fp.foreshadowing_id);if(f)Object.assign(f,fp.field_updates||{});}}markDirty('state');addDebugLog('INFO','A12状态同步执行完成');}
function mergeOutlineExt(en){if(!en||en.length===0)return;if(!AppState.outline.acts)AppState.outline.acts=[];let la=AppState.outline.acts[AppState.outline.acts.length-1];if(!la){la={act_number:1,act_name:'扩展幕',act_overview:'',word_budget:0,nodes:[]};AppState.outline.acts.push(la);}for(const n of en){if(!la.nodes.find(x=>x.node_id===n.node_id))la.nodes.push({...n,status:'pending'});}markDirty('outline');}

function extractJSON(c){if(!c||typeof c!=='string')throw new Error('空内容');try{return JSON.parse(c);}catch(e){}const md=c.match(/```json\s*([\s\S]*?)\s*```/);if(md)try{return JSON.parse(md[1]);}catch(e){}let si=c.indexOf('{');if(si>=0){let d=0;for(let i=si;i<c.length;i++){if(c[i]==='{')d++;if(c[i]==='}'){d--;if(d===0)try{return JSON.parse(c.substring(si,i+1));}catch(e){break;}}}}const rm=c.match(/\{[\s\S]*\}/);if(rm){try{return JSON.parse(rm[0]);}catch(e){}let f=rm[0],oc=(f.match(/\{/g)||[]).length,cc=(f.match(/\}/g)||[]).length;while(cc<oc){f+='}';cc++;}try{return JSON.parse(f);}catch(e){}}throw new Error('JSON解析失败，所有5层回退均失败');}

async function fetchAI(msgs,opts={}){addDebugLog('API','fetchAI调用 model='+MODEL_NAME+' mt='+(opts.mt||4096));const{mr=1,to=180000,re=null,mt=4096}=opts;let le=null;for(let at=0;at<=mr;at++){const ctrl=new AbortController(),tid=setTimeout(()=>ctrl.abort(),to);try{const b={model:MODEL_NAME,messages:msgs.map(m=>({role:m.role,content:m.content})),response_format:{type:'json_object'},max_tokens:mt,stream:false};if(re)b.reasoning_effort=re;const r=await fetch(BASE_URL+'/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},body:JSON.stringify(b),signal:ctrl.signal});clearTimeout(tid);
if(r.status===429){const ra=parseInt(r.headers.get('Retry-After')||'5');addDebugLog('WARN','API 429，等待'+ra+'秒');await new Promise(rs=>setTimeout(rs,ra*1000));continue;}if(r.status===401)throw new Error('API Key无效(401)');if(r.status===402)throw new Error('API账户余额不足(402)');if(!r.ok){const et=await r.text();throw new Error('API错误 '+r.status+': '+et.substring(0,200));}const d=await r.json(),msg=d.choices&&d.choices[0]&&d.choices[0].message,cnt=msg?(msg.content||''):'';if(!cnt||cnt.trim().length===0){addDebugLog('WARN','API返回空content，第'+(at+1)+'次尝试');if(at<mr){await new Promise(rs=>setTimeout(rs,1500));continue;}throw new Error('API持续返回空content');}addDebugLog('API','API调用成功: '+cnt.substring(0,80)+'...');return cnt;}catch(e){clearTimeout(tid);le=e;if(e.name==='AbortError'){addDebugLog('ERROR','API超时');if(at<mr){await new Promise(rs=>setTimeout(rs,1000));continue;}throw new Error('API响应超时');}if(e.message.includes('401')||e.message.includes('402'))throw e;if(at<mr){await new Promise(rs=>setTimeout(rs,1000));continue;}}}throw le||new Error('API调用失败');}

/* ====== v1.7 核心修复: handleCallSubAgent ======
   分离"告知主编结果"和"隐藏内部JSON"两个职责:
   - 用干净的system消息告知主编子Agent调用完成（不含原始JSON）
   - 结果的具体内容已通过autoWriteState/pendingChapter反映在项目状态中
   - 主编通过快照（buildSnapshot）查看更新后的状态
   - 用户看到的UI消息: "主编正在调用子Agent: A0 需求解析..."
   - 主编看到的上下文: "[子Agent A0 调用完成，状态已更新]"
   =============================================== */
async function handleCallSubAgent(p){
    const rawId=p.agent_id||'',ak=resolveAgentId(rawId);
    if(!ak){addDebugLog('ERROR','未知子Agent: '+rawId);return{status:'error',error:'未知子Agent: '+rawId};}
    const ag=AGENT_REGISTRY[ak],ti=p.task_input||{},ap=p.armor_piercing||false;
    showLoading('正在调用子Agent: '+ag.id+' ('+ag.name+')');
    try{
        const{parsed}=await callSubAgent(rawId,ti,ap);hideLoading();
        if(ag.autoWriteState){
            if(ag.stateTarget==='worldview'){AppState.worldview=parsed;markDirty('worldview');addDebugLog('INFO','自动写入世界观state');}
            else if(ag.stateTarget==='characters'){if(ag.writeMode==='overwrite_append'&&parsed._append_mode){if(parsed.characters)for(const c of parsed.characters){if(!AppState.characters.find(x=>x.character_id===c.character_id))AppState.characters.push(c);}addDebugLog('INFO','自动追加角色state');}else{AppState.characters=parsed.characters||[];addDebugLog('INFO','自动覆盖角色state');}markDirty('characters');}
            else if(ag.stateTarget==='outline'){if(ag.writeMode==='merge'){mergeOutlineExt(parsed.extension_nodes);addDebugLog('INFO','自动合并大纲state');}else{AppState.outline=parsed;addDebugLog('INFO','自动覆盖大纲state');}markDirty('outline');}
        }
        if(ak==='chapter_writer')AppState.pendingChapter={chapterTitle:parsed.chapter_title||'',content:parsed.content||'',rawContent:parsed.content||'',wordCount:parsed.word_count||0,polished:false,key_events:parsed.key_events||[],foreshadowing_planted:parsed.foreshadowing_planted||[],self_report:parsed.self_report||{}};
        if(ak==='summary_slicer'&&AppState.pendingChapter)AppState.pendingChapter.summary=parsed;
        if(ak==='fact_checker'&&AppState.pendingChapter)AppState.pendingChapter.factCheck=parsed;
        if(ak==='reviewer'&&AppState.pendingChapter)AppState.pendingChapter.review=parsed;
        AppState.callLog.push({type:'subagent_call',agentId:ag.id,timestamp:Date.now(),task:JSON.stringify(ti).substring(0,500),resultSummary:JSON.stringify(parsed).substring(0,500)});

        /* v1.7: 两条消息，职责分离 */
        // 消息A: 用户可见（聊天区渲染）
        const userMsg='主编正在调用子Agent: '+ag.id+' '+ag.name+'...';
        Msgs.push({role:'system',content:userMsg,timestamp:Date.now(),source:'system'});
        renderMessage({role:'system',content:userMsg,source:'system',timestamp:Date.now()});

        // 消息B: 主编上下文（干净格式，不含原始JSON，告知主编结果已处理）
        const masterCtxMsg='[子Agent '+ag.id+' ('+ag.name+') 调用完成。'+
            (ag.autoWriteState?'状态已自动更新到项目中。':'结果已暂存，请查看并决定下一步。')+']';
        Msgs.push({role:'system',content:masterCtxMsg,timestamp:Date.now(),source:'system'});

        markDirty('msgs');updateAll();
        return{status:'ok',agentCalled:true,agentId:ag.id,result:parsed};
    }catch(e){hideLoading();addDebugLog('ERROR','子Agent调用失败: '+ag.id+' - '+e.message);Msgs.push({role:'system',content:'[子Agent '+ag.id+' 调用失败: '+e.message+']',timestamp:Date.now(),source:'system'});renderMessage({role:'system',content:'[子Agent '+ag.id+' 调用失败: '+e.message+']',source:'system',timestamp:Date.now()});return{status:'error',error:e.message,agentCalled:true};}
}

async function runLoop(){
    addDebugLog('INFO','runLoop触发 phase='+AppState.phase+' awaiting='+AppState.awaitingUserInput+' paused='+AppState.paused);
    if(AppState.phase==='FINISHED'){addDebugLog('INFO','项目已完成');return;}
    if(AppState.awaitingUserInput||AppState.paused||!CPid||IsProcessing)return;
    if(!apiKey||apiKey.trim().length<10){AppState.paused=true;addMsg('warn','请先配置DeepSeek API Key。');updateApiKeyUI();return;}
    IsProcessing=true;CurrentRunId=generateId();
    try{
        if(shouldCompress())compressMessages();
        const ctx=buildContext(),resp=await callMaster(ctx);let parsed;
        try{parsed=extractJSON(resp);}catch(e){
            AppState.masterDerelictionCount++;
            addDebugLog('ERROR','主编JSON解析失败('+AppState.masterDerelictionCount+'/'+MAX_DERELICTION+'): '+e.message);
            addDebugLog('ERROR','主编原始返回前200字符: '+(resp||'').substring(0,200));
            if(AppState.masterDerelictionCount>=MAX_DERELICTION){AppState.paused=true;addMsg('warn','主编连续'+MAX_DERELICTION+'次返回无效JSON，系统已暂停。');}
            IsProcessing=false;markDirty('state');await persist();return;
        }
        AppState.masterDerelictionCount=0;
        const cmds=parsed.commands||[parsed];
        for(const cmd of cmds){const r=await executeCommand(cmd);if(r.status==='awaiting_user')break;if(cmd.command==='call_subagent'&&r.agentCalled){IsProcessing=false;await persist();updateAll();setTimeout(()=>runLoop(),300);return;}}
        await persist();updateAll();
    }catch(e){handleError(e);}
    IsProcessing=false;if(!AppState.awaitingUserInput&&!AppState.paused&&AppState.phase!=='FINISHED')setTimeout(()=>runLoop(),300);
}

function addMsg(r,c,s){const ar=(r==='warn'||r==='editor')?'system':r,msg={role:ar,content:c,timestamp:Date.now(),source:s||r,displayType:r};Msgs.push(msg);renderMessage(msg);markDirty('msgs');}
function renderMessage(msg){const ct=document.getElementById('chatMessages'),div=document.createElement('div');let cc;if(msg.displayType==='warn')cc='warn';else if(msg.source==='editor')cc='assistant';else if(msg.source==='system')cc='system';else if(msg.role==='user')cc='user';else cc='assistant';div.className='chat-msg '+cc;if(msg.source==='editor'&&msg.displayType!=='warn'){const l=document.createElement('div');l.className='msg-label';l.textContent='主编';div.appendChild(l);}if(msg.displayType==='warn'){const l=document.createElement('div');l.className='msg-label';l.textContent='系统警告';div.appendChild(l);}const b=document.createElement('div');b.className='msg-bubble';b.textContent=msg.content;div.appendChild(b);ct.appendChild(div);ct.scrollTop=ct.scrollHeight;}
function renderChapterPreview(ch){const ct=document.getElementById('chatMessages'),div=document.createElement('div');div.className='chat-msg assistant';const l=document.createElement('div');l.className='msg-label';l.textContent='主编';div.appendChild(l);const cd=document.createElement('div');cd.className='chapter-preview';cd.innerHTML='<div class="cp-title">第'+(ch.chapterNumber||'?')+'章: '+(ch.chapterTitle||'')+'</div><div class="cp-content">'+(ch.content||'')+'</div><div class="cp-stats">字数: '+(ch.wordCount||0)+'</div>';div.appendChild(cd);ct.appendChild(div);ct.scrollTop=ct.scrollHeight;}
function clearChatUI(){document.getElementById('chatMessages').innerHTML='';}
function replayAllMessages(){clearChatUI();for(const m of Msgs){if(m._internal)continue;renderMessage(m);}}
function updateWorkflowBar(){const ss=document.querySelectorAll('.workflow-step'),ci=VISIBLE_WORKFLOW_PHASES.indexOf(AppState.phase);ss.forEach(s=>{s.classList.remove('done','active');const sp=s.getAttribute('data-phase'),si=VISIBLE_WORKFLOW_PHASES.indexOf(sp);if(si>=0&&ci>=0){if(si<ci)s.classList.add('done');if(sp===AppState.phase)s.classList.add('active');}});const as=document.querySelector('.workflow-step.active');if(as)as.scrollIntoView({behavior:'smooth',block:'nearest'});}
function updateInputPlaceholder(){document.getElementById('userInput').placeholder=PLACEHOLDERS[AppState.phase]||'输入...';}
function updateAll(){updateWorkflowBar();updateInputPlaceholder();document.getElementById('phaseBadge').textContent=AppState.phase;document.getElementById('badgeCharacters').textContent=AppState.characters.length;document.getElementById('badgeChapters').textContent=AppState.chapters.length;updateApiKeyUI();if(currentTab==='dashboard')renderDashboard();if(currentTab==='worldview')updateWorldviewTab();if(currentTab==='characters')updateCharactersTab();if(currentTab==='outline')updateOutlineTab();if(currentTab==='chapters')updateChaptersTab();if(currentTab==='checkpoints')renderCheckpointPanel();refreshProjectSelect();}

function renderDashboard(){const ct=document.getElementById('dashboardContent'),tw=AppState.userProfile.target_word_count||50000,cw=getTotalWords(),p=tw>0?Math.min(100,cw/tw*100):0,tn=getTotalOutlineNodes(),dc=AppState.chapters.length,rn=Math.max(0,tn-dc),aw=dc>0?Math.round(cw/dc):0,pl=AppState.foreshadowingRegister.filter(f=>!f.resolved).length,rs=AppState.foreshadowingRegister.filter(f=>f.resolved).length,cc=AppState.checkpoints.length;ct.innerHTML='<div class="dash-card"><div class="card-value">'+dc+'</div><div class="card-label">章节</div></div><div class="dash-card"><div class="card-value">'+(cw>=10000?Math.round(cw/10000)+'万':cw)+'</div><div class="card-label">字数</div></div><div class="dash-card"><div class="card-value">'+p.toFixed(0)+'%</div><div class="card-label">进度</div></div><div class="dash-card"><div class="card-value">'+dc+'/'+tn+'</div><div class="card-label">大纲</div></div><div class="dash-card"><div class="card-value">'+AppState.characters.length+'</div><div class="card-label">角色</div></div><div class="dash-card"><div class="card-value">'+Object.keys(AppState.itemRegistry).length+'</div><div class="card-label">物品</div></div><div class="dash-card"><div class="card-value">'+pl+'/'+rs+'</div><div class="card-label">伏笔</div></div><div class="dash-card"><div class="card-value">'+cc+'</div><div class="card-label">检查点</div></div><div class="progress-bar-container"><div class="progress-bar"><div class="progress-bar-fill" style="width:'+p+'%"></div></div></div><div style="grid-column:1/-1;font-size:12px;color:var(--text-muted);text-align:center">阶段: '+AppState.phase+' | 剩余节点: '+rn+' | 平均字/章: '+aw+'</div>';}

function updateWorldviewTab(){const ct=document.getElementById('worldviewContent'),wv=AppState.worldview;if(!wv){ct.innerHTML='<p>暂无世界观数据</p>';return;}let h='<h3>世界观设定</h3>';h+='<div class="section-card"><h3>世界类型</h3><p>'+(wv.geography?.world_type||wv.world_type||'未设定')+'</p></div>';h+='<div class="section-card"><h3>地理</h3><p>'+(wv.geography?.overview||'未设定')+'</p>';if(wv.geography?.key_locations)for(const loc of wv.geography.key_locations)h+='<p><strong>'+(loc.name||'')+'</strong> ('+(loc.type||'')+'): '+(loc.description||'')+'</p>';h+='</div>';h+='<div class="section-card"><h3>体系</h3><p>类型: '+(wv.system?.type||'未设定')+'</p>';if(wv.system?.rules)for(const r of wv.system.rules)h+='<p><strong>'+(r.rule_name||'')+'</strong>: '+(r.description||'')+' (限制: '+(r.limitations||'')+')</p>';h+='</div>';h+='<div class="section-card"><h3>社会</h3><p>'+(wv.society?.structure||'未设定')+'</p>';if(wv.society?.factions)for(const f of wv.society.factions)h+='<p><strong>'+(f.name||'')+'</strong>: '+(f.description||'')+'</p>';h+='</div>';if(wv.immutable_rules&&wv.immutable_rules.length>0){h+='<div class="section-card"><h3>铁律</h3>';for(const ir of wv.immutable_rules)h+='<p><strong>'+(ir.rule||'')+'</strong>: '+(ir.reason||'')+'</p>';h+='</div>';}ct.innerHTML=h;}

function updateCharactersTab(){const ct=document.getElementById('charactersContent');let h='<h3>角色列表 ('+AppState.characters.length+')</h3>';for(const c of AppState.characters){h+='<div class="section-card"><h3>'+(c.name||'未命名')+' <small>['+(c.role||'')+']</small></h3><p>ID: '+(c.character_id||'')+' | 状态: '+(c.status||'')+' | 位置: '+(c.current_location||'未知')+'</p><p>情绪: '+(c.emotional_state||'')+' | 弧光进度: '+((c.arc_progress||0)*100).toFixed(0)+'%</p><p>目标: '+(c.current_goal||'')+'</p></div>';}if(AppState.characters.length===0)h+='<p>暂无角色</p>';ct.innerHTML=h;}

function updateOutlineTab(){const ct=document.getElementById('outlineContent');let h='<h3>大纲结构</h3>';if(AppState.outline&&AppState.outline.acts){for(const act of AppState.outline.acts){h+='<div class="section-card"><h3>第'+act.act_number+'幕: '+(act.act_name||'')+'</h3><p>'+(act.act_overview||'')+' (预算'+(act.word_budget||0)+'字)</p>';if(act.nodes)for(const n of act.nodes){const si=n.status==='done'?'\u2713':(n.status==='in_progress'?'\u25CF':'\u25CB');h+='<p>'+si+' '+(n.node_id||'')+': '+(n.event_description||'')+' ['+(n.status||'pending')+'] ('+(n.estimated_word_count||0)+'字)</p>';}h+='</div>';}}if(!AppState.outline||!AppState.outline.acts||AppState.outline.acts.length===0)h+='<p>暂无大纲</p>';ct.innerHTML=h;}

function updateChaptersTab(){const ct=document.getElementById('chaptersContent');let h='<h3>章节列表 ('+AppState.chapters.length+')</h3>';for(const c of AppState.chapters.slice().reverse()){h+='<div class="section-card"><h3>第'+c.chapterNumber+'章: '+(c.chapterTitle||'')+'</h3><p>字数: '+(c.wordCount||0)+' | 已润色: '+(c.polished?'是':'否')+'</p>';if(c.review&&c.review.weighted_total)h+='<p>评审得分: '+c.review.weighted_total+'/100</p>';h+='<details><summary>查看正文</summary><div class="chapter-content" style="max-height:400px;overflow-y:auto">'+(c.content||'')+'</div></details></div>';}if(AppState.chapters.length===0)h+='<p>暂无章节</p>';ct.innerHTML=h;}

function renderCheckpointPanel(){const ct=document.getElementById('checkpointList');if(!AppState.checkpoints||AppState.checkpoints.length===0){ct.innerHTML='<p style="padding:12px;color:var(--text-muted)">暂无检查点</p>';return;}let h='';for(const cp of AppState.checkpoints.slice().reverse())h+='<div class="checkpoint-item"><div class="checkpoint-info"><span class="checkpoint-id">'+cp.id+'</span><span class="checkpoint-detail">'+formatTime(cp.timestamp)+' | 阶段: '+cp.phase+' | 章节: '+cp.chapterCount+'</span></div><button class="btn btn-sm" onclick="rollbackToCheckpoint(\''+cp.id+'\')">回滚到此</button></div>';ct.innerHTML=h;}

function renderDebugLogs(filterOverride){const f=filterOverride||currentDebugFilter;let logs=debugLogs;if(f!=='ALL')logs=debugLogs.filter(l=>l.level===f||(f==='API'&&l.level==='API')||(f==='CMD'&&l.level==='CMD'));const rl=logs.slice(-100);let h='';for(const l of rl.reverse())h+='<div class="debug-log-entry '+l.level+'"><span>'+formatTime(l.timestamp)+'</span><span>['+l.level+']</span><span>'+l.message+'</span></div>';const ct=document.getElementById('debugLogList');if(ct)ct.innerHTML=h||'<div style="padding:12px;color:var(--text-muted)">暂无日志</div>';const ctm=document.getElementById('debugLogListMobile');if(ctm)ctm.innerHTML=h||'<div style="padding:12px;color:var(--text-muted)">暂无日志</div>';}

function renderExportTab(){const ct=document.getElementById('exportContent');ct.innerHTML='<h3>导出选项</h3><div style="display:flex;flex-direction:column;gap:12px;margin-top:12px"><button class="btn btn-primary btn-lg" onclick="exportTXT()">导出 TXT</button><button class="btn btn-primary btn-lg" onclick="exportJSON()">导出 JSON</button><hr style="border-color:var(--border-default)"><h4>导入项目</h4><p style="font-size:12px;color:var(--text-muted)">选择之前导出的JSON文件进行导入</p><input type="file" id="importFileInput2" accept=".json" style="margin-top:8px"></div>';setTimeout(()=>{const fi=document.getElementById('importFileInput2');if(fi)fi.addEventListener('change',function(e){if(e.target.files[0])importProject(e.target.files[0]);});},100);}

function showLoading(t){document.getElementById('loadingText').textContent=t||'处理中...';document.getElementById('loadingOverlay').style.display='flex';}
function hideLoading(){document.getElementById('loadingOverlay').style.display='none';}

function switchTab(tn){currentTab=tn;document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tree-item').forEach(t=>t.classList.remove('active'));const tc=document.getElementById('tab'+tn.charAt(0).toUpperCase()+tn.slice(1));if(tc)tc.classList.add('active');const ti=document.querySelector('.tree-item[data-tab="'+tn+'"]');if(ti)ti.classList.add('active');const cc=document.getElementById('chatContainer');if(tn==='chat')cc.style.display='flex';else cc.style.display='none';if(tn==='dashboard')renderDashboard();if(tn==='worldview')updateWorldviewTab();if(tn==='characters')updateCharactersTab();if(tn==='outline')updateOutlineTab();if(tn==='chapters')updateChaptersTab();if(tn==='export')renderExportTab();if(tn==='checkpoints')renderCheckpointPanel();if(tn==='debug')renderDebugLogs();}

function initEventListeners(){
    document.querySelectorAll('.tree-item').forEach(item=>item.addEventListener('click',function(){const t=this.getAttribute('data-tab');if(t)switchTab(t);}));
    document.getElementById('btnSend').addEventListener('click',sendMessage);
    document.getElementById('userInput').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
    document.getElementById('projectSelect').addEventListener('change',function(){const ni=this.value;if(ni&&ni!==CPid)switchProject(ni).catch(e=>addDebugLog('ERROR','切换项目失败: '+e.message));});
    document.getElementById('btnNewProject').addEventListener('click',async function(){const n=prompt('请输入项目名称:');if(!n||!n.trim())return;const s=prompt('请输入创作种子（可选）:')||'';const id=await createProject(n.trim(),s);if(id){await switchProject(id);if(s.trim()){Msgs.push({role:'user',content:s.trim(),timestamp:Date.now(),source:'user'});renderMessage({role:'user',content:s.trim(),source:'user',timestamp:Date.now()});AppState.awaitingUserInput=false;AppState.userProfile.seed=s.trim();markDirty('msgs');await persist();setTimeout(()=>runLoop(),300);}}});
    document.getElementById('btnDeleteProject').addEventListener('click',async function(){if(!CPid){alert('请先选择项目');return;}await deleteProject(CPid);});
    document.getElementById('btnApiSettings').addEventListener('click',openApiModal);
    document.getElementById('btnApiSave').addEventListener('click',saveApiKey);
    document.getElementById('btnApiClose').addEventListener('click',closeApiModal);
    document.getElementById('btnApiClear').addEventListener('click',clearApiKey);
    document.getElementById('btnApiTest').addEventListener('click',testApiKey);
    document.getElementById('apiModal').addEventListener('click',function(e){if(e.target===this)closeApiModal();});
    document.addEventListener('keydown',function(e){if(e.key==='Escape'&&document.getElementById('apiModal').style.display==='flex')closeApiModal();});
    document.getElementById('btnCreateCheckpoint').addEventListener('click',async function(){if(!CPid){alert('请先选择项目');return;}if(!DB_AVAILABLE){alert('数据库不可用，无法创建检查点');return;}await createCheckpoint();if(currentTab==='checkpoints')renderCheckpointPanel();});
    document.getElementById('btnExportTXT').addEventListener('click',function(){if(!CPid){alert('请先选择项目');return;}exportTXT();});
    document.getElementById('btnExportJSON').addEventListener('click',function(){if(!CPid){alert('请先选择项目');return;}exportJSON();});
    document.getElementById('btnImport').addEventListener('click',function(){if(!CPid){alert('请先选择或创建项目');return;}document.getElementById('importFileInput').click();});
    document.getElementById('importFileInput').addEventListener('change',function(e){if(e.target.files[0])importProject(e.target.files[0]);});
    document.getElementById('debugFilters').addEventListener('click',function(e){if(e.target.classList.contains('debug-filter-btn')){const f=e.target.getAttribute('data-filter');if(e.target.id==='btnClearDebugLogs'){debugLogs=[];renderDebugLogs();return;}if(f){currentDebugFilter=f;document.querySelectorAll('#debugFilters .debug-filter-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('#debugFiltersMobile .debug-filter-btn').forEach(b=>b.classList.remove('active'));e.target.classList.add('active');renderDebugLogs();}}});
    // 调试悬浮面板的过滤器
    var f2=document.getElementById('debugFiltersMobile');if(f2)f2.addEventListener('click',function(e){if(e.target.classList.contains('debug-filter-btn')){const f=e.target.getAttribute('data-filter');if(f){currentDebugFilter=f;document.querySelectorAll('#debugFilters .debug-filter-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('#debugFiltersMobile .debug-filter-btn').forEach(b=>b.classList.remove('active'));e.target.classList.add('active');renderDebugLogs(f);}}});
    // DBG按钮：切换悬浮调试面板
    var bdt=document.getElementById('btnDebugToggle');if(bdt)bdt.addEventListener('click',function(){var o=document.getElementById('debugOverlay');if(o.classList.contains('open')){o.classList.remove('open');}else{o.classList.add('open');renderDebugLogs(currentDebugFilter);}});
    // 点击遮罩关闭
    var dbo=document.getElementById('debugOverlay');if(dbo)dbo.addEventListener('click',function(e){if(e.target===dbo)dbo.classList.remove('open');});
    // "更多"菜单
    var bmm=document.getElementById('btnMoreMenu');if(bmm)bmm.addEventListener('click',function(e){e.stopPropagation();document.getElementById('headerMoreMenu').classList.toggle('open');});
    document.addEventListener('click',function(){document.getElementById('headerMoreMenu').classList.remove('open');});
    try{const ch=new BroadcastChannel('NC_TAB_CHECK');ch.postMessage({type:'HELLO',projectId:CPid,timestamp:Date.now()});ch.onmessage=function(e){if(e.data&&e.data.type==='HELLO'&&e.data.projectId===CPid&&Math.abs(e.data.timestamp-Date.now())>2000){addDebugLog('WARN','检测到多标签页');if(!AppState.paused){AppState.paused=true;addMsg('warn','检测到多个标签页打开同一项目。请关闭其他标签页。');}}};}catch(e){}
}

async function sendMessage(){const input=document.getElementById('userInput'),content=input.value.trim();if(!validateSeedInput(content)){alert('请输入内容。');return;}if(!CPid){alert('请先创建或选择一个项目。');return;}if(!apiKey){alert('请先配置API Key。点击Header中的 Key 按钮进行设置。');return;}if(IsProcessing){alert('正在处理中，请等待...');return;}Msgs.push({role:'user',content,timestamp:Date.now(),source:'user'});renderMessage({role:'user',content,source:'user',timestamp:Date.now()});input.value='';AppState.awaitingUserInput=false;markDirty('msgs');if(AppState.phase==='IDLE'&&!AppState.userProfile.seed){AppState.userProfile.seed=content;markDirty('state');}await persist();setTimeout(()=>runLoop(),300);}

async function init(){
    if(typeof Dexie==='undefined'){document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:18px;color:var(--danger)">依赖库Dexie.js加载失败，请刷新页面重试。</div>';return;}
    await initMETA_DB();const projects=await loadProjectList();await refreshProjectSelect();
    if(projects.length>0){const lp=projects[0];CPid=lp.id;await openDB(CPid);clearChatUI();replayAllMessages();document.getElementById('projectSelect').value=CPid;}
    else{CPid=null;AppState=JSON.parse(JSON.stringify(INITIAL_STATE));Msgs=[];addMsg('system','欢迎使用 NovelCraft！\n请创建新项目并输入创作种子开始。\n提示：使用 Header 中的 Key 按钮配置API Key。');}
    updateAll();initEventListeners();switchTab('chat');
    apiKey=localStorage.getItem('nc_api_key')||'';updateApiKeyUI();
    if(!apiKey||apiKey.trim().length<10)addMsg('warn','请先配置DeepSeek API Key。点击Header中的 Key 按钮进行设置。');
    if(CPid&&!AppState.awaitingUserInput&&AppState.phase!=='FINISHED'&&!AppState.paused&&apiKey&&apiKey.trim().length>=10){addDebugLog('INFO','检测到未完成流程，自动启动...');setTimeout(()=>runLoop(),500);}
    addDebugLog('INFO','NovelCraft vFINAL+ v1.7 初始化完成');
}

window.addEventListener('load',init);
window.addEventListener('beforeunload',async()=>{if(CPid&&(DirtyFlags.state||Object.keys(DirtyChapters).length>0))try{await persist();}catch(e){}});
console.log('NovelCraft vFINAL+ v1.7');
</script>
</body>
